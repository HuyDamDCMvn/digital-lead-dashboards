  <style>
.dla-date-field {

}
.dla-date-trigger,
.dla-date-clear {

  justify-content: center;

  height: 32px;

.dla-date-trigger:hover,

}

  box-shadow: 0 16px 40px rgba(15, 23, 42, 0.18);

}
.dla-date-popup-head {
  display: flex;

  justify-content: space-between;

}

}

}
.dla-date-popup-nav button {

}
.dla-date-popup-grid {

}
.dla-date-popup-grid .dla-cal-wd {

}
.dla-date-popup-grid button {

  border: none;
  border-radius: 8px;
  background: transparent;

}
.dla-date-popup-grid button:hover:not(:disabled) {
  background: var(--surface-raised, #f1f5f9);
}
.dla-date-popup-grid button.is-selected {
  background: var(--accent, #0f766e);
  color: #fff;
}
.dla-date-popup-grid button.is-today {

}
.dla-date-popup-grid button:disabled {
  opacity: 0.35;

}
.dla-date-popup-grid button.is-outside {

}

:root {
  color-scheme: light;
  --bg: #f4f6f8;
  --panel: #ffffff;
  --surface-raised: #f8fafc;
  --ink: #0f172a;
  --muted: #475569;
  --line: #e2e8f0;
  --accent: #0f766e;
  --accent-strong: #115e59;
  --accent-soft: #ccfbf1;
  --hero-bg: #134e4a;
  --shadow: 0 4px 14px rgba(15, 23, 42, 0.07);
  --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.06);
  --radius: 10px;
  --radius-lg: 12px;
  --font: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  --transition: 160ms cubic-bezier(0.22, 1, 0.36, 1);
}


* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: var(--font);
  color: var(--ink);
  background: var(--bg);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
button, input, select { font: inherit; }
button { cursor: pointer; }
button:focus-visible, input:focus-visible, select:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}


:root { --bento-gap: 14px; }
.bento-grid {
  display: grid;
  grid-template-columns: repeat(12, minmax(0, 1fr));
  gap: var(--bento-gap);
  align-items: start;
}
.bento-cell { min-width: 0; }
.bento-span-12 { grid-column: span 12; }
.bento-span-8 { grid-column: span 8; }
.bento-span-6 { grid-column: span 6; }
.bento-span-4 { grid-column: span 4; }
.bento-span-3 { grid-column: span 3; }
.bento-span-2 { grid-column: span 2; }
.bento-nested {
  display: grid;
  grid-template-columns: repeat(12, minmax(0, 1fr));
  gap: var(--bento-gap);
  width: 100%;
  grid-column: span 12;
  align-items: start;
}
@media (max-width: 1199px) {
  .bento-span-8, .bento-span-6 { grid-column: span 12; }
  .bento-span-4, .bento-span-3 { grid-column: span 6; }
  .bento-span-2 { grid-column: span 4; }
}
@media (max-width: 767px) {
  .bento-span-8, .bento-span-6, .bento-span-4, .bento-span-3, .bento-span-2 {
    grid-column: span 12;
  }
}
@media print {
  .bento-grid, .bento-nested { display: block; }
  .bento-grid > *, .bento-nested > * { break-inside: avoid; margin-bottom: 12px; }
}


.meta-strip {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm);
  padding: 14px 18px;
}
.meta-strip-main {
  display: flex;
  flex-wrap: wrap;
  align-items: flex-start;
  justify-content: space-between;
  gap: 10px 16px;
}
.meta-title {
  margin: 0;
  font-size: 1.375rem;
  font-weight: 700;
  line-height: 1.25;
  text-wrap: balance;
  color: var(--ink);
}
.meta-sub { margin: 4px 0 0; color: var(--muted); font-size: 0.875rem; }
.meta-pills {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
}
.meta-pill {
  border-radius: 999px;
  padding: 5px 10px;
  font-size: 0.75rem;
  background: var(--surface-raised);
  border: 1px solid var(--line);
  color: var(--muted);
  white-space: nowrap;
}
.meta-strip .source-panel {
  margin-top: 10px;
  padding: 10px 12px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: var(--surface-raised);
}
.meta-warning { color: #b91c1c; font-weight: 600; font-size: 0.8125rem; margin: 8px 0 0; }


.bento-grid.bento-layout-root {
  position: relative;
  grid-auto-rows: minmax(72px, auto);
}
[data-bento-host] { display: contents; }
.bento-grid.bento-layout-editing [data-bento-id]:not([data-bento-id] [data-bento-id]) {
  outline: 2px dashed var(--accent, #0f766e);
  outline-offset: -2px;
  cursor: default;
  touch-action: none;
  position: relative;
}
.bento-grid.bento-layout-editing [data-bento-id]:not([data-bento-id] [data-bento-id]) .bento-drag-handle {
  display: flex;
}
.bento-grid.bento-layout-editing [data-bento-id]:not([data-bento-id] [data-bento-id]) .bento-resize-handle {
  display: block;
}
.bento-drag-handle {
  display: none;
  align-items: center;
  gap: 6px;
  margin: -4px 0 8px;
  padding: 6px 10px;
  border-radius: 6px;
  background: var(--accent-soft, #ccfbf1);
  color: var(--accent-strong, #115e59);
  font-size: 0.6875rem;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  cursor: grab;
  user-select: none;
  touch-action: none;
  width: fit-content;
  max-width: 100%;
}
.bento-drag-handle::before {
  content: "⋮⋮";
  font-size: 0.875rem;
  line-height: 1;
}
.bento-drag-handle:active { cursor: grabbing; }
.bento-resize-handle {
  display: none;
  position: absolute;
  right: 6px;
  bottom: 6px;
  width: 14px;
  height: 14px;
  border-radius: 3px;
  background: var(--accent, #0f766e);
  cursor: nwse-resize;
  opacity: 0.85;
  z-index: 3;
}
.bento-resize-row-handle {
  display: none;
  position: absolute;
  left: 50%;
  bottom: 4px;
  transform: translateX(-50%);
  width: 40px;
  height: 8px;
  border-radius: 4px;
  background: var(--accent, #0f766e);
  cursor: ns-resize;
  opacity: 0.85;
  z-index: 3;
}
.bento-grid.bento-layout-editing [data-bento-id]:not([data-bento-id] [data-bento-id]) .bento-resize-row-handle {
  display: block;
}
.bento-layout-toolbar {
  display: inline-flex;
  flex-wrap: wrap;
  gap: 6px;
  align-items: center;
}
.bento-layout-toolbar.meta-inline {
  margin-left: auto;
}
.bento-layout-toolbar button {
  border: 1px solid var(--line, #e2e8f0);
  border-radius: 8px;
  background: #fff;
  color: var(--ink, #0f172a);
  padding: 6px 11px;
  font-size: 0.8125rem;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
}
.bento-layout-toolbar button:hover { background: var(--surface-raised, #f8fafc); }
.bento-layout-toolbar button.primary {
  background: var(--accent, #0f766e);
  border-color: var(--accent, #0f766e);
  color: #fff;
}
.bento-layout-toolbar button.layout-edit-btn {
  background: #0f766e;
  border-color: #0f766e;
  color: #fff;
}
.bento-layout-toolbar button.layout-edit-btn:hover { background: #115e59; }
.bento-grid.bento-layout-editing [data-bento-id]:not([data-bento-id] [data-bento-id]).bento-tile-dragging {
  opacity: 0.38;
  pointer-events: none;
}
.bento-layout-drop-indicator {
  position: absolute;
  border: 2px solid var(--accent, #0f766e);
  border-radius: 10px;
  background: rgba(15, 118, 110, 0.12);
  box-shadow: 0 8px 24px rgba(15, 118, 110, 0.18);
  pointer-events: none;
  z-index: 100;
  display: none;
  box-sizing: border-box;
  will-change: transform, width, height;
}
@media (max-width: 767px) {
  .bento-layout-toolbar.meta-inline {
    margin-left: 0;
    width: 100%;
    justify-content: flex-end;
  }
  .bento-grid.bento-layout-root:not(.bento-layout-editing) > [data-bento-id]:not([data-bento-id] [data-bento-id]) {
    grid-column: 1 / -1 !important;
    grid-row: auto !important;
  }
}
@media print {
  .bento-grid.bento-layout-root [data-bento-id]:not([data-bento-id] [data-bento-id]) {
    grid-column: 1 / -1 !important;
    grid-row: auto !important;
    break-inside: avoid;
  }
  .bento-drag-handle, .bento-resize-handle, .bento-resize-row-handle, .bento-layout-drop-indicator { display: none !important; }
}

.app { min-height: 100vh; width: 100vw; overflow-x: hidden; }
.wrap { width: 100%; max-width: 1840px; margin: 0 auto; padding: 14px; }
.bento-grid { margin-top: 12px; }
.toolbar, .panel, .kpi {
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 8px;
  box-shadow: var(--shadow-sm);
}
.toolbar {
  padding: 12px;
  display: grid;
  grid-template-columns: repeat(5, minmax(130px, 1fr));
  gap: 10px;
  align-items: end;
}
.field { display: grid; gap: 5px; }
.field label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; }
select, input {
  min-height: 36px;
  border: 1px solid var(--line);
  border-radius: 6px;
  padding: 7px 9px;
  background: #fff;
}
.segmented { display: grid; grid-template-columns: 1fr 1fr; border: 1px solid var(--line); border-radius: 6px; overflow: hidden; min-height: 36px; }
.segmented button { border: 0; background: #fff; color: var(--muted); font-weight: 700; }
.segmented button.active { background: var(--accent); color: #fff; }
.reset { border: 0; min-height: 36px; border-radius: 6px; background: #0f766e; color: #fff; font-weight: 700; }
.grid.kpis {
  display: grid;
  grid-template-columns: repeat(12, minmax(0, 1fr));
  gap: var(--bento-gap);
  grid-column: span 12;
}
.grid.kpis > .kpi { grid-column: span 2; min-width: 0; }
.charts-panel { grid-column: span 12; }
.detail-panel { grid-column: span 12; }
.panel { padding: 14px; min-width: 0; width: 100%; }
.panel-head { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; margin-bottom: 10px; }
.panel h2 { margin: 0; font-size: 15px; }
.hint { color: var(--muted); font-size: 12px; }
.selection-bar {
  margin-top: 12px;
  min-height: 38px;
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 8px;
  color: var(--muted);
  font-size: 12px;
}
.selection-chip {
  border: 1px solid #99f6e4;
  background: #f0fdfa;
  color: #115e59;
  border-radius: 999px;
  padding: 6px 10px;
  font-weight: 700;
}
.selection-clear {
  border: 1px solid var(--line);
  background: #fff;
  color: #0f766e;
  border-radius: 6px;
  padding: 6px 10px;
  font-weight: 700;
}
.kpi { padding: 12px; }
.kpi-label { color: var(--muted); font-size: 11px; font-weight: 700; text-transform: uppercase; }
.kpi-value { margin-top: 4px; font-size: 24px; font-weight: 800; font-variant-numeric: tabular-nums; }
.kpi-sub { margin-top: 2px; color: var(--muted); font-size: 12px; }
.bars { display: grid; gap: 8px; }
.bar-row { display: grid; grid-template-columns: 130px 1fr 66px; align-items: center; gap: 9px; }
.bar-label { font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.bar-track { height: 11px; background: #e2e8f0; border-radius: 999px; overflow: hidden; }
.bar-fill { height: 100%; background: #0f766e; border-radius: 999px; }
.bar-value { font-size: 12px; text-align: right; font-variant-numeric: tabular-nums; }
.chart-area { width: 100%; min-height: 420px; overflow: hidden; position: relative; }
.chart-area svg { display: block; width: 100%; height: 420px; }
.line { fill: none; stroke-width: 2.4; }
.line-muted { opacity: .22; }
.line-dot { cursor: pointer; stroke: #fff; stroke-width: 1.5; }
.line-dot:hover { stroke: #111827; stroke-width: 2; }
.line-dot.selected { stroke: #111827; stroke-width: 3; }
.point-label { fill: #334155; font-size: 10px; font-weight: 700; pointer-events: none; }
.axis { stroke: #cbd5e1; stroke-width: 1; }
.chart-grid { stroke: #94a3b8; stroke-width: 1; stroke-dasharray: 4 4; opacity: .5; }
.weekend-band { fill: #e5e7eb; opacity: .72; pointer-events: none; }
.hover-grid { stroke: #334155; stroke-width: 1.2; stroke-dasharray: 4 4; opacity: .7; pointer-events: none; }
.hover-capture { fill: transparent; cursor: crosshair; }
.axis-label { fill: #475569; font-size: 10px; }
.axis-label.weekend { fill: #64748b; font-weight: 700; }
.legend { display: flex; flex-wrap: wrap; gap: 8px 12px; margin-top: 8px; }
.legend-item { display: inline-flex; align-items: center; gap: 5px; color: var(--muted); font-size: 12px; border: 1px solid transparent; background: transparent; border-radius: 999px; padding: 3px 8px; cursor: pointer; }
.legend-item:hover { border-color: var(--line); background: #f8fafc; }
.legend-item.active { color: #0f172a; background: #f8fafc; border-color: var(--line); font-weight: 700; }
.legend-item.off { color: #94a3b8; text-decoration: line-through; opacity: .58; }
.legend-item.off .legend-swatch { background: #cbd5e1 !important; }
.legend-swatch { width: 10px; height: 10px; border-radius: 999px; }
.chart-tooltip {
  position: absolute;
  z-index: 5;
  min-width: 210px;
  max-width: 280px;
  pointer-events: none;
  background: #0f172a;
  color: #fff;
  border-radius: 8px;
  padding: 8px 10px;
  box-shadow: 0 10px 24px rgba(15, 23, 42, .24);
  font-size: 12px;
  line-height: 1.45;
}
.chart-tooltip strong { display: block; font-size: 13px; margin-bottom: 2px; }
.tooltip-muted { color: #cbd5e1; }
.heatmap { display: grid; gap: 4px; overflow: hidden; padding-bottom: 4px; width: 100%; }
.heat-row { display: grid; grid-template-columns: 96px repeat(var(--cols), minmax(0, 1fr)); gap: 4px; align-items: center; width: 100%; }
.heat-user { font-size: 12px; color: var(--muted); }
.heat-cell { height: 30px; border-radius: 5px; display: grid; place-items: center; font-size: 11px; color: #083344; background: #ecfeff; border: 1px solid #cffafe; cursor: pointer; }
.heat-cell.weekend { background: #e5e7eb !important; border-color: #cbd5e1; color: #475569 !important; }
.heat-cell:hover { outline: 2px solid #111827; outline-offset: 1px; }
.heat-cell.selected { outline: 2px solid #111827; outline-offset: 1px; }
.detail-row { cursor: pointer; }
.detail-row:hover { background: #f8fafc; }
.detail-row.selected { background: #ecfeff; }
.table-wrap { max-height: 440px; overflow: auto; border: 1px solid var(--line); border-radius: 8px; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
th, td { padding: 8px 9px; border-bottom: 1px solid var(--line); text-align: left; vertical-align: top; }
th { position: sticky; top: 0; z-index: 1; background: #f8fafc; color: var(--muted); font-size: 11px; text-transform: uppercase; }
.num { text-align: right; font-variant-numeric: tabular-nums; }
.summary-line { margin-top: 8px; color: var(--muted); font-size: 12px; }
@media (max-width: 980px) {
  .toolbar { grid-template-columns: repeat(2, minmax(120px, 1fr)); }
  .grid.kpis > .kpi { grid-column: span 4; }
}
@media (max-width: 767px) {
  .grid.kpis > .kpi { grid-column: span 12; }
}
</style>
  <style id="dla-full-frame-style">

<div class="app">
  <div class="wrap">
    <div class="bento-grid" data-bento-dashboard="annotation-productivity">

    <section class="toolbar bento-span-12" data-bento-id="prod-toolbar" data-bento-span="12">
      <div class="field">
        <label>Member</label>
        <select id="memberFilter"></select>
      </div>
      <div class="field">
        <label>Week</label>
        <select id="weekFilter"></select>
      </div>
      <div class="field">
        <label>From</label>
        <input id="fromFilter" type="text" autocomplete="off" spellcheck="false" inputmode="numeric" placeholder="dd/mm/yyyy">
      </div>
      <div class="field">
        <label>To</label>
        <input id="toFilter" type="text" autocomplete="off" spellcheck="false" inputmode="numeric" placeholder="dd/mm/yyyy">

    </div>

  } catch {

  }
}
function loadLayout(dashboardId) {
  try {
    for (const ver of [4, 3, 2, 1]) {

      parsed._loadedFromVersion = ver;
      return parsed;
    }

    // ignore parse errors
  }
  return null;
}

  const yStep = Math.max(1, Math.ceil(maxY / 4));
  const yTicks = [];
  for (let value = 0; value <= maxY; value += yStep) yTicks.push(value);
  if (yTicks[yTicks.length - 1] !== maxY) yTicks.push(maxY);
  const xGrid = dates.map((date, i) => {
    return `<line class="chart-grid" x1="${x(i)}" y1="${padTop}" x2="${x(i)}" y2="${height - padBottom}"></line>`;
  }).join("");
  const yGrid = yTicks.map(value => `<line class="chart-grid" x1="${padLeft}" y1="${y(value)}" x2="${width - padRight}" y2="${y(value)}"></line>`).join("");
  const weekendBands = dates.map((date, i) => {
    if (!isWeekend(date)) return "";
    const left = i === 0 ? padLeft : (x(i - 1) + x(i)) / 2;
    const right = i === dates.length - 1 ? width - padRight : (x(i) + x(i + 1)) / 2;
    return `<rect class="weekend-band" x="${left}" y="${padTop}" width="${Math.max(0, right - left)}" height="${height - padTop - padBottom}"></rect>`;
  }).join("");

  const paths = visibleUsers.map(user => {
    const points = dates.map((date, i) => `${i ? "L" : "M"}${x(i)},${y(interactiveCount(counts, user, date))}`).join(" ");
    const muted = selection.user && selection.user !== user ? " line-muted" : "";
    return `<path class="line${muted}" d="${points}" stroke="${colorForUser(user)}"></path>`;
  }).join("");

  const dots = visibleUsers.map(user => dates.map((date, i) => {
    const value = interactiveCount(counts, user, date);
    if (!value) return "";
    const selected = selection.user === user && selection.date === date ? " selected" : "";
    return `<g><circle class="line-dot${selected}" data-user="${user}" data-date="${date}" cx="${x(i)}" cy="${y(value)}" r="4.5" fill="${colorForUser(user)}"><title>${user} ${date}: ${value} interactive tickets</title></circle><text class="point-label" x="${x(i)}" y="${y(value) - 8}" text-anchor="middle">${value}</text></g>`;
  }).join("")).join("");

  const xLabels = dates.map((date, i) => {
    const weekend = isWeekend(date) ? " weekend" : "";
    return `<text class="axis-label${weekend}" transform="translate(${x(i)},${height - 44}) rotate(-45)" text-anchor="end">${date.slice(5)}</text>`;
  }).join("");
  const yLabels = yTicks.map(value => `<text class="axis-label" x="${padLeft - 8}" y="${y(value) + 4}" text-anchor="end">${value}</text>`).join("");

  $("trendTitle").textContent = "Daily Productivity Trend";
  $("trendChart").innerHTML = dates.length ? `<svg viewBox="0 0 ${width} ${height}" preserveAspectRatio="xMinYMin meet" role="img">
    ${weekendBands}
    ${xGrid}
    ${yGrid}
    ${yLabels}
    <line class="axis" x1="${padLeft}" y1="${height-padBottom}" x2="${width-padRight}" y2="${height-padBottom}"></line>
    <line class="axis" x1="${padLeft}" y1="${padTop}" x2="${padLeft}" y2="${height-padBottom}"></line>
    ${paths}
    ${dots}
    ${xLabels}
    <g id="hoverGuide" style="display:none">
      <line id="hoverX" class="hover-grid" x1="0" y1="${padTop}" x2="0" y2="${height - padBottom}"></line>
      <line id="hoverY" class="hover-grid" x1="${padLeft}" y1="0" x2="${width - padRight}" y2="0"></line>
      <circle id="hoverDot" r="6" fill="#111827" stroke="#fff" stroke-width="2"></circle>
    </g>
    <rect id="trendHoverCapture" class="hover-capture" x="${padLeft}" y="${padTop}" width="${width - padLeft - padRight}" height="${height - padTop - padBottom}"></rect>
    <text class="axis-label" x="${padLeft}" y="16">interactive tickets</text>
  </svg>` : `<div class="hint">No data in the selected period.</div>`;

  if (dates.length) {
    $("trendChart").insertAdjacentHTML("beforeend", `<div id="trendTooltip" class="chart-tooltip" style="display:none"></div>`);
  }

  $("trendLegend").innerHTML = users.map(user => {
    const active = selection.user === user ? " active" : "";
    const off = hiddenUsers.has(user) ? " off" : "";
    return `<button class="legend-item${active}${off}" type="button" data-user="${user}" title="Click to show/hide this user"><span class="legend-swatch" style="background:${colorForUser(user)}"></span>${user}</button>`;
  }).join("");
  document.querySelectorAll("#trendChart .line-dot").forEach(el => {
    el.addEventListener("click", () => setSelection({ user: el.dataset.user, date: el.dataset.date }));
  });
  document.querySelectorAll("#trendLegend .legend-item").forEach(el => {
    el.addEventListener("click", () => toggleUserVisibility(el.dataset.user));
  });
  const capture = $("trendHoverCapture");
  if (capture && visibleUsers.length) {
    const svg = capture.ownerSVGElement;
    const tooltip = $("trendTooltip");
    const hoverGuide = $("hoverGuide");
    const hoverX = $("hoverX");
    const hoverY = $("hoverY");
    const hoverDot = $("hoverDot");
    const toSvgPoint = (event) => {
      const point = svg.createSVGPoint();
      point.x = event.clientX;
      point.y = event.clientY;
      return point.matrixTransform(svg.getScreenCTM().inverse());
    };
    capture.addEventListener("mousemove", (event) => {
      const point = toSvgPoint(event);
      const dateIndex = Math.max(0, Math.min(dates.length - 1, Math.round((point.x - padLeft) / ((width - padLeft - padRight) / Math.max(1, dates.length - 1)))));
      const date = dates[dateIndex];
      let nearest = visibleUsers[0];
      let nearestValue = interactiveCount(counts, nearest, date);
      let nearestY = y(nearestValue);
      let bestDistance = Math.abs(point.y - nearestY);
      visibleUsers.slice(1).forEach(user => {
        const value = interactiveCount(counts, user, date);
        const candidateY = y(value);
        const distance = Math.abs(point.y - candidateY);
        if (distance < bestDistance) {
          bestDistance = distance;
          nearest = user;
          nearestValue = value;
          nearestY = candidateY;
        }
      });
      const nearestX = x(dateIndex);
      hoverX.setAttribute("x1", nearestX);
      hoverX.setAttribute("x2", nearestX);
      hoverY.setAttribute("y1", nearestY);
      hoverY.setAttribute("y2", nearestY);
      hoverDot.setAttribute("cx", nearestX);
      hoverDot.setAttribute("cy", nearestY);
      hoverDot.setAttribute("fill", colorForUser(nearest));
      hoverGuide.style.display = "block";
      tooltip.style.display = "block";
      const scaleX = $("trendChart").clientWidth / width;
      const scaleY = 420 / height;
      tooltip.style.left = `${Math.min(nearestX * scaleX + 12, $("trendChart").clientWidth - 260)}px`;
      tooltip.style.top = `${Math.max(8, nearestY * scaleY - 16)}px`;
      tooltip.innerHTML = `<strong>${nearest}</strong><span class="tooltip-muted">Date</span>: ${date}<br><span class="tooltip-muted">Interactive tickets</span>: ${fmt(nearestValue)}<br><span class="tooltip-muted">Grid</span>: user line + daily column`;
    });
    capture.addEventListener("mouseleave", () => {
      hoverGuide.style.display = "none";
      tooltip.style.display = "none";
    });
    capture.addEventListener("click", (event) => {
      const point = toSvgPoint(event);
      const dateIndex = Math.max(0, Math.min(dates.length - 1, Math.round((point.x - padLeft) / ((width - padLeft - padRight) / Math.max(1, dates.length - 1)))));
      const date = dates[dateIndex];
      let nearest = visibleUsers[0];
      let nearestValue = interactiveCount(counts, nearest, date);
      let nearestY = y(nearestValue);
      let bestDistance = Math.abs(point.y - nearestY);
      visibleUsers.slice(1).forEach(user => {
        const value = interactiveCount(counts, user, date);
        const candidateY = y(value);
        const distance = Math.abs(point.y - candidateY);
        if (distance < bestDistance) {
          bestDistance = distance;
          nearest = user;
          nearestValue = value;
          nearestY = candidateY;
        }
      });
      setSelection({ user: nearest, date });
    });
  }
}

function renderHeatmap(rows) {
  const dates = dateRangeForRows(rows);
  const users = usersWithData(rows, dates).filter(user => !hiddenUsers.has(user));
  const counts = interactiveMap(rows);
  const max = Math.max(1, ...users.flatMap(user => dates.map(date => interactiveCount(counts, user, date))));
  $("heatmap").style.setProperty("--cols", dates.length || 1);
  if (!dates.length) {
    $("heatmap").innerHTML = `<div class="hint">No data in the selected period.</div>`;
    return;
  }
  $("heatmap").innerHTML = `<div class="heat-row"><div></div>${dates.map(d=>`<div class="axis-label${isWeekend(d) ? " weekend" : ""}">${d.slice(5)}</div>`).join("")}</div>` +
    users.map(user => `<div class="heat-row"><div class="heat-user">${user}</div>${dates.map(date => {
      const value = interactiveCount(counts, user, date);
      const alpha = value ? 0.14 + (value / max) * 0.76 : 0;
      const selected = selection.user === user && selection.date === date ? " selected" : "";
      const weekend = isWeekend(date) ? " weekend" : "";
      const style = weekend ? "" : ` style="background:rgba(15,118,110,${alpha});color:${value/max>.55?"#fff":"#083344"}"`;
      return `<div class="heat-cell${weekend}${selected}" data-user="${user}" data-date="${date}"${style}><span>${value || ""}</span><title>${user} ${date}: ${value} interactive tickets</title></div>`;
    }).join("")}</div>`).join("");
  document.querySelectorAll("#heatmap .heat-cell").forEach(el => {
    el.addEventListener("click", () => setSelection({ user: el.dataset.user, date: el.dataset.date }));
  });
}

function renderTable(rows) {
  const shown = rows.slice().sort((a,b) => (b.note_time || "").localeCompare(a.note_time || "")).slice(0, 250);
  $("tableHint").textContent = `${fmt(rows.length)} rows, showing latest ${fmt(shown.length)}`;
  $("detailTable").innerHTML = `<thead><tr>
    <th>Date</th><th>Member</th><th>Ticket</th><th>Summary</th><th>Note</th><th>Status</th><th>Assign</th><th class="num">Tracked h</th><th class="num">Handoff min</th><th>New handler</th>
  </tr></thead><tbody>${shown.map(row => {
    const selected = selection.ticket && String(selection.ticket) === String(row.ticket) ? " selected" : "";
    return `<tr class="detail-row${selected}" data-user="${row.username}" data-date="${row.date}" data-ticket="${row.ticket}">
      <td>${fmtIsoDate(row.date)}</td><td>${row.username}</td><td>${row.ticket}</td><td>${row.summary}</td>
      <td>${String(row.note_time).slice(11)}</td><td>${String(row.status_time).slice(11)}</td><td>${String(row.assign_time).slice(11)}</td>
      <td class="num">${fmt(row.tracked_hours, 2)}</td><td class="num">${fmt(row.minutes_note_to_assign, 2)}</td><td>${row.new_handler}</td>
    </tr>`;
  }).join("")}</tbody>`;
  document.querySelectorAll("#detailTable .detail-row").forEach(el => {
    el.addEventListener("click", () => setSelection({ user: el.dataset.user, date: el.dataset.date, ticket: el.dataset.ticket }));
  });
}

function render() {
  const baseRows = controlRows();
  const visibleBaseRows = baseRows.filter(row => !hiddenUsers.has(row.username));
  const rows = selectedRows(visibleBaseRows);
  renderKpis(rows);
  renderSelection(rows.length, visibleBaseRows.length);
  renderTrend(baseRows);
  renderHeatmap(visibleBaseRows);
  renderTable(rows);
}

initFilters();
bindDdMmDatePicker($("fromFilter"), () => { $("weekFilter").value = ""; clearSelection(false); render(); savePrefs(); });
bindDdMmDatePicker($("toFilter"), () => { $("weekFilter").value = ""; clearSelection(false); render(); savePrefs(); });
$("memberFilter").addEventListener("input", () => { clearSelection(false); render(); savePrefs(); });
$("weekFilter").addEventListener("input", () => { setDateInputDisplay($("fromFilter"), ""); setDateInputDisplay($("toFilter"), ""); clearSelection(false); render(); savePrefs(); });
$("resetFilters").addEventListener("click", () => {
  saveDashboardPrefs(PREFS_KEY, { member: "", week: "", from: "", to: "" });
  $("memberFilter").value = "";
  $("weekFilter").value = "";
  setDateInputDisplay($("fromFilter"), "");
  setDateInputDisplay($("toFilter"), "");
  selection = { user: "", date: "", ticket: "" };
  hiddenUsers = new Set();
  render();
});
let resizeTimer = 0;
const redrawOnResize = () => {
  window.clearTimeout(resizeTimer);
  resizeTimer = window.setTimeout(render, 120);
};
window.addEventListener("resize", redrawOnResize);
if (window.ResizeObserver) {
  const observer = new ResizeObserver(redrawOnResize);
  observer.observe($("trendChart"));
}
render();
const prodGrid = document.querySelector('.bento-grid[data-bento-dashboard="annotation-productivity"]');
if (prodGrid) DlaBentoLayout.mount(prodGrid, { dashboardId: 'annotation-productivity' });
</script>
