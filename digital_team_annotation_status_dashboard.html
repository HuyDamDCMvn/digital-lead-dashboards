:root {

* { box-sizing: border-box; }
body {

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {

    transition-duration: 0.01ms !important;
  }

:root { --bento-gap: 14px; }
.bento-grid {
  display: grid;
  grid-template-columns: repeat(12, minmax(0, 1fr));

  align-items: start;
}
.bento-cell { min-width: 0; }
.bento-span-12 { grid-column: span 12; }

.bento-span-4 { grid-column: span 4; }
.bento-span-3 { grid-column: span 3; }
.bento-span-2 { grid-column: span 2; }
.bento-nested {
  display: grid;

  align-items: start;
}
@media (max-width: 1199px) {

.meta-strip {

  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm);
  padding: 14px 18px;
}
.meta-strip-main {
  display: flex;
  flex-wrap: wrap;
  align-items: flex-start;
  justify-content: space-between;
  gap: 10px 16px;
}
.meta-title {
  margin: 0;
  font-size: 1.375rem;
  font-weight: 700;
  line-height: 1.25;
  text-wrap: balance;
  color: var(--ink);
}
.meta-sub { margin: 4px 0 0; color: var(--muted); font-size: 0.875rem; }
.meta-pills {
  display: flex;

  align-items: center;
}
.meta-pill {

}
.meta-warning { color: #b91c1c; font-weight: 600; font-size: 0.8125rem; margin: 8px 0 0; }


.bento-grid.bento-layout-root {

.bento-grid.bento-layout-editing [data-bento-id]:not([data-bento-id] [data-bento-id]) {

  display: flex;

}
.bento-drag-handle {
  display: none;
  align-items: center;
  gap: 6px;
  margin: -4px 0 8px;

.bento-drag-handle:active { cursor: grabbing; }
.bento-resize-handle {
  display: none;

  right: 6px;
  bottom: 6px;
  width: 14px;
  height: 14px;
  border-radius: 3px;
  background: var(--accent, #0f766e);

.bento-layout-toolbar {

  align-items: center;

}
.bento-layout-toolbar button {

}

.bento-layout-drop-indicator {

      <header class="meta-strip bento-span-12" data-bento-id="status-meta" data-bento-span="12"><div class="meta-strip-main"><div><h1 class="meta-title">Digital Team Ticket-System Status - DCMvn Annotation Project</h1></div><div class="meta-pills"><span class="meta-pill">Week 2026-W28</span><span class="meta-pill">Generated 09/07/2026 11:15</span><span class="meta-pill">RFA_ISO_Master_Schedule_TIDP_Validation_Rev6.xlsx</span></div></div></header>
      <div id="app" data-bento-host></div>
    </div>
  </div>
  <script>
    function loadDashboardPrefs(key) {
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : null;
  } catch {
    return null;
  }
}
function saveDashboardPrefs(key, value) {
  try {
    localStorage.setItem(key, JSON.stringify(value));
  } catch {
    // ignore quota / private mode
  }
}
const DlaBentoLayout = (() => {
  const VERSION = 1;
  const COLS = 12;
  const mounted = new WeakMap();

  function storageKey(dashboardId) {
    return `dla-bento-layout:v${VERSION}:${dashboardId}`;
  }

  function inIframe() {
    try {
      return window.self !== window.top;
    } catch {
      return true;
    }
  }

  function resolveToolbarMode(options) {
    const mode = options?.toolbar;
    if (mode === "none" || mode === "meta") return mode;
    return inIframe() ? "none" : "meta";
  }

  function layoutRoot() {
    return (
      document.querySelector("[data-bento-dashboard]") ||
      document.querySelector(".bento-grid.bento-layout-root") ||
      document.querySelector(".bento-grid")
    );
  }

  function tiles(grid) {
    if (!grid) return [];
    return [...grid.querySelectorAll("[data-bento-id]")].filter((el) => {
      let parent = el.parentElement;
      while (parent && parent !== grid) {
        if (parent.matches("[data-bento-id]")) return false;
        parent = parent.parentElement;
      }
      return true;
    });
  }

  function defaultSpan(el) {
    const attr = Number(el.dataset.bentoSpan || el.getAttribute("data-bento-span") || 0);
    if (attr > 0) return Math.min(COLS, attr);
    const match = String(el.className || "").match(/bento-span-(\d+)/);
    if (match) return Math.min(COLS, Number(match[1]));
    if (el.classList.contains("tt-compliance-panel") || el.classList.contains("tt-entries")) return 12;
    if (el.classList.contains("tt-project")) return 7;
    if (el.classList.contains("tt-detail")) return 5;
    if (el.classList.contains("tt-breakdown")) return 4;
    if (el.classList.contains("tt-toolbar") || el.classList.contains("tt-chips")) return 12;
    return 6;
  }

  function readPlacement(el) {
    const cs = getComputedStyle(el);
    const col = Number(el.dataset.bentoCol || 0);
    const span = Number(el.dataset.bentoColSpan || 0);
    const row = Number(el.dataset.bentoRow || 0);
    const rowSpan = Number(el.dataset.bentoRowSpan || 1);
    if (col && span) {
      return { c: col, cs: span, r: row || 1, rs: rowSpan || 1 };
    }
    const gc = cs.gridColumnStart;
    const gspan = cs.gridColumnEnd;
    const gr = cs.gridRowStart;
    const grs = cs.gridRowEnd;
    let c = 1;
    let csVal = defaultSpan(el);
    let r = 1;
    let rs = 1;
    if (gc && gc !== "auto") c = Number(gc);
    if (gspan && gspan !== "auto" && String(gspan).includes("span")) {
      csVal = Number(String(gspan).replace("span", "").trim()) || csVal;
    }
    if (gr && gr !== "auto") r = Number(gr);
    if (grs && grs !== "auto" && String(grs).includes("span")) {
      rs = Number(String(grs).replace("span", "").trim()) || 1;
    }
    return { c, cs: csVal, r, rs };
  }

  function applyPlacement(el, p) {
    const c = Math.max(1, Math.min(COLS, Number(p.c || 1)));
    const cs = Math.max(1, Math.min(COLS, Number(p.cs || defaultSpan(el))));
    const safeC = Math.min(c, COLS - cs + 1);
    const r = Math.max(1, Number(p.r || 1));
    const rs = Math.max(1, Number(p.rs || 1));
    el.style.gridColumn = `${safeC} / span ${cs}`;
    el.style.gridRow = `${r} / span ${rs}`;
    el.dataset.bentoCol = String(safeC);
    el.dataset.bentoColSpan = String(cs);
    el.dataset.bentoRow = String(r);
    el.dataset.bentoRowSpan = String(rs);
  }

  function defaultLayout(grid) {
    const items = {};
    for (const el of tiles(grid)) {
      items[el.dataset.bentoId] = readPlacement(el);
    }
    return { version: VERSION, items };
  }

  function clearPlacements(grid) {
    for (const el of tiles(grid)) {
      el.style.removeProperty("grid-column");
      el.style.removeProperty("grid-row");
      delete el.dataset.bentoCol;
      delete el.dataset.bentoColSpan;
      delete el.dataset.bentoRow;
      delete el.dataset.bentoRowSpan;
    }
  }

  function serialize(grid) {
    const items = {};
    for (const el of tiles(grid)) {
      items[el.dataset.bentoId] = readPlacement(el);
    }
    return { version: VERSION, items };
  }

  function applySaved(grid, layout) {
    const items = layout?.items || {};
    let row = 1;
    for (const el of tiles(grid)) {
      const id = el.dataset.bentoId;
      const saved = items[id];
      if (saved) {
        applyPlacement(el, saved);
      } else {
        applyPlacement(el, { c: 1, cs: defaultSpan(el), r: row, rs: 1 });
        row += 1;
      }
    }
  }

  function metaToolbarHost(grid) {
    const scope = grid.closest(".bento-grid") || grid.parentElement || grid;
    const strip = scope.querySelector(":scope > .meta-strip") || scope.querySelector(".meta-strip");
    if (!strip) return null;
    let main = strip.querySelector(".meta-strip-main");
    if (!main) {
      main = document.createElement("div");
      main.className = "meta-strip-main";
      strip.prepend(main);
    }
    main.style.display = "flex";
    main.style.alignItems = "flex-start";
    main.style.justifyContent = "space-between";
    main.style.gap = "12px";
    main.style.width = "100%";
    return main;
  }

  function ensureIndicator(grid, state) {
    if (state.indicator) return;
    const indicator = document.createElement("div");
    indicator.className = "bento-layout-drop-indicator";
    grid.appendChild(indicator);
    state.indicator = indicator;
  }

  function ensureToolbar(grid, state, mode) {
    ensureIndicator(grid, state);
    if (mode === "none") {
      state.toolbarMode = "none";
      if (state.toolbar) {
        state.toolbar.remove();
        state.toolbar = null;
      }
      return;
    }
    if (state.toolbar && state.toolbarMode === mode) return;
    if (state.toolbar) state.toolbar.remove();

    const bar = document.createElement("div");
    bar.className = "bento-layout-toolbar meta-inline";
    bar.innerHTML = `
      <button type="button" class="layout-edit-btn" data-bento-edit>Edit layout</button>
      <button type="button" data-bento-reset hidden>Reset default</button>
      <button type="button" data-bento-done class="primary" hidden>Done</button>
    `;
    const host = metaToolbarHost(grid);
    if (host) {
      host.appendChild(bar);
    } else {
      bar.style.margin = "8px 0 0";
      grid.parentElement?.insertBefore(bar, grid) || grid.prepend(bar);
    }
    state.toolbar = bar;
    state.toolbarMode = mode;

    bar.querySelector("[data-bento-edit]").addEventListener("click", () => setEditing(state, true));
    bar.querySelector("[data-bento-done]").addEventListener("click", () => setEditing(state, false));
    bar.querySelector("[data-bento-reset]").addEventListener("click", () => resetLayout());
  }

  function decorateTiles(state) {
    for (const el of tiles(state.grid)) {
      if (!el.querySelector(".bento-drag-handle")) {
        const handle = document.createElement("div");
        handle.className = "bento-drag-handle";
        handle.textContent = "Drag to move";
        el.prepend(handle);
      }
      if (!el.querySelector(".bento-resize-handle")) {
        const resize = document.createElement("div");
        resize.className = "bento-resize-handle";
        resize.title = "Drag to resize width";
        el.appendChild(resize);
      }
    }
  }

  function persist(state) {
    saveDashboardPrefs(storageKey(state.dashboardId), serialize(state.grid));
  }

  function syncToolbarButtons(state) {
    if (!state.toolbar) return;
    const on = state.editing;
    const edit = state.toolbar.querySelector("[data-bento-edit]");
    const reset = state.toolbar.querySelector("[data-bento-reset]");
    const done = state.toolbar.querySelector("[data-bento-done]");
    if (edit) edit.hidden = on;
    if (reset) reset.hidden = !on;
    if (done) done.hidden = !on;
  }

  function setEditing(state, on) {
    state.editing = on;
    state.grid.classList.toggle("bento-layout-editing", on);
    if (on) decorateTiles(state);
    syncToolbarButtons(state);
    if (!on) persist(state);
  }

  function cellFromPoint(grid, clientX, clientY) {
    const rect = grid.getBoundingClientRect();
    const x = Math.max(0, Math.min(rect.width - 1, clientX - rect.left));
    const y = Math.max(0, clientY - rect.top);
    const colWidth = rect.width / COLS;
    const c = Math.max(1, Math.min(COLS, Math.floor(x / colWidth) + 1));
    const rowHeight = 72;
    const r = Math.max(1, Math.floor(y / rowHeight) + 1);
    return { c, r };
  }

  function showIndicator(state, p, cs) {
    const rect = state.grid.getBoundingClientRect();
    const colWidth = rect.width / COLS;
    state.indicator.style.display = "block";
    state.indicator.style.left = `${rect.left + (p.c - 1) * colWidth}px`;
    state.indicator.style.top = `${rect.top + (p.r - 1) * 72}px`;
    state.indicator.style.width = `${colWidth * cs}px`;
    state.indicator.style.height = "68px";
  }

  function hideIndicator(state) {
    if (state.indicator) state.indicator.style.display = "none";
  }

  function bindInteractions(state) {
    if (state.bound) return;
    state.bound = true;

    function onPointerMove(ev) {
      if (!state.dragging && !state.resizing) return;
      if (state.dragging) {
        const p = cellFromPoint(state.grid, ev.clientX, ev.clientY);
        const cs = Number(state.dragging.dataset.bentoColSpan || defaultSpan(state.dragging));
        showIndicator(state, p, cs);
      }
      if (state.resizing) {
        const rect = state.grid.getBoundingClientRect();
        const colWidth = rect.width / COLS;
        const delta = ev.clientX - state.resizeStartX;
        const next = Math.max(2, Math.min(COLS, Math.round(state.resizeStartSpan + delta / colWidth)));
        applyPlacement(state.resizing, {
          c: Number(state.resizing.dataset.bentoCol || 1),
          cs: next,
          r: Number(state.resizing.dataset.bentoRow || 1),
          rs: Number(state.resizing.dataset.bentoRowSpan || 1),
        });
      }
    }

    function onPointerUp(ev) {
      if (state.dragging) {
        const p = cellFromPoint(state.grid, ev.clientX, ev.clientY);
        const cs = Number(state.dragging.dataset.bentoColSpan || defaultSpan(state.dragging));
        applyPlacement(state.dragging, {
          c: p.c,
          cs,
          r: p.r,
          rs: Number(state.dragging.dataset.bentoRowSpan || 1),
        });
        persist(state);
      }
      if (state.resizing) persist(state);
      state.dragging = null;
      state.resizing = null;
      hideIndicator(state);
      window.removeEventListener("pointermove", onPointerMove);
      window.removeEventListener("pointerup", onPointerUp);
    }

    state.grid.addEventListener("pointerdown", (ev) => {
      if (!state.editing) return;
      const handle = ev.target.closest(".bento-resize-handle");
      const drag = ev.target.closest(".bento-drag-handle");
      const tile = ev.target.closest("[data-bento-id]");
      if (!tile || !state.grid.contains(tile)) return;
      if (handle) {
        state.resizing = tile;
        state.resizeStartX = ev.clientX;
        state.resizeStartSpan = Number(tile.dataset.bentoColSpan || defaultSpan(tile));
        ev.preventDefault();
        window.addEventListener("pointermove", onPointerMove);
        window.addEventListener("pointerup", onPointerUp);
        return;
      }
      if (drag) {
        state.dragging = tile;
        ev.preventDefault();
        window.addEventListener("pointermove", onPointerMove);
        window.addEventListener("pointerup", onPointerUp);
      }
    });
  }

  function getState(grid) {
    return mounted.get(grid) || null;
  }

  function mount(grid, options) {
    if (!grid) return null;
    const dashboardId = options?.dashboardId || grid.dataset.bentoDashboard;
    if (!dashboardId) return null;
    grid.classList.add("bento-layout-root");
    if (!grid.dataset.bentoDashboard) grid.dataset.bentoDashboard = dashboardId;

    const toolbarMode = resolveToolbarMode(options);
    let state = mounted.get(grid);
    if (!state) {
      state = { grid, dashboardId, editing: false };
      mounted.set(grid, state);
      bindInteractions(state);
    }
    state.dashboardId = dashboardId;
    ensureToolbar(grid, state, toolbarMode);

    const saved = loadDashboardPrefs(storageKey(dashboardId));
    if (saved?.items) applySaved(grid, saved);
    decorateTiles(state);
    window.__dlaBentoReady = true;
    return state;
  }

  function apply(grid, dashboardId, options) {
    const id = dashboardId || grid?.dataset?.bentoDashboard;
    if (!grid || !id) return;
    mount(grid, Object.assign({ dashboardId: id }, options || {}));
    const state = getState(grid);
    if (!state) return;
    const saved = loadDashboardPrefs(storageKey(id));
    if (saved?.items) applySaved(grid, saved);
    decorateTiles(state);
    window.__dlaBentoReady = true;
  }

  function openEditor() {
    const root = layoutRoot();
    if (!root) return false;
    const id = root.dataset.bentoDashboard;
    apply(root, id, { toolbar: "none" });
    const state = getState(root);
    if (state) setEditing(state, true);
    return Boolean(state);
  }

  function closeEditor() {
    const root = layoutRoot();
    if (!root) return false;
    const state = getState(root);
    if (!state) return false;
    setEditing(state, false);
    return true;
  }

  function resetLayout() {
    const root = layoutRoot();
    if (!root) return false;
    const state = getState(root) || mount(root, { dashboardId: root.dataset.bentoDashboard, toolbar: "none" });
    if (!state) return false;
    localStorage.removeItem(storageKey(state.dashboardId));
    clearPlacements(state.grid);
    decorateTiles(state);
    return true;
  }

  function isEditing() {
    const root = layoutRoot();
    const state = root ? getState(root) : null;
    return Boolean(state?.editing);
  }

  if (!window.__dlaBentoMessageBound) {
    window.__dlaBentoMessageBound = true;
    window.addEventListener("message", (ev) => {
      const msg = ev.data;
      if (!msg || typeof msg !== "object") return;
      if (msg.type === "dla-bento-open") openEditor();
      if (msg.type === "dla-bento-close") closeEditor();
      if (msg.type === "dla-bento-reset") resetLayout();
    });
  }

  return { mount, apply, openEditor, closeEditor, resetLayout, isEditing, getState, storageKey, VERSION };
})();
    const DATA = JSON.parse(document.getElementById("dashboard-data").textContent);
    const app = document.getElementById("app");
    const esc = (v) => String(v == null ? "" : v).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    const fmt = (v) => Number(v || 0).toLocaleString("en-US");
    const slug = (v) => String(v || "").replaceAll(" ", "-");
    function barPanel(title, rows, tileId, span = 4) {
      const max = Math.max(1, ...rows.map((r) => Number(r.value || 0)));
      return `<section class="panel" data-bento-id="${esc(tileId)}" data-bento-span="${span}"><h2>${esc(title)}</h2>${rows.map((r) => `<div class="bar-row"><div>${esc(r.label)}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.max(2, r.value / max * 100).toFixed(2)}%"></div></div><div class="num">${fmt(r.value)}</div></div>`).join("")}</section>`;
    }
    function statusSection(section) {
      const chips = [
        `<span class="chip">Ahead: ${fmt(section.ahead)}</span>`,
        `<span class="chip">Not due: ${fmt(section.not_due)}</span>`,
        `<span class="chip">OnTrack: ${fmt(section.on_track)}</span>`,
        `<span class="chip">Late: ${fmt(section.late)}</span>`,
        ...section.members.map((m) => `<span class="chip">${esc(m.label)}: ${fmt(m.value)}</span>`)
      ].join("");
      return `<section class="status-section" data-bento-id="status-${esc(slug(section.status))}" data-bento-span="12">
        <div class="section-head"><h2><span class="badge status-${slug(section.status)}">${esc(section.status)}</span></h2><div class="value">${fmt(section.count)}</div></div>
        <div class="chips">${chips}</div>
        <div class="table-wrap"><table>
          <thead><tr><th>Ticket</th><th>Family</th><th>Package</th><th>Handler</th><th>Plan Status</th><th>Workflow</th><th>Plan</th><th>Actual</th><th>Match</th></tr></thead>
          <tbody>${section.tickets.map((row) => `<tr>
            <td>#${esc(row.ticket)}</td><td>${esc(row.family)}</td><td>${esc(row.package)}</td><td>${esc(row.handler)}</td>
            <td><span class="badge plan-${slug(row.plan_status)}">${esc(row.plan_status)}</span></td>
            <td>${esc(row.workflow)}</td><td>${esc(row.plan_stage)} ${row.plan_week ? '(' + esc(row.plan_week) + ')' : ''}</td><td>${esc(row.actual_stage)}</td><td>${esc(row.match_method)}</td>
          </tr>`).join("")}</tbody>
        </table></div>
      </section>`;
    }
    app.innerHTML = `
      <div class="card panel" data-bento-id="status-kpi-ticketed" data-bento-span="2"><div class="label">Ticketed TIDP Families</div><div class="value">${fmt(DATA.summary.ticketed_tidp_families)}</div><div class="sub">All matched families</div></div>
      <div class="card panel" data-bento-id="status-kpi-assigned" data-bento-span="2"><div class="label">Assigned To Digital</div><div class="value">${fmt(DATA.summary.assigned_to_digital)}</div><div class="sub">Current handler is Digital Team</div></div>
      <div class="card panel" data-bento-id="status-kpi-new" data-bento-span="2"><div class="label">New</div><div class="value">${fmt(DATA.summary.new)}</div><div class="sub">Ticket-system status</div></div>
      <div class="card panel" data-bento-id="status-kpi-assigned-count" data-bento-span="2"><div class="label">Assigned</div><div class="value">${fmt(DATA.summary.assigned)}</div><div class="sub">Ticket-system status</div></div>
      <div class="card panel" data-bento-id="status-kpi-resolved" data-bento-span="2"><div class="label">Resolved / Closed</div><div class="value">${fmt(DATA.summary.resolved_closed)}</div><div class="sub">Ticket-system status</div></div>
      <div class="card panel" data-bento-id="status-kpi-late" data-bento-span="2"><div class="label">Late</div><div class="value">${fmt(DATA.summary.late)}</div><div class="sub">Plan vs actual</div></div>
      ${barPanel("Load by Member", DATA.member_counts, "status-bar-member", 6)}${barPanel("Plan Status", DATA.plan_counts, "status-bar-plan", 6)}
      ${DATA.status_rows.map(statusSection).join("")}`;
    const grid = document.querySelector('.bento-grid[data-bento-dashboard]');
    DlaBentoLayout.apply(grid, DATA.layout_id || 'annotation-status', { toolbar: 'none' });
  </script>
</body>
