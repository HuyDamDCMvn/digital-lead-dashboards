}
function loadLayout(dashboardId) {

}
const DlaBentoLayout = (() => {
  const VERSION = 4;
  const COLS = 12;
  const mounted = new WeakMap();

  function storageKey(dashboardId) {
    return `dla-bento-layout:v${VERSION}:${dashboardId}`;
  }

  function inIframe() {
    try {
      return window.self !== window.top;
    } catch {
      return true;
    }
  }

  function resolveToolbarMode(options) {
    const mode = options?.toolbar;
    if (mode === "none" || mode === "meta") return mode;
    return inIframe() ? "none" : "meta";
  }

  function layoutRoot() {
    return (
      document.querySelector("[data-bento-dashboard]") ||
      document.querySelector(".bento-grid.bento-layout-root") ||
      document.querySelector(".bento-grid")
    );
  }

  function tiles(grid) {
    if (!grid) return [];
    return [...grid.querySelectorAll("[data-bento-id]")].filter((el) => {
      let parent = el.parentElement;
      while (parent && parent !== grid) {
        if (parent.matches("[data-bento-id]")) return false;
        parent = parent.parentElement;
      }
      return true;
    });
  }

  function defaultSpan(el) {
    const attr = Number(el.dataset.bentoSpan || el.getAttribute("data-bento-span") || 0);
    if (attr > 0) return Math.min(COLS, attr);
    const match = String(el.className || "").match(/bento-span-(\d+)/);
    if (match) return Math.min(COLS, Number(match[1]));
    if (el.classList.contains("tt-compliance-panel") || el.classList.contains("tt-entries")) return 12;
    if (el.classList.contains("tt-project")) return 7;
    if (el.classList.contains("tt-detail")) return 5;
    if (el.classList.contains("tt-breakdown")) return 4;
    if (el.classList.contains("tt-toolbar") || el.classList.contains("tt-chips")) return 12;
    return 6;
  }

  function readPlacement(el) {
    const cs = getComputedStyle(el);
    const col = Number(el.dataset.bentoCol || 0);
    const span = Number(el.dataset.bentoColSpan || 0);
    const row = Number(el.dataset.bentoRow || 0);
    const rowSpan = Number(el.dataset.bentoRowSpan || 1);
    if (col && span) {
      return { c: col, cs: span, r: row || 1, rs: rowSpan || 1 };
    }
    const gc = cs.gridColumnStart;
    const gspan = cs.gridColumnEnd;
    const gr = cs.gridRowStart;
    const grs = cs.gridRowEnd;
    let c = 1;
    let csVal = defaultSpan(el);
    let r = 1;
    let rs = 1;
    if (gc && gc !== "auto") c = Number(gc);
    if (gspan && gspan !== "auto" && String(gspan).includes("span")) {
      csVal = Number(String(gspan).replace("span", "").trim()) || csVal;
    }
    if (gr && gr !== "auto") r = Number(gr);
    if (grs && grs !== "auto" && String(grs).includes("span")) {
      rs = Number(String(grs).replace("span", "").trim()) || 1;
    }
    return { c, cs: csVal, r, rs };
  }

  function applyPlacement(el, p) {
    const c = Math.max(1, Math.min(COLS, Number(p.c || 1)));
    const cs = Math.max(1, Math.min(COLS, Number(p.cs || defaultSpan(el))));
    const safeC = Math.min(c, COLS - cs + 1);
    const r = Math.max(1, Number(p.r || 1));
    const rs = Math.max(1, Number(p.rs || 1));
    el.style.setProperty("grid-column", `${safeC} / span ${cs}`, "important");
    el.style.setProperty("grid-row", `${r} / span ${rs}`, "important");
    el.dataset.bentoCol = String(safeC);
    el.dataset.bentoColSpan = String(cs);
    el.dataset.bentoRow = String(r);
    el.dataset.bentoRowSpan = String(rs);
  }

  function rowFromTop(topPx, metrics) {
    return Math.max(1, Math.floor(Math.max(0, topPx) / metrics.rowUnit) + 1);
  }

  function columnFromLeft(leftPx, cs, metrics) {
    let c = Math.floor(Math.max(0, leftPx) / metrics.colUnit) + 1;
    return Math.max(1, Math.min(COLS - cs + 1, c));
  }

  function packLayoutDefault(grid, onlyMissing = true) {
    const list = sortedTiles(grid).filter((el) => !(onlyMissing && el.dataset.bentoCol));
    let row = 1;
    let col = 1;
    for (const el of list) {
      const cs = Math.max(1, Math.min(COLS, Number(el.dataset.bentoColSpan || defaultSpan(el))));
      const rs = defaultRowSpan(el);
      if (cs >= COLS) {
        if (col > 1) {
          row += 1;
          col = 1;
        }
        applyPlacement(el, { c: 1, cs: COLS, r: row, rs });
        row += rs;
        col = 1;
        continue;
      }
      if (col + cs - 1 > COLS) {
        row += 1;
        col = 1;
      }
      applyPlacement(el, { c: col, cs, r: row, rs });
      col += cs;
      if (col > COLS) {
        row += 1;
        col = 1;
      }
    }
  }

  function sortedTiles(grid) {
    return tiles(grid)
      .map((el, idx) => ({
        el,
        idx,
        order: Number(el.dataset.bentoOrder || 0),
      }))
      .sort((a, b) => (a.order - b.order) || (a.idx - b.idx))
      .map((item) => item.el);
  }

  function defaultRowSpan(el) {
    const rs = Number(el.dataset.bentoRowSpan || 0);
    return rs > 0 ? rs : 1;
  }

  function packOrphans(grid) {
    for (const el of tiles(grid).filter((t) => !t.dataset.bentoCol)) {
      const cs = Math.max(1, Math.min(COLS, Number(el.dataset.bentoColSpan || defaultSpan(el))));
      const rs = defaultRowSpan(el);
      let placed = false;
      for (let row = 1; row < 400 && !placed; row += 1) {
        for (let col = 1; col <= COLS - cs + 1; col += 1) {
          const test = { c: col, cs, r: row, rs };
          if (!findOccupants(grid, el, test).length) {
            applyPlacement(el, test);
            placed = true;
            break;
          }
        }
      }
      if (!placed) applyPlacement(el, { c: 1, cs, r: 1, rs });
    }
  }

  function packLayoutFromVisual(grid, onlyMissing = true) {
    packLayoutDefault(grid, onlyMissing);
  }

  function isLayoutCorrupt(layout) {
    const items = Object.values(layout?.items || {});
    if (items.length < 4) return false;
    const atCol1 = items.filter((p) => Number(p.c || 1) === 1).length;
    if (atCol1 / items.length >= 0.85) return true;
    const rows = items.map((p) => Number(p.r || 1));
    const smallSpans = items.filter((p) => Number(p.cs || 1) <= 4).length;
    if (smallSpans >= 4) {
      const uniqueRows = new Set(rows).size;
      if (uniqueRows >= smallSpans * 0.8) return true;
    }
    return false;
  }

  function applyLayoutFromStorageOrDefault(grid, dashboardId) {
    const saved = loadLayout(dashboardId);
    if (saved?.items && !isLayoutCorrupt(saved)) {
      applySaved(grid, saved);
      if (saved._loadedFromVersion && saved._loadedFromVersion !== VERSION) {
        const st = getState(grid);
        if (st) persist(st);
      }
      return;
    }
    if (saved?.items && isLayoutCorrupt(saved)) {
      try {
        localStorage.removeItem(storageKey(dashboardId));
        for (const ver of [3, 2, 1]) {
          localStorage.removeItem(`dla-bento-layout:v${ver}:${dashboardId}`);
        }
      } catch {
        // ignore
      }
    }
    packLayoutDefault(grid, false);
  }

  function findRowForTop(grid, dragging, topPx) {
    const gridRect = grid.getBoundingClientRect();
    const scrollTop = grid.scrollTop || 0;
    const bands = tiles(grid)
      .filter((t) => t !== dragging)
      .map((t) => {
        const rect = t.getBoundingClientRect();
        return {
          row: Number(t.dataset.bentoRow || 1),
          mid: (rect.top + rect.bottom) / 2 - gridRect.top + scrollTop,
        };
      })
      .sort((a, b) => a.mid - b.mid);
    for (const band of bands) {
      if (topPx < band.mid) return Math.max(1, band.row);
    }
    return (bands.length ? Math.max(...bands.map((b) => b.row)) : 0) + 1;
  }

  function columnsOverlap(c1, cs1, c2, cs2) {
    const e1 = c1 + cs1 - 1;
    const e2 = c2 + cs2 - 1;
    return !(e1 < c2 || c1 > e2);
  }

  function isLocked(el) {
    if (!el) return false;
    if (el.dataset.bentoLocked === "true") return true;
    const id = String(el.dataset.bentoId || "");
    return id.endsWith("-meta") || id.includes("-toolbar") || id.includes("-filter");
  }

  function placementBox(p) {
    return {
      c: Number(p.c || 1),
      cs: Number(p.cs || 1),
      r: Number(p.r || 1),
      rs: Number(p.rs || 1),
    };
  }

  function boxesOverlap(a, b) {
    return !(
      a.c + a.cs - 1 < b.c ||
      b.c + b.cs - 1 < a.c ||
      a.r + a.rs - 1 < b.r ||
      b.r + b.rs - 1 < a.r
    );
  }

  function findOccupants(grid, tile, placement) {
    const box = placementBox(placement);
    return tiles(grid).filter((other) => {
      if (other === tile || isLocked(other)) return false;
      return boxesOverlap(box, placementBox(readPlacement(other)));
    });
  }

  function placeTile(grid, tile, placement) {
    const next = placementBox(placement);
    const moved = new Set();
    function resolveOverlaps(box, depth) {
      if (depth > tiles(grid).length + 2) return;
      for (const other of findOccupants(grid, tile, box)) {
        if (moved.has(other)) continue;
        const op = placementBox(readPlacement(other));
        const pushed = { c: op.c, cs: op.cs, r: box.r + box.rs, rs: op.rs };
        applyPlacement(other, pushed);
        moved.add(other);
        resolveOverlaps(placementBox(readPlacement(other)), depth + 1);
      }
    }
    resolveOverlaps(next, 0);
    applyPlacement(tile, next);
  }

  function defaultLayout(grid) {
    const items = {};
    for (const el of tiles(grid)) {
      items[el.dataset.bentoId] = readPlacement(el);
    }

            <td class="num">${fmtHours(row.planned_hours)}</td><td class="num">${fmtHours(row.actual_hours)}</td>
          </tr>`).join("") : '<tr><td colspan="14">No tickets currently held.</td></tr>'}</tbody>
        </table></div>
      </section>`;
    }
    function render() {
      const members = currentMembers();
      app.innerHTML = `
        <div class="card panel" data-bento-id="member-kpi-ticketed" data-bento-span="2"><div class="label">Ticketed TIDP</div><div class="value">${fmt(DATA.summary.ticketed_tidp_families)}</div><div class="sub">Matched families</div></div>
        <div class="card panel" data-bento-id="member-kpi-held" data-bento-span="2"><div class="label">Held by Digital</div><div class="value">${fmt(DATA.summary.assigned_to_digital)}</div><div class="sub">Current handler is Digital Team</div></div>
        <div class="card panel" data-bento-id="member-kpi-members" data-bento-span="2"><div class="label">Members</div><div class="value">${fmt(DATA.summary.members_with_work)}/8</div><div class="sub">Have current workload</div></div>
        <div class="card panel" data-bento-id="member-kpi-late" data-bento-span="2"><div class="label">Late</div><div class="value">${fmt(DATA.summary.late)}</div><div class="sub">Plan vs actual</div></div>
        <div class="card panel" data-bento-id="member-kpi-due" data-bento-span="2"><div class="label">Due Risk</div><div class="value">${fmt(DATA.summary.due_risk)}</div><div class="sub">Overdue / today / soon</div></div>
        <div class="card panel" data-bento-id="member-kpi-planned" data-bento-span="2"><div class="label">Planned Hours</div><div class="value">${fmtHours(DATA.summary.planned_hours)}</div><div class="sub">Current held tickets</div></div>
        <div class="card panel" data-bento-id="member-kpi-actual" data-bento-span="2"><div class="label">Actual Hours</div><div class="value">${fmtHours(DATA.summary.actual_hours)}</div><div class="sub">All logged on held tickets</div></div>
        ${bars("Ticket Status", DATA.status_rows, "status", "status", "count", "member-bar-status")}
        ${bars("Due State", DATA.due_rows, "due_assessment", "label", "value", "member-bar-due")}
        ${bars("Plan Status", DATA.plan_rows, "plan_status", "label", "value", "member-bar-plan")}
        <section class="filter-strip bento-cell bento-span-12" data-bento-id="member-filter" data-bento-span="12" data-bento-locked="true" ${activeFilter ? "" : "hidden"}><div class="filter-pill">${filterSummary(members)}</div><button type="button" class="clear-filter" data-clear-filter="1">Clear filter</button></section>
        ${members.length ? members.map(memberSection).join("") : '<section class="member bento-cell bento-span-12" data-bento-id="member-empty" data-bento-span="12"><div class="sub">No tickets match the selected filter.</div></section>'}`;
      const grid = document.querySelector('.bento-grid[data-bento-dashboard]');
      const layoutId = DATA.layout_id || 'annotation-member-tickets';
      if (!window.__dlaMemberBentoMounted) {
        DlaBentoLayout.mount(grid, { dashboardId: layoutId, toolbar: 'none' });
        window.__dlaMemberBentoMounted = true;
      } else {
        DlaBentoLayout.refreshTiles(grid, layoutId, { toolbar: 'none' });
      }
    }
    app.addEventListener("click", (event) => {
      const clear = event.target.closest("[data-clear-filter]");
      if (clear) {
        activeFilter = null;
        render();
        return;
      }
      const control = event.target.closest("[data-filter-field]");
      if (!control) return;
      const next = { field: control.dataset.filterField, value: control.dataset.filterValue };
      activeFilter = activeFilter && activeFilter.field === next.field && activeFilter.value === next.value ? null : next;
      render();
    });
    render();
  </script>
</body>
</html>
