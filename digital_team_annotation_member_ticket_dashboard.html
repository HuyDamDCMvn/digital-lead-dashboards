<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">

  <title>Digital Team Member Workload - DCMvn Annotation Project</title>
  <style>
    
:root {
  color-scheme: light;
  --bg: #f4f6f8;
  --panel: #ffffff;
  --surface-raised: #f8fafc;
  --ink: #0f172a;
  --muted: #475569;
  --line: #e2e8f0;
  --accent: #0f766e;
  --accent-strong: #115e59;
  --accent-soft: #ccfbf1;
  --hero-bg: #134e4a;
  --shadow: 0 4px 14px rgba(15, 23, 42, 0.07);
  --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.06);
  --radius: 10px;
  --radius-lg: 12px;
  --font: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  --transition: 160ms cubic-bezier(0.22, 1, 0.36, 1);
  --focus-ring: 0 0 0 3px var(--accent-soft);
  --sidebar: #eef3f9;
  --danger: #b91c1c;
  --danger-soft: #fee2e2;
  --success: #166534;
  --success-soft: #dcfce7;
  --warning: #92400e;
  --warning-soft: #fef3c7;
  --control-height: 40px;
  --type-kpi: 1.75rem;
  --type-section: 1.0625rem;
  --type-label: 0.75rem;
}


* { box-sizing: border-box; }
html { overflow-x: clip; }
body {
  margin: 0;
  font-family: var(--font);
  color: var(--ink);
  background: var(--bg);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  overflow-x: clip;
  max-width: 100%;
}
.table-wrap, .compliance-wrap, .heatmap-wrap {
  display: block;
  width: 100%;
  max-width: 100%;
  min-width: 0;
  overflow-x: auto;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior-x: contain;
}
.table-wrap > table,
.compliance-wrap > table,
.heatmap-wrap > table {
  max-width: none;
}
main, .wrap, .shell, .app, .bento-grid, .bento-nested, .bento-cell,
.project-stack, .project-section, .member-section, .member, .panel, .card {
  max-width: 100%;
  min-width: 0;
}
@media (max-width: 767px) {
  .project-stack, .project-section, .member-section, .member, .members {
    overflow-x: clip;
  }
}
.chip button, .filter-chip button, [data-clear] {
  min-width: 28px;
  min-height: 28px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}
button, input, select { font: inherit; }
button { cursor: pointer; }
button:focus-visible, input:focus-visible, select:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
  box-shadow: var(--focus-ring);
}
.skip-link {
  position: absolute;
  left: 8px;
  top: 8px;
  z-index: 1000;
  padding: 8px 12px;
  background: var(--ink);
  color: #fff;
  border-radius: var(--radius);
  text-decoration: none;
  clip: rect(0 0 0 0);
  clip-path: inset(50%);
  height: 1px;
  width: 1px;
  overflow: hidden;
  white-space: nowrap;
}
.skip-link:focus, .skip-link:focus-visible {
  clip: auto;
  clip-path: none;
  height: auto;
  width: auto;
  overflow: visible;
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}
.visually-hidden {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0 0 0 0);
  white-space: nowrap;
  border: 0;
}
a:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}


:root { --bento-gap: 14px; }
.bento-grid {

.meta-strip {

}

}

}

.empty-state {

}
.empty-state[hidden] { display: none !important; }

}

}
.empty-state-action {

}
.empty-state-action:hover { background: var(--accent-strong); border-color: var(--accent-strong); }

.empty-state--nodata { border-style: solid; }

}
.skeleton-panel {
  display: grid;
  gap: 10px;
  padding: 16px;
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  background: var(--panel);
}
.skeleton-panel[hidden] { display: none !important; }
.skeleton-line, .skeleton-kpi, .skeleton-row {
  display: block;
  border-radius: 6px;
  background: linear-gradient(90deg, var(--line) 0%, var(--surface-raised) 50%, var(--line) 100%);
  background-size: 200% 100%;
  animation: dla-skeleton-shimmer 1.2s ease-in-out infinite;
}
.skeleton-line { height: 12px; width: 100%; }
.skeleton-line.w-60 { width: 60%; }
.skeleton-line.w-40 { width: 40%; }
.skeleton-kpi { height: 44px; width: 100%; }
.skeleton-row { height: 32px; width: 100%; }
.skeleton-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 10px;
}
.is-loading {
  position: relative;
  pointer-events: none;
}
.is-loading > *:not(.skeleton-panel) { opacity: 0.35; }
@keyframes dla-skeleton-shimmer {
  0% { background-position: 100% 0; }
  100% { background-position: -100% 0; }
}
@media (prefers-reduced-motion: reduce) {
  .skeleton-line, .skeleton-kpi, .skeleton-row {
    animation: none;
    background: var(--line);
  }
}
.freshness-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 2px 8px;
  border-radius: 999px;
  font-size: 0.6875rem;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  border: 1px solid var(--line);
}
.freshness-pill[data-freshness="fresh"] {
  color: var(--success, #166534);

  border-color: color-mix(in srgb, var(--success, #166534) 25%, var(--line));
}
.freshness-pill[data-freshness="stale"] {
  color: var(--warning, #92400e);
  background: var(--warning-soft, #fef3c7);
  border-color: color-mix(in srgb, var(--warning, #92400e) 25%, var(--line));
}
.freshness-pill[data-freshness="missing"] {
  color: var(--danger, #b91c1c);
  background: var(--danger-soft, #fee2e2);
  border-color: color-mix(in srgb, var(--danger, #b91c1c) 25%, var(--line));
}


.bento-grid.bento-layout-root {
  position: relative;
  grid-auto-rows: minmax(72px, auto);
}
[data-bento-host] { display: contents; }
.bento-grid.bento-layout-editing [data-bento-id]:not([data-bento-id] [data-bento-id]) {
  outline: 2px dashed var(--accent, #0f766e);

  cursor: default;
  touch-action: none;
  position: relative;
}
.bento-grid.bento-layout-editing [data-bento-id]:not([data-bento-id] [data-bento-id])[data-bento-locked="true"] {
  outline: 2px solid rgba(15, 118, 110, 0.35);
  outline-offset: -2px;

  opacity: 0.92;
}
.bento-grid.bento-layout-editing [data-bento-id]:not([data-bento-id] [data-bento-id]):not([data-bento-locked="true"]) .bento-drag-handle {

}
.bento-grid.bento-layout-editing [data-bento-id]:not([data-bento-id] [data-bento-id]):not([data-bento-locked="true"]) .bento-resize-handle {
  display: block;
}
.bento-drag-handle {
  display: none;
  align-items: center;
  gap: 6px;
  margin: -4px 0 8px;
  padding: 8px 12px;
  min-height: 28px;
  border-radius: 6px;
  background: var(--accent-soft, #ccfbf1);
  color: var(--accent-strong, #115e59);
  font-size: 0.6875rem;
  font-weight: 700;
  letter-spacing: 0.04em;

  cursor: grab;

  width: fit-content;

}
.bento-drag-handle::before {
  content: "⋮⋮";

}
.bento-drag-handle:active { cursor: grabbing; }
.bento-resize-handle {
  display: none;
  position: absolute;

}
.bento-resize-handle::after {

  height: 10px;

}
.bento-resize-row-handle {
  display: none;

  left: 50%;
  bottom: 4px;
  transform: translateX(-50%);
  width: 48px;
  height: 8px;
  min-height: 8px;
  border-radius: 999px;

}
.bento-grid.bento-layout-editing [data-bento-id]:not([data-bento-id] [data-bento-id]):not([data-bento-locked="true"]) {
  padding-bottom: 28px;
}
.bento-grid.bento-layout-editing [data-bento-id]:not([data-bento-id] [data-bento-id]):not([data-bento-locked="true"]) .bento-resize-row-handle {
  display: block;
}
.bento-grid.bento-layout-editing [data-bento-id]:not([data-bento-id] [data-bento-id]):not([data-bento-locked="true"]):hover .bento-resize-row-handle {

}
@media (prefers-reduced-motion: reduce) {
  .bento-layout-drop-indicator,
  .bento-drag-handle,
  .bento-resize-handle,
  .bento-resize-row-handle {
    transition: none !important;
  }
}
.bento-layout-toolbar {
  display: inline-flex;

}

}

}

}

.bento-grid.bento-layout-editing [data-bento-id]:not([data-bento-id] [data-bento-id]).bento-tile-dragging {

}

}
@media (max-width: 767px) {

  .bento-grid.bento-layout-root:not(.bento-layout-editing) > [data-bento-id]:not([data-bento-id] [data-bento-id]) {

}
@media print {
  .bento-grid.bento-layout-root [data-bento-id]:not([data-bento-id] [data-bento-id]) {

.shell { max-width: 1840px; margin: 0 auto; padding: 16px; }

    function loadDashboardPrefs(key) {
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : null;
  } catch {
    return null;
  }
}
function loadLayout(dashboardId) {
  try {
    for (const ver of [6, 5, 4, 3, 2, 1]) {
      const raw = localStorage.getItem(`dla-bento-layout:v${ver}:${dashboardId}`);
      if (!raw) continue;
      const parsed = JSON.parse(raw);
      parsed._loadedFromVersion = ver;
      return parsed;
    }
  } catch {
    // ignore parse errors
  }
  return null;
}
function saveDashboardPrefs(key, value) {
  try {
    localStorage.setItem(key, JSON.stringify(value));
  } catch {
    // ignore quota / private mode
  }
}
const DlaBentoLayout = (() => {
  const VERSION = 6;
  const COLS = 12;
  const mounted = new WeakMap();

  function storageKey(dashboardId) {
    return `dla-bento-layout:v${VERSION}:${dashboardId}`;
  }

  function inIframe() {
    try {
      return window.self !== window.top;
    } catch {
      return true;
    }
  }

  function resolveToolbarMode(options) {
    const mode = options?.toolbar;
    if (mode === "none" || mode === "meta") return mode;
    return inIframe() ? "none" : "meta";
  }

  function layoutRoot() {
    return (
      document.querySelector("[data-bento-dashboard]") ||
      document.querySelector(".bento-grid.bento-layout-root") ||
      document.querySelector(".bento-grid")
    );
  }

  function tiles(grid) {
    if (!grid) return [];
    return [...grid.querySelectorAll("[data-bento-id]")].filter((el) => {
      let parent = el.parentElement;
      while (parent && parent !== grid) {
        if (parent.matches("[data-bento-id]")) return false;
        parent = parent.parentElement;
      }
      return true;
    });
  }

  function defaultSpan(el) {
    const attr = Number(el.dataset.bentoSpan || el.getAttribute("data-bento-span") || 0);
    if (attr > 0) return Math.min(COLS, attr);
    const match = String(el.className || "").match(/bento-span-(\d+)/);
    if (match) return Math.min(COLS, Number(match[1]));
    if (el.classList.contains("tt-compliance-panel") || el.classList.contains("tt-entries")) return 12;
    if (el.classList.contains("tt-project")) return 7;
    if (el.classList.contains("tt-detail")) return 5;
    if (el.classList.contains("tt-breakdown")) return 4;
    if (el.classList.contains("tt-toolbar") || el.classList.contains("tt-chips") || el.classList.contains("tt-metrics")) return 12;
    return 6;
  }

  function readPlacement(el) {
    const cs = getComputedStyle(el);
    const col = Number(el.dataset.bentoCol || 0);
    const span = Number(el.dataset.bentoColSpan || 0);
    const row = Number(el.dataset.bentoRow || 0);
    const rowSpan = Number(el.dataset.bentoRowSpan || 1);
    if (col && span) {
      return { c: col, cs: span, r: row || 1, rs: rowSpan || 1 };
    }
    const gc = cs.gridColumnStart;
    const gspan = cs.gridColumnEnd;
    const gr = cs.gridRowStart;
    const grs = cs.gridRowEnd;
    let c = 1;
    let csVal = defaultSpan(el);
    let r = 1;
    let rs = 1;
    if (gc && gc !== "auto") c = Number(gc);
    if (gspan && gspan !== "auto" && String(gspan).includes("span")) {
      csVal = Number(String(gspan).replace("span", "").trim()) || csVal;
    }
    if (gr && gr !== "auto") r = Number(gr);
    if (grs && grs !== "auto" && String(grs).includes("span")) {
      rs = Number(String(grs).replace("span", "").trim()) || 1;
    }
    return { c, cs: csVal, r, rs };
  }

  function applyPlacement(el, p) {
    const c = Math.max(1, Math.min(COLS, Number(p.c || 1)));
    const cs = Math.max(1, Math.min(COLS, Number(p.cs || defaultSpan(el))));
    const safeC = Math.min(c, COLS - cs + 1);
    const r = Math.max(1, Number(p.r || 1));
    const rs = Math.max(1, Number(p.rs || 1));
    el.style.setProperty("grid-column", `${safeC} / span ${cs}`, "important");
    el.style.setProperty("grid-row", `${r} / span ${rs}`, "important");
    el.dataset.bentoCol = String(safeC);
    el.dataset.bentoColSpan = String(cs);
    el.dataset.bentoRow = String(r);
    el.dataset.bentoRowSpan = String(rs);
  }

  function rowFromTop(topPx, metrics) {
    return Math.max(1, Math.floor(Math.max(0, topPx) / metrics.rowUnit) + 1);
  }

  function columnFromLeft(leftPx, cs, metrics) {
    let c = Math.floor(Math.max(0, leftPx) / metrics.colUnit) + 1;
    return Math.max(1, Math.min(COLS - cs + 1, c));
  }

  function packLayoutDefault(grid, onlyMissing = true) {
    const list = sortedTiles(grid).filter((el) => !(onlyMissing && el.dataset.bentoCol));
    let row = 1;
    let col = 1;
    for (const el of list) {
      const cs = Math.max(1, Math.min(COLS, Number(el.dataset.bentoColSpan || defaultSpan(el))));
      const rs = defaultRowSpan(el);
      const breakBefore =
        el.dataset.bentoBreak === "before" ||
        el.getAttribute("data-bento-break") === "before";
      if (breakBefore && col > 1) {
        row += 1;
        col = 1;
      }
      if (cs >= COLS) {
        if (col > 1) {
          row += 1;
          col = 1;
        }
        applyPlacement(el, { c: 1, cs: COLS, r: row, rs });
        row += rs;
        col = 1;
        continue;
      }
      if (col + cs - 1 > COLS) {
        row += 1;
        col = 1;
      }
      applyPlacement(el, { c: col, cs, r: row, rs });
      col += cs;
      if (col > COLS) {
        row += 1;
        col = 1;
      }
    }
  }

  function sortedTiles(grid) {
    return tiles(grid)
      .map((el, idx) => ({
        el,
        idx,
        order: Number(el.dataset.bentoOrder || 0),
      }))
      .sort((a, b) => (a.order - b.order) || (a.idx - b.idx))
      .map((item) => item.el);
  }

  function defaultRowSpan(el) {
    const rs = Number(el.dataset.bentoRowSpan || 0);
    return rs > 0 ? rs : 1;
  }

  function packOrphans(grid) {
    for (const el of tiles(grid).filter((t) => !t.dataset.bentoCol)) {
      const cs = Math.max(1, Math.min(COLS, Number(el.dataset.bentoColSpan || defaultSpan(el))));
      const rs = defaultRowSpan(el);
      let placed = false;
      for (let row = 1; row < 400 && !placed; row += 1) {
        for (let col = 1; col <= COLS - cs + 1; col += 1) {
          const test = { c: col, cs, r: row, rs };
          if (!findOccupants(grid, el, test).length) {
            applyPlacement(el, test);
            placed = true;
            break;
          }
        }
      }
      if (!placed) applyPlacement(el, { c: 1, cs, r: 1, rs });
    }
  }

  function packLayoutFromVisual(grid, onlyMissing = true) {
    packLayoutDefault(grid, onlyMissing);
  }

  function isLayoutCorrupt(layout) {
    // Only treat "almost everything forced to column 1" as corruption.
    // Dense KPI boards (many cs<=4 across many rows) are valid custom layouts
    // and must not be wiped on refreshTiles / Done.
    const items = Object.values(layout?.items || {});
    if (items.length < 4) return false;
    const atCol1 = items.filter((p) => Number(p.c || 1) === 1).length;
    if (atCol1 / items.length >= 0.85) return true;
    const rows = [...new Set(items.map((p) => Number(p.r || 1)))].sort((a, b) => a - b);
    const maxR = rows[rows.length - 1] || 1;
    // Huge empty bands (e.g. Ticket Status parked at row 20) look broken in edit mode.
    if (maxR > items.length + 3) return true;
    for (let i = 1; i < rows.length; i += 1) {
      if (rows[i] - rows[i - 1] > 3) return true;
    }
    return false;
  }

  function applyLayoutFromStorageOrDefault(grid, dashboardId) {
    const saved = loadLayout(dashboardId);
    const staleEngine =
      Boolean(saved?._loadedFromVersion) && saved._loadedFromVersion !== VERSION;
    if (saved?.items && !isLayoutCorrupt(saved) && !staleEngine) {
      applySaved(grid, saved);
      return;
    }
    if (saved?.items && (isLayoutCorrupt(saved) || staleEngine)) {
      try {

      return `${esc(config.label)}: <strong>${esc(activeFilter.value)}</strong> · ${fmt(total)} ticket${total === 1 ? "" : "s"}`;
    }
    function slugId(v) {
      return String(v || "tile").toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "");
    }
    function bars(title, rows, filterField, keyLabel = "label", keyValue = "value", tileId = "bars", breakBefore = false) {
      const max = Math.max(1, ...rows.map((r) => Number(r[keyValue] || 0)));
      const breakAttr = breakBefore ? ' data-bento-break="before"' : "";
      return `<section class="panel" data-bento-id="${esc(tileId)}" data-bento-span="4"${breakAttr}><h2>${esc(title)}</h2>${rows.map((r) => {
        const label = r[keyLabel];
        const isActive = activeFilter && activeFilter.field === filterField && activeFilter.value === label;
        return `<button type="button" class="bar-row${isActive ? " active" : ""}" data-filter-field="${esc(filterField)}" data-filter-value="${esc(label)}" title="Filter tickets by ${esc(title)}: ${esc(label)}">
          <div>${esc(label)}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.max(2, r[keyValue] / max * 100).toFixed(2)}%"></div></div><div class="num">${fmt(r[keyValue])}</div>
        </button>`;
      }).join("")}</section>`;
    }
    function memberSection(member) {
      const statusChips = Object.entries(member.status).filter(([,v]) => v).map(([k,v]) => `<span class="chip">${esc(k)}: ${fmt(v)}</span>`);
      const planChips = Object.entries(member.plan).filter(([,v]) => v).map(([k,v]) => `<span class="chip">${esc(k)}: ${fmt(v)}</span>`);
      const dueChips = Object.entries(member.due).filter(([,v]) => v).map(([k,v]) => `<span class="chip">${esc(k)}: ${fmt(v)}</span>`);
      return `<section class="member bento-cell bento-span-6" data-bento-id="member-${esc(slugId(member.username))}" data-bento-span="6">
        <div class="member-head"><h2>${esc(member.username)} <span class="sub">${esc(member.role)}</span></h2><div class="value">${fmt(member.total)}</div></div>
        <div class="chips">
          <span class="chip">Planned: ${fmtHours(member.planned_hours)}h</span>
          <span class="chip">Actual: ${fmtHours(member.actual_hours)}h</span>
          <span class="chip">Due risk: ${fmt(member.due_risk)}</span>
          <span class="chip">Late: ${fmt(member.late)}</span>
          ${statusChips.join("")}${planChips.join("")}${dueChips.join("")}
        </div>
        <div class="table-wrap"><table>
          <thead><tr><th>Ticket</th><th>Family / Ticket</th><th>Package</th><th>Status</th><th>Plan Status</th><th>Workflow</th><th>Plan/Actual Stage</th><th>Start</th><th>Due</th><th>Due State</th><th>Created</th><th>Updated</th><th>Planned h</th><th>Actual h</th></tr></thead>
          <tbody>${member.tickets.length ? member.tickets.map((row) => `<tr>
            <td data-label="Ticket">#${esc(row.ticket)}</td><td data-label="Family / Ticket">${esc(row.family || row.ticket_name)}</td><td data-label="Package">${esc(row.package)}</td>
            <td data-label="Status"><span class="badge status-${slug(row.status)}">${esc(row.status)}</span></td>
            <td data-label="Plan Status"><span class="badge plan-${slug(row.plan_status)}">${esc(row.plan_status)}</span></td>
            <td data-label="Workflow">${esc(row.workflow)}</td><td data-label="Plan/Actual Stage">${esc(row.plan_stage)}/${esc(row.actual_stage)}</td>
            <td data-label="Start">${esc(row.start_date)}</td><td data-label="Due">${esc(row.due_date)}</td><td data-label="Due State"><span class="badge due-${slug(row.due_assessment)}">${esc(row.due_assessment)}</span></td>
            <td data-label="Created">${esc(row.created)}</td><td data-label="Updated">${esc(row.last_updated)}</td>
            <td class="num" data-label="Planned h">${fmtHours(row.planned_hours)}</td><td class="num" data-label="Actual h">${fmtHours(row.actual_hours)}</td>
          </tr>`).join("") : '<tr><td colspan="14"><div class="empty-state empty-state--nodata" role="status"><p class="empty-state-title">No tickets currently held</p><p class="empty-state-message">This member has no open tickets in the current cutoff.</p></div></td></tr>'}</tbody>
        </table></div>
      </section>`;
    }
    function render() {
      const members = currentMembers();
      app.innerHTML = `
        <div class="card panel" data-bento-id="member-kpi-ticketed" data-bento-span="3"><div class="label">Ticketed TIDP</div><div class="value">${fmt(DATA.summary.ticketed_tidp_families)}</div><div class="sub">Matched families</div></div>
        <div class="card panel" data-bento-id="member-kpi-held" data-bento-span="3"><div class="label">Held by Digital</div><div class="value">${fmt(DATA.summary.assigned_to_digital)}</div><div class="sub">Current handler is Digital Team</div></div>
        <div class="card panel" data-bento-id="member-kpi-members" data-bento-span="3"><div class="label">Members</div><div class="value">${fmt(DATA.summary.members_with_work)}/8</div><div class="sub">Have current workload</div></div>
        <div class="card panel" data-bento-id="member-kpi-late" data-bento-span="3"><div class="label">Late</div><div class="value">${fmt(DATA.summary.late)}</div><div class="sub">Plan vs actual</div></div>
        <div class="card panel" data-bento-id="member-kpi-due" data-bento-span="4"><div class="label">Due Risk</div><div class="value">${fmt(DATA.summary.due_risk)}</div><div class="sub">Overdue / today / soon</div></div>
        <div class="card panel" data-bento-id="member-kpi-planned" data-bento-span="4"><div class="label">Planned Hours</div><div class="value">${fmtHours(DATA.summary.planned_hours)}</div><div class="sub">Current held tickets</div></div>
        <div class="card panel" data-bento-id="member-kpi-actual" data-bento-span="4"><div class="label">Actual Hours</div><div class="value">${fmtHours(DATA.summary.actual_hours)}</div><div class="sub">All logged on held tickets</div></div>
        ${bars("Ticket Status", DATA.status_rows, "status", "status", "count", "member-bar-status", true)}
        ${bars("Due State", DATA.due_rows, "due_assessment", "label", "value", "member-bar-due")}
        ${bars("Plan Status", DATA.plan_rows, "plan_status", "label", "value", "member-bar-plan")}
        <section class="filter-strip bento-cell bento-span-12" data-bento-id="member-filter" data-bento-span="12" data-bento-locked="true" ${activeFilter ? "" : "hidden"}><div class="filter-pill">${filterSummary(members)}</div><button type="button" class="clear-filter" data-clear-filter="1">Clear filter</button></section>
        ${members.length ? members.map(memberSection).join("") : '<section class="member bento-cell bento-span-12" data-bento-id="member-empty" data-bento-span="12"><div class="empty-state empty-state--filter" role="status"><p class="empty-state-title">No tickets match filters</p><p class="empty-state-message">Clear the chart filter to see member workload again.</p><button type="button" class="empty-state-action" data-clear-filter="1">Clear filter</button></div></section>'}`;
      const grid = document.querySelector('.bento-grid[data-bento-dashboard]');
      const layoutId = DATA.layout_id || 'annotation-member-tickets';
      if (!window.__dlaMemberBentoMounted) {
        DlaBentoLayout.mount(grid, { dashboardId: layoutId, toolbar: 'none' });
        window.__dlaMemberBentoMounted = true;
      } else {
        DlaBentoLayout.refreshTiles(grid, layoutId, { toolbar: 'none' });
      }
    }
    app.addEventListener("click", (event) => {
      const clear = event.target.closest("[data-clear-filter]");
      if (clear) {
        activeFilter = null;
        render();
        return;
      }
      const control = event.target.closest("[data-filter-field]");
      if (!control) return;
      const next = { field: control.dataset.filterField, value: control.dataset.filterValue };
      activeFilter = activeFilter && activeFilter.field === next.field && activeFilter.value === next.value ? null : next;
      render();
    });
    render();
  </script>
</body>
</html>
