<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Digital Team Time Tracking Dashboard</title>
  <style>
.dla-date-field {
  position: relative;
  display: flex;
  align-items: center;
  gap: 4px;
  width: 100%;
}
.dla-date-field input {
  flex: 1 1 auto;
  min-width: 0;
  cursor: pointer;
}
.dla-date-trigger,
.dla-date-clear {
  flex: 0 0 auto;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 32px;
  height: 32px;
  border: 1px solid var(--line-strong, #cbd5e1);
  border-radius: 8px;
  background: #fff;
  color: var(--text, #0f172a);
  padding: 0;
}
.dla-date-trigger:hover,
.dla-date-clear:hover {
  background: var(--surface-raised, #f8fafc);
}
.dla-date-clear {
  width: 28px;
  font-size: 1.1rem;
  line-height: 1;
}
.dla-date-field input.invalid-date {
  border-color: #dc2626;
  box-shadow: 0 0 0 1px #fecaca;
}
.dla-date-popup {
  position: fixed;
  z-index: 10050;
  width: 280px;
  padding: 12px;
  border: 1px solid var(--line-strong, #cbd5e1);
  border-radius: 12px;
  background: #fff;
  box-shadow: 0 16px 40px rgba(15, 23, 42, 0.18);
  color: var(--text, #0f172a);
}
.dla-date-popup-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 10px;
}
.dla-date-popup-title {
  font-weight: 600;
  font-size: 0.9375rem;
}
.dla-date-popup-nav {
  display: inline-flex;
  gap: 4px;
}
.dla-date-popup-nav button {
  width: 28px;
  height: 28px;
  border: 1px solid var(--line, #e2e8f0);
  border-radius: 8px;
  background: #fff;
  cursor: pointer;
}
.dla-date-popup-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
}
.dla-date-popup-grid .dla-cal-wd {
  text-align: center;
  font-size: 0.6875rem;
  font-weight: 600;
  color: var(--muted, #64748b);
  padding: 2px 0 6px;
}
.dla-date-popup-grid button {
  height: 32px;
  border: none;
  border-radius: 8px;
  background: transparent;
  cursor: pointer;
  font-variant-numeric: tabular-nums;
}
.dla-date-popup-grid button:hover:not(:disabled) {
  background: var(--surface-raised, #f1f5f9);
}
.dla-date-popup-grid button.is-selected {
  background: var(--accent, #0f766e);
  color: #fff;
}
.dla-date-popup-grid button.is-today {
  box-shadow: inset 0 0 0 1px var(--accent, #0f766e);
}
.dla-date-popup-grid button:disabled {
  opacity: 0.35;
  cursor: not-allowed;
}
.dla-date-popup-grid button.is-outside {
  color: var(--muted, #94a3b8);
}

:root {
  color-scheme: light;
  --bg: #f4f6f8;
  --panel: #ffffff;
  --surface-raised: #f8fafc;
  --ink: #0f172a;
  --muted: #475569;
  --line: #e2e8f0;
  --accent: #0f766e;
  --accent-strong: #115e59;
  --accent-soft: #ccfbf1;
  --hero-bg: #134e4a;
  --shadow: 0 4px 14px rgba(15, 23, 42, 0.07);
  --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.06);
  --radius: 10px;
  --radius-lg: 12px;
  --font: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  --transition: 160ms cubic-bezier(0.22, 1, 0.36, 1);
}


* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: var(--font);
  color: var(--ink);
  background: var(--bg);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
button, input, select { font: inherit; }
button { cursor: pointer; }
button:focus-visible, input:focus-visible, select:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}


:root { --bento-gap: 14px; }
.bento-grid {
  display: grid;
  grid-template-columns: repeat(12, minmax(0, 1fr));
  gap: var(--bento-gap);
  align-items: start;
}
.bento-cell { min-width: 0; }
.bento-span-12 { grid-column: span 12; }
.bento-span-8 { grid-column: span 8; }
.bento-span-6 { grid-column: span 6; }
.bento-span-4 { grid-column: span 4; }
.bento-span-3 { grid-column: span 3; }
.bento-span-2 { grid-column: span 2; }
.bento-nested {
  display: grid;
  grid-template-columns: repeat(12, minmax(0, 1fr));
  gap: var(--bento-gap);
  width: 100%;
  grid-column: span 12;
  align-items: start;
}
@media (max-width: 1199px) {
  .bento-span-8, .bento-span-6 { grid-column: span 12; }
  .bento-span-4, .bento-span-3 { grid-column: span 6; }
  .bento-span-2 { grid-column: span 4; }
}
@media (max-width: 767px) {
  .bento-span-8, .bento-span-6, .bento-span-4, .bento-span-3, .bento-span-2 {
    grid-column: span 12;
  }
}
@media print {
  .bento-grid, .bento-nested { display: block; }
  .bento-grid > *, .bento-nested > * { break-inside: avoid; margin-bottom: 12px; }
}


.meta-strip {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm);
  padding: 14px 18px;
}
.meta-strip-main {
  display: flex;
  flex-wrap: wrap;
  align-items: flex-start;
  justify-content: space-between;
  gap: 10px 16px;
}
.meta-title {
  margin: 0;
  font-size: 1.375rem;
  font-weight: 700;
  line-height: 1.25;
  text-wrap: balance;
  color: var(--ink);
}
.meta-sub { margin: 4px 0 0; color: var(--muted); font-size: 0.875rem; }
.meta-pills {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
}
.meta-pill {
  border-radius: 999px;
  padding: 5px 10px;
  font-size: 0.75rem;
  background: var(--surface-raised);
  border: 1px solid var(--line);
  color: var(--muted);
  white-space: nowrap;
}
.meta-strip .source-panel {
  margin-top: 10px;
  padding: 10px 12px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: var(--surface-raised);
}
.meta-warning { color: #b91c1c; font-weight: 600; font-size: 0.8125rem; margin: 8px 0 0; }


.bento-grid.bento-layout-root {
  position: relative;
  grid-auto-rows: minmax(72px, auto);
}
[data-bento-host] { display: contents; }
.bento-grid.bento-layout-editing [data-bento-id]:not([data-bento-id] [data-bento-id]) {
  outline: 2px dashed var(--accent, #0f766e);
  outline-offset: -2px;
  cursor: default;
  touch-action: none;
  position: relative;
}
.bento-grid.bento-layout-editing [data-bento-id]:not([data-bento-id] [data-bento-id]) .bento-drag-handle {
  display: flex;
}
.bento-grid.bento-layout-editing [data-bento-id]:not([data-bento-id] [data-bento-id]) .bento-resize-handle {
  display: block;
}
.bento-drag-handle {
  display: none;
  align-items: center;
  gap: 6px;
  margin: -4px 0 8px;
  padding: 6px 10px;
  border-radius: 6px;
  background: var(--accent-soft, #ccfbf1);
  color: var(--accent-strong, #115e59);
  font-size: 0.6875rem;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  cursor: grab;
  user-select: none;
  touch-action: none;
  width: fit-content;
  max-width: 100%;
}
.bento-drag-handle::before {
  content: "⋮⋮";
  font-size: 0.875rem;
  line-height: 1;
}
.bento-drag-handle:active { cursor: grabbing; }
.bento-resize-handle {
  display: none;
  position: absolute;
  right: 6px;
  bottom: 6px;
  width: 14px;
  height: 14px;
  border-radius: 3px;
  background: var(--accent, #0f766e);
  cursor: nwse-resize;
  opacity: 0.85;
  z-index: 3;
}
.bento-resize-row-handle {
  display: none;
  position: absolute;
  left: 50%;
  bottom: 4px;
  transform: translateX(-50%);
  width: 40px;
  height: 8px;
  border-radius: 4px;
  background: var(--accent, #0f766e);
  cursor: ns-resize;
  opacity: 0.85;
  z-index: 3;
}
.bento-grid.bento-layout-editing [data-bento-id]:not([data-bento-id] [data-bento-id]) .bento-resize-row-handle {
  display: block;
}
.bento-layout-toolbar {
  display: inline-flex;
  flex-wrap: wrap;
  gap: 6px;
  align-items: center;
}
.bento-layout-toolbar.meta-inline {
  margin-left: auto;
}
.bento-layout-toolbar button {
  border: 1px solid var(--line, #e2e8f0);
  border-radius: 8px;
  background: #fff;
  color: var(--ink, #0f172a);
  padding: 6px 11px;
  font-size: 0.8125rem;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
}
.bento-layout-toolbar button:hover { background: var(--surface-raised, #f8fafc); }
.bento-layout-toolbar button.primary {
  background: var(--accent, #0f766e);
  border-color: var(--accent, #0f766e);
  color: #fff;
}
.bento-layout-toolbar button.layout-edit-btn {
  background: #0f766e;
  border-color: #0f766e;
  color: #fff;
}
.bento-layout-toolbar button.layout-edit-btn:hover { background: #115e59; }
.bento-grid.bento-layout-editing [data-bento-id]:not([data-bento-id] [data-bento-id]).bento-tile-dragging {
  opacity: 0.38;
  pointer-events: none;
}
.bento-layout-drop-indicator {
  position: absolute;
  border: 2px solid var(--accent, #0f766e);
  border-radius: 10px;
  background: rgba(15, 118, 110, 0.12);
  box-shadow: 0 8px 24px rgba(15, 118, 110, 0.18);
  pointer-events: none;
  z-index: 100;
  display: none;
  box-sizing: border-box;
  will-change: transform, width, height;
}
@media (max-width: 767px) {
  .bento-layout-toolbar.meta-inline {
    margin-left: 0;
    width: 100%;
    justify-content: flex-end;
  }
  .bento-grid.bento-layout-root:not(.bento-layout-editing) > [data-bento-id]:not([data-bento-id] [data-bento-id]) {
    grid-column: 1 / -1 !important;
    grid-row: auto !important;
  }
}
@media print {
  .bento-grid.bento-layout-root [data-bento-id]:not([data-bento-id] [data-bento-id]) {
    grid-column: 1 / -1 !important;
    grid-row: auto !important;
    break-inside: avoid;
  }
  .bento-drag-handle, .bento-resize-handle, .bento-resize-row-handle, .bento-layout-drop-indicator { display: none !important; }
}


:root {
  --deep: var(--hero-bg);
  --teal: var(--accent);
  --teal-soft: var(--accent-soft);
  --red: #dc2626;
  --red-soft: #fee2e2;
  --gold: #ca8a04;
  --gold-soft: #fef9c3;
  --blue: #2563eb;
  --compliance-ok-bg: #ecfdf5;
  --compliance-ok-border: #86efac;
  --compliance-miss-bg: #fef2f2;
  --compliance-miss-border: #fecaca;
  --compliance-offday-bg: #f1f5f9;
  --compliance-offday-border: #e2e8f0;
  --compliance-pending-bg: #f8fafc;
  --compliance-pending-border: #cbd5e1;
  --compliance-leave-bg: #e0f2fe;
  --compliance-leave-border: #7dd3fc;
  --compliance-leave-half-bg: #f0f9ff;
}
body { margin: 0; color: var(--ink); background: var(--bg); }
#app { display: contents; min-height: 100vh; }
#tt-root { display: contents; }
.shell { width: calc(100% - 32px); max-width: none; margin: 0 auto; padding: 18px 0; }
.shell.bento-grid { width: 100%; padding: 16px; max-width: 1840px; }
.tt-toolbar { grid-column: span 12; }
.tt-chips { grid-column: span 12; }
.tt-kpis {
  display: contents;
}
.tt-kpis > .card { grid-column: span 2; min-width: 0; }
.tt-compliance-panel { grid-column: span 12; }
.tt-project { grid-column: span 7; }
.tt-detail { grid-column: span 5; position: sticky; top: 12px; align-self: start; }
.tt-breakdown { grid-column: span 4; }
.tt-entries { grid-column: span 12; }
.toolbar {
  display: grid;
  grid-template-columns: repeat(6, minmax(150px, 1fr));
  gap: 12px;
  margin-bottom: 14px;
  align-items: end;
}
.control label {
  display: block;
  margin-bottom: 6px;
  color: var(--muted);
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.control input, .control select, .action-button {
  width: 100%;
  min-width: 0;
  height: 40px;
  border-radius: var(--radius);
  border: 1px solid var(--line);
  background: var(--panel);
  color: var(--ink);
  padding: 0 12px;
  box-shadow: var(--shadow-sm);
  transition: border-color var(--transition), box-shadow var(--transition);
}
.control input:focus, .control select:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}
.action-button { font-weight: 600; background: var(--panel); }
.action-button:hover { background: var(--surface-raised); }
.chips {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  min-height: 34px;
  margin-bottom: 14px;
  align-items: center;
}
.chip {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: var(--panel);
  padding: 5px 10px;
  font-size: 0.75rem;
  box-shadow: var(--shadow-sm);
}
.chip button {
  border: 0;
  background: transparent;
  color: var(--muted);
  font-weight: 600;
  padding: 0;
}
.kpis {
  display: grid;
  grid-template-columns: repeat(5, minmax(160px, 1fr));
  gap: 12px;
  margin-bottom: 14px;
}
.card, .panel {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm);
}
.card { padding: 16px; }
.kpi-label {
  color: var(--muted);
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.kpi-value {
  font-size: 1.75rem;
  font-weight: 700;
  line-height: 1.1;
  font-variant-numeric: tabular-nums;
}
.kpi-sub { margin-top: 8px; color: var(--muted); font-size: 0.75rem; }
.panel { padding: 16px; min-width: 0; }
.stack { display: grid; gap: 14px; }
.split { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
.analysis-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 14px; }
.bottom-stack { display: contents; }
.panel-head {
  display: flex;
  justify-content: space-between;
  gap: 10px;
  align-items: baseline;
  margin-bottom: 12px;
}
.panel h2 { margin: 0; font-size: 1.125rem; font-weight: 600; }
.panel-note { color: var(--muted); font-size: 0.75rem; }
.legend-swatch {
  display: inline-block;
  width: 12px;
  height: 12px;
  border-radius: 4px;
  vertical-align: middle;
  margin-right: 3px;
  border: 1px solid transparent;
}
.legend-swatch.ok { background: var(--compliance-ok-bg); border-color: var(--compliance-ok-border); }
.legend-swatch.miss { background: var(--compliance-miss-bg); border-color: var(--compliance-miss-border); }
.legend-swatch.leave { background: var(--compliance-leave-bg); border-color: var(--compliance-leave-border); }
.legend-swatch.leave-half {
  background: var(--compliance-leave-half-bg);
  border-color: var(--compliance-leave-border);
  border-style: dashed;
}
.legend-swatch.offday { background: var(--compliance-offday-bg); border-color: var(--compliance-offday-border); }
.legend-swatch.pending { background: var(--compliance-pending-bg); border-color: var(--compliance-pending-border); }
.empty { color: var(--muted); font-size: 0.8125rem; padding: 12px 0; }
.bar-list { display: grid; gap: 8px; }
.bar-row {
  display: grid;
  grid-template-columns: minmax(90px, 1.1fr) minmax(140px, 2.4fr) 84px;
  gap: 10px;
  align-items: center;
  border: 0;
  background: transparent;
  padding: 0;
  color: var(--ink);
  text-align: left;
}
.bar-row.active .bar-label { color: var(--deep); font-weight: 600; }
.bar-track {
  height: 10px;
  border-radius: 999px;
  background: var(--line);
  overflow: hidden;
}
.bar-fill { height: 100%; border-radius: 999px; background: var(--teal); }
.bar-fill.blue { background: var(--blue); }
.bar-fill.gold { background: var(--gold); }
.bar-label, .bar-value {
  font-size: 0.8125rem;
  font-variant-numeric: tabular-nums;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.project-table, .entry-table, .ticket-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.8125rem;
}
.entry-table { min-width: 1180px; }
.table-wrap {
  overflow: auto;
  max-height: 520px;
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  background: var(--panel);
}
th, td {
  padding: 9px 10px;
  border-bottom: 1px solid var(--line);
  text-align: left;
  vertical-align: top;
}
th {
  position: sticky;
  top: 0;
  background: var(--surface-raised);
  color: var(--muted);
  font-size: 0.75rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  z-index: 1;
}
td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
tr.active-row { background: var(--accent-soft); }
tr.clickable { cursor: pointer; transition: background var(--transition); }
tr.clickable:hover { background: var(--surface-raised); }
.compliance-wrap { overflow-x: hidden; overflow-y: visible; }
.compliance {
  width: 100%;
  table-layout: fixed;
  border-collapse: separate;
  border-spacing: 3px;
  min-width: 0;
}
.compliance col.user-col { width: 72px; }
.compliance th {
  position: static;
  border: 0;
  background: transparent;
  padding: 0 0 3px;
  text-transform: none;
  letter-spacing: 0;
  font-size: 0.625rem;
  color: var(--muted);
  overflow: hidden;
  text-overflow: clip;
  white-space: normal;
}
.compliance td { border: 0; padding: 0; background: transparent; }
.cell-button {
  width: 100%;
  min-height: 48px;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 5px 3px;
  text-align: center;
  background: var(--panel);
  box-shadow: var(--shadow-sm);
  transition: outline-color var(--transition);
  overflow: hidden;
}
.cell-button.ok {
  background: var(--compliance-ok-bg);
  border-color: var(--compliance-ok-border);
}
.cell-button.miss {
  background: var(--compliance-miss-bg);
  border-color: var(--compliance-miss-border);
}
.cell-button.offday {
  background: var(--compliance-offday-bg);
  border-color: var(--compliance-offday-border);
}
.cell-button.pending {
  background: var(--compliance-pending-bg);
  border-color: var(--compliance-pending-border);
}
.cell-button.leave {
  background: var(--compliance-leave-bg);
  border-color: var(--compliance-leave-border);
}
.cell-button.leave .cell-hours,
.cell-button.leave .cell-gap { color: #0369a1; }
.cell-button.leave.half {
  background: var(--compliance-leave-half-bg);
  border-color: var(--compliance-leave-border);
  border-style: dashed;
}
.cell-button.active { outline: 2px solid var(--accent); outline-offset: 1px; }
.cell-hours {
  font-size: 0.8125rem;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  line-height: 1.08;
  overflow-wrap: anywhere;
}
.cell-gap {
  margin-top: 2px;
  font-size: 0.5625rem;
  line-height: 1.05;
  color: var(--muted);
  overflow-wrap: anywhere;
}
@media (min-width: 1600px) {
  .compliance col.user-col { width: 84px; }
  .cell-button { min-height: 52px; padding: 6px 4px; }
  .cell-hours { font-size: 0.875rem; }
  .cell-gap { font-size: 0.625rem; }
}
.pie-shell {
  display: grid;
  grid-template-columns: minmax(180px, 220px) minmax(180px, 1fr);
  gap: 10px;
  align-items: center;
}
.project-combo {
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;
  align-items: start;
  margin-top: 8px;
}
@media (min-width: 1100px) {
  .tt-project .project-combo {
    grid-template-columns: minmax(280px, 0.92fr) minmax(220px, 1fr);
  }
}
.pie-area { display: flex; justify-content: center; }
.pie-area svg { width: min(100%, 210px); height: auto; }
.pie-center-main { font-size: 1.125rem; font-weight: 700; }

      return Math.abs(asNumber(hours) - TARGET) < HOURS_MATCH_EPSILON;
    }

    function compactDate(iso) {
      return fmtIsoDate(iso);
    }

    function searchText(row) {
      return [
        row.day,
        row.project_name,
        row.ticket_summary,
        row.logged_by_username,
        row.logged_by_name,
        row.category,
        row.info,
        row.bug_id
      ].filter(Boolean).join(" ").toLowerCase();
    }

    function matches(row, filters) {
      if (filters.user !== "all" && row.logged_by_username !== filters.user) return false;
      if (filters.project !== "all" && row.project_name !== filters.project) return false;
      if (filters.day !== "all" && normalizeDayKey(row.day) !== filters.day) return false;
      if (filters.ticket !== "all" && String(row.bug_id) !== String(filters.ticket)) return false;
      if (filters.search.trim() && !searchText(row).includes(filters.search.trim().toLowerCase())) return false;
      return true;
    }

    function uniqueOptions(rows, key, labelKey) {
      const seen = new Map();
      rows.forEach((row) => {
        const value = row[key];
        if (value == null || value === "") return;
        if (!seen.has(String(value))) seen.set(String(value), row[labelKey] || String(value));
      });
      return Array.from(seen.entries())
        .map(([value, label]) => ({ value, label }))
        .sort((a, b) => String(a.label).localeCompare(String(b.label)));
    }

    function groupBy(rows, keyFn, amountFn) {
      const map = new Map();
      rows.forEach((row) => {
        const meta = keyFn(row);
        if (!meta || meta.value == null || meta.value === "") return;
        const key = String(meta.value);
        const current = map.get(key) || { value: key, raw: meta.raw || key, label: meta.label || key, amount: 0, count: 0 };
        current.amount += asNumber(amountFn(row));
        current.count += 1;
        map.set(key, current);
      });
      return Array.from(map.values());
    }

    function ticketRows(rows) {
      const map = new Map();
      rows.forEach((row) => {
        const key = String(row.bug_id || "");
        if (!key) return;
        const current = map.get(key) || {
          bugId: key,
          project: row.project_name || "",
          summary: row.ticket_summary || "",
          hours: 0,
          entries: 0,
          users: new Set()
        };
        current.hours += asNumber(row.hours);
        current.entries += 1;
        if (row.logged_by_username) current.users.add(row.logged_by_username);
        map.set(key, current);
      });
      return Array.from(map.values())
        .map((row) => Object.assign({}, row, { userCount: row.users.size }))
        .sort((a, b) => b.hours - a.hours || String(a.bugId).localeCompare(String(b.bugId)));
    }

    function projectRows(rows) {
      const total = rows.reduce((sum, row) => sum + asNumber(row.hours), 0);
      return groupBy(
        rows,
        (row) => ({ value: row.project_name || "No project", label: row.project_name || "No project" }),
        (row) => row.hours
      )
        .map((row) => Object.assign({}, row, { percent: total ? row.amount / total * 100 : 0 }))
        .sort((a, b) => b.amount - a.amount || String(a.label).localeCompare(String(b.label)));
    }

    function alphaProjectRows(rows) {
      return rows.slice().sort((a, b) => String(a.label).localeCompare(String(b.label)));
    }

    function memberRows(rows) {
      return groupBy(
        rows,
        (row) => ({ value: row.logged_by_username, raw: row.logged_by_username, label: row.logged_by_name || row.logged_by_username }),
        (row) => row.hours
      ).sort((a, b) => b.amount - a.amount || String(a.label).localeCompare(String(b.label)));
    }

    function dayRows(rows) {
      return groupBy(
        rows,
        (row) => {
          const day = normalizeDayKey(row.day);
          return { value: day, raw: day, label: compactDate(day) };
        },
        (row) => row.hours
      ).sort((a, b) => String(a.value).localeCompare(String(b.value)));
    }

    function isLeaveDay(username, day) {
      const ld = DATA.leaveDays;
      if (!ld) return false;
      const users = ld[day];
      if (!users) return false;
      return Array.isArray(users) ? users.indexOf(username) >= 0 : false;
    }

    function isHalfDayLeave(username, day) {
      const hd = DATA.halfDayLeaves;
      if (!hd) return false;
      const users = hd[day];
      if (!users) return false;
      return Array.isArray(users) ? users.indexOf(username) >= 0 : false;
    }

    function specialOffdayLabel(day) {
      const special = DATA.specialOffDays || {};
      return special[day] || "";
    }

    function complianceSnapshotDay(rows) {
      const candidates = [];
      const generated = normalizeDayKey(DATA.generatedAt);
      if (generated) candidates.push(generated);
      rows.forEach((row) => {
        const day = normalizeDayKey(row.day);
        if (day) candidates.push(day);
      });
      candidates.sort();
      return candidates.length ? candidates[candidates.length - 1] : normalizeDayKey(DATA.month.start);
    }

    function complianceGapLabel(hours, isOffday, isLeave, isHalfLeave, isPending, offdayLabel) {
      if (isLeave) return "Leave Day";
      if (isHalfLeave) return "Half-day Leave";
      if (isOffday) return offdayLabel || "Weekend";
      if (isPending) return "Not due yet";
      if (isExactTargetHours(hours)) return "Exactly " + fmtHours(TARGET) + "h";
      if (hours <= 0) return "No hours logged";
      if (hours > TARGET) return "Over by " + fmtHours(hours - TARGET);
      return "Short by " + fmtHours(TARGET - hours);
    }

    function complianceRows(rows, members, workdays, complianceThroughDay) {
      const byUserDay = new Map();
      rows.forEach((row) => {
        const day = normalizeDayKey(row.day);
        if (!row.logged_by_username || !day) return;
        const key = row.logged_by_username + "|" + day;
        byUserDay.set(key, asNumber(byUserDay.get(key)) + asNumber(row.hours));
      });
      return members.map((member) => {
        const days = workdays.map((meta) => {
          const offdayLabel = specialOffdayLabel(meta.day);
          const isOffday = meta.weekday === 0 || meta.weekday === 6 || Boolean(offdayLabel);
          const isLeave = isLeaveDay(member.username, meta.day);
          const isHalfLeave = isHalfDayLeave(member.username, meta.day);
          const isPending = meta.day > complianceThroughDay;
          const hours = asNumber(byUserDay.get(member.username + "|" + meta.day));
          const onTarget = isOffday || isLeave || isHalfLeave || isPending || isExactTargetHours(hours);
          return {
            day: meta.day,
            weekday: meta.weekday,
            isOffday,
            isLeave,
            isHalfLeave,
            isPending,
            hours,
            onTarget,
            offdayLabel,
            gapLabel: complianceGapLabel(hours, isOffday, isLeave, isHalfLeave, isPending, offdayLabel)
          };
        });
        return {
          username: member.username,
          name: member.realname || member.username,
          totalHours: days.reduce((sum, item) => sum + item.hours, 0),
          offTargetHours: days.reduce((sum, item) => {
            if (item.isOffday || item.isLeave || item.isHalfLeave || item.isPending || item.onTarget) return sum;
            return sum + Math.abs(item.hours - TARGET);
          }, 0),
          days
        };
      });
    }

    const PIE_COLORS = ["#1d857d", "#3f6fb5", "#c4702b", "#7f8f3a", "#9b4f7e", "#4d7f99", "#aa5c5c", "#b29028", "#5e8c63", "#6a6bb4"];

    function polar(cx, cy, radius, angle) {
      return { x: cx + radius * Math.cos(angle), y: cy + radius * Math.sin(angle) };
    }

    function pieSlicePath(cx, cy, radius, startAngle, endAngle) {
      const start = polar(cx, cy, radius, startAngle);
      const end = polar(cx, cy, radius, endAngle);
      const largeArc = endAngle - startAngle > Math.PI ? 1 : 0;
      return [
        "M", cx, cy,
        "L", start.x, start.y,
        "A", radius, radius, 0, largeArc, 1, end.x, end.y,
        "Z"
      ].join(" ");
    }

    function ensureGridShell() {
      let grid = document.getElementById("tt-grid");
      if (!grid) {
        document.getElementById("app").innerHTML =
          `<main id="tt-grid" class="shell bento-grid" data-bento-dashboard="${LAYOUT_ID}"><div id="tt-root"></div></main>`;
        grid = document.getElementById("tt-grid");
        DlaBentoLayout.mount(grid, { dashboardId: LAYOUT_ID, toolbar: "none" });
      } else {
        grid.dataset.bentoDashboard = LAYOUT_ID;
      }
      return { grid, root: document.getElementById("tt-root") };
    }

    function render() {
      const shell = ensureGridShell();
      const grid = shell.grid;
      const root = shell.root;
      const wasEditing = Boolean(DlaBentoLayout.getState(grid)?.editing);
      const filters = readFilters();
      const entries = DATA.timeEntries.filter((row) => matches(row, filters));
      const totalHours = entries.reduce((sum, row) => sum + asNumber(row.hours), 0);
      const projects = alphaProjectRows(projectRows(entries));
      const projectTableRows = projects;
      const members = memberRows(entries);
      const days = dayRows(entries);
      const tickets = ticketRows(entries);
      const allCalendarDays = monthDates();
      const complianceThroughDay = complianceSnapshotDay(DATA.timeEntries);
      const compliance = complianceRows(DATA.timeEntries, DATA.members, allCalendarDays, complianceThroughDay);
      const activeMembers = new Set(entries.map((row) => row.logged_by_username).filter(Boolean)).size;
      const options = {
        users: uniqueOptions(DATA.members.map((row) => ({ username: row.username, label: row.realname || row.username })), "username", "label"),
        projects: uniqueOptions(DATA.timeEntries, "project_name", "project_name"),
        days: allCalendarDays.map((meta) => ({ value: meta.day, label: compactDate(meta.day) }))
      };
      const selectedTicket = filters.ticket !== "all" ? String(filters.ticket) : "";
      const selectedEntries = selectedTicket ? entries.filter((row) => String(row.bug_id) === selectedTicket) : [];

      const maxProject = Math.max(1, ...projects.map((row) => row.amount));

      const forecastWorkloadHtml = (() => {

          ? prev.map((row) => `<tr>${cols.map((c) => `<td>${esc(row[c] != null ? row[c] : "")}</td>`).join("")}</tr>`).join("")

        return `

                <tbody>${body}</tbody>
              </table>
            </div>
          </div>

          pieSlices += `<path data-project="${esc(row.value)}" d="${pieSlicePath(140, 140, active ? 108 : 100, angle, end)}" fill="${color}" stroke="white" stroke-width="2" style="cursor:pointer;opacity:${active || filters.project === "all" ? 1 : 0.78}"></path>`;
          pieLegend += `<button type="button" data-project="${esc(row.value)}" class="${active ? "active" : ""}"><span class="swatch" style="background:${color}"></span><span>${esc(row.label)}</span><span>${fmtPct(row.percent)}</span></button>`;
          angle = end;
        });
      }

      function filterChipLabel(key, value) {
        if (key === "day" && value && value !== "all") return fmtIsoDate(value);
        return value;
      }

      root.innerHTML = `

          <div class="meta-strip-main">
            <div>
              <h1 class="meta-title">Digital Team Time Tracking Dashboard</h1>
              <p class="meta-sub">Period: ${esc(DATA.month.period_display || (DATA.month.start + " to before " + DATA.month.end))}</p>
            </div>
            <div class="meta-pills">
              <span class="meta-pill">Generated ${esc(fmtIsoDateTime(DATA.generatedAt))}</span>
            </div>
          </div>
        </header>
        ${forecastWorkloadHtml ? `<div class="bento-span-12" data-bento-id="tt-forecast" data-bento-span="12">${forecastWorkloadHtml}</div>` : ""}
          <section class="toolbar tt-toolbar" data-bento-id="tt-toolbar" data-bento-span="12" data-bento-locked="true">
            <div class="control">
              <label>User</label>
              <select id="filter-user">
                <option value="all">All users</option>
                ${options.users.map((opt) => `<option value="${esc(opt.value)}" ${filters.user === opt.value ? "selected" : ""}>${esc(opt.label)}</option>`).join("")}
              </select>
            </div>
            <div class="control">
              <label>Project</label>
              <select id="filter-project">
                <option value="all">All projects</option>
                ${options.projects.map((opt) => `<option value="${esc(opt.value)}" ${filters.project === opt.value ? "selected" : ""}>${esc(opt.label)}</option>`).join("")}
              </select>
            </div>
            <div class="control">
              <label>Day</label>
              <input type="text" id="filter-day" readonly placeholder="All workdays" autocomplete="off" />
            </div>
            <div class="control">
              <label>Ticket</label>
              <input id="filter-ticket" value="${filters.ticket === "all" ? "" : esc(filters.ticket)}" placeholder="Ticket ID">
            </div>
            <div class="control">
              <label>Search</label>
              <input id="filter-search" value="${esc(filters.search)}" placeholder="Project, ticket, note...">
            </div>
            <button type="button" class="action-button" id="reset-filters">Reset filters</button>
          </section>

          <section class="chips tt-chips" data-bento-id="tt-chips" data-bento-span="12">
            ${activeFilterKeys.length ? activeFilterKeys.map((key) => `<span class="chip">${esc(key)}: ${esc(filterChipLabel(key, filters[key]))}<button type="button" data-clear="${esc(key)}">x</button></span>`).join("") : `<span class="empty">No active filters. Click any chart, project row, compliance cell, or ticket row to drill down.</span>`}
          </section>

            <div class="card" data-bento-id="tt-kpi-hours" data-bento-span="2"><div class="kpi-label">Total Hours</div><div class="kpi-value">${fmtHours(totalHours)}</div><div class="kpi-sub">${fmtInt(entries.length)} filtered time entries</div></div>
            <div class="card" data-bento-id="tt-kpi-projects" data-bento-span="2"><div class="kpi-label">Projects Worked</div><div class="kpi-value">${fmtInt(projects.length)}</div><div class="kpi-sub">Projects with booked hours</div></div>
            <div class="card" data-bento-id="tt-kpi-tickets" data-bento-span="2"><div class="kpi-label">Tickets Worked</div><div class="kpi-value">${fmtInt(tickets.length)}</div><div class="kpi-sub">Tickets behind filtered hours</div></div>
            <div class="card" data-bento-id="tt-kpi-members" data-bento-span="2"><div class="kpi-label">Active Members</div><div class="kpi-value">${fmtInt(activeMembers)}</div><div class="kpi-sub">Out of ${fmtInt(DATA.summary.matched_members)}</div></div>
            <div class="card" data-bento-id="tt-kpi-offtarget" data-bento-span="2"><div class="kpi-label">Off-target Hours</div><div class="kpi-value">${fmtHours(compliance.reduce((sum, row) => sum + row.offTargetHours, 0))}</div><div class="kpi-sub">Total deviation from ${fmtHours(TARGET)}h per workday</div></div>

          <section class="panel tt-compliance-panel" data-bento-id="tt-compliance" data-bento-span="12">
              <div class="panel-head">
                <h2>Daily 7.5h Compliance by Member</h2>
                <div class="panel-note">
                  <span class="legend-swatch ok"></span> = exactly ${fmtHours(TARGET)}h &nbsp;
                  <span class="legend-swatch miss"></span> = not exactly ${fmtHours(TARGET)}h &nbsp;
                  <span class="legend-swatch leave"></span> = Leave Day &nbsp;
                  <span class="legend-swatch leave-half"></span> = Half Leave &nbsp;
                  <span class="legend-swatch offday"></span> = Weekend / Public Holiday &nbsp;
                  <span class="legend-swatch pending"></span> = Pending future workday
                </div>
              </div>
              <div class="compliance-wrap">
                <table class="compliance">
                  <colgroup>
                    <col class="user-col">
                    ${allCalendarDays.map(() => `<col class="day-col">`).join("")}
                  </colgroup>
                  <thead>

                      <th>User</th>
                      ${allCalendarDays.map((meta) => `<th>${compactDate(meta.day)}</th>`).join("")}
                    </tr>
                  </thead>
                  <tbody>
                      ${compliance.map((row) => `<tr><th>${esc(row.name)}</th>${row.days.map((item) => {
                        const active = filters.user === row.username && filters.day === item.day;
                        const cellClass = item.isLeave ? "leave" : (item.isHalfLeave ? "leave half" : (item.isOffday ? "offday" : (item.isPending ? "pending" : (item.onTarget ? "ok" : "miss"))));
                        const cellLabel = item.isLeave ? "Leave Day" : (item.isHalfLeave ? (item.hours > 0 ? fmtHours(item.hours) : "Half Leave") : (item.isOffday ? "—" : (item.isPending ? "Pending" : (item.hours <= 0 ? "No hours" : fmtHours(item.hours)))));
                        const gapText = item.isHalfLeave ? "Half-day Leave" : esc(item.gapLabel);
                        return `<td><button type="button" class="cell-button ${cellClass} ${active ? "active" : ""}" data-user-day="${esc(row.username)}|${esc(item.day)}"><div class="cell-hours">${cellLabel}</div><div class="cell-gap">${gapText}</div></button></td>`;
                      }).join("")}</tr>`).join("")}
                  </tbody>
                </table>
              </div>

          <section class="panel tt-project" data-bento-id="tt-project" data-bento-span="7">
                <div class="panel-head">
                  <h2>Project Hours Share</h2>

                </div>
                ${projects.length ? `

                          </svg>
                        </div>
                        <div class="legend">${pieLegend}</div>

                          ${projectTableRows.map((row) => `<tr class="clickable ${filters.project === row.value ? "active-row" : ""}" data-project-row="${esc(row.value)}"><td>${esc(row.label)}</td><td class="num">${fmtHours(row.amount)}</td><td class="num">${fmtPct(row.percent)}</td></tr>`).join("")}
                        </tbody>

          </section>

          <section class="panel tt-detail" data-bento-id="tt-detail" data-bento-span="5">
                <div class="panel-head">

                ${detailBase ? `

                    <div class="detail-box"><div class="detail-label">Hours in scope</div><div class="detail-value">${fmtHours(selectedEntries.reduce((sum, row) => sum + asNumber(row.hours), 0) || detailBase.hours || 0)}</div></div>
                    <div class="detail-box"><div class="detail-label">People logging to this ticket</div><div class="detail-value">${esc(Array.from(new Set(selectedEntries.map((row) => row.logged_by_name || row.logged_by_username).filter(Boolean))).join(", ") || "-")}</div></div>
                    <div class="detail-box"><div class="detail-label">Entries in scope</div><div class="detail-value">${fmtInt(selectedEntries.length || detailBase.entries || 0)}</div></div>

          <section class="panel tt-breakdown" data-bento-id="tt-breakdown-member" data-bento-span="4">

            </div>
            <div class="bar-list">
              ${members.length ? members.map((row) => `<button type="button" class="bar-row ${filters.user === row.raw ? "active" : ""}" data-user="${esc(row.raw)}"><div class="bar-label">${esc(row.label)}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.max(2, row.amount / maxMember * 100).toFixed(2)}%"></div></div><div class="bar-value">${fmtHours(row.amount)}</div></button>`).join("") : `<div class="empty">No member hours in scope.</div>`}
            </div>
          </section>

          <section class="panel tt-breakdown" data-bento-id="tt-breakdown-day" data-bento-span="4">
            <div class="panel-head">
              <h2>By Workday</h2>
              <div class="panel-note">Click a day bar</div>

          <section class="panel tt-breakdown" data-bento-id="tt-breakdown-ticket" data-bento-span="4">

            <div class="table-wrap">
              <table class="ticket-table">
                <thead><tr><th>Ticket</th><th>Project</th><th>Summary</th><th class="num">Hours</th></tr></thead>
                <tbody>
                  ${tickets.length ? tickets.slice(0, 20).map((row) => `<tr class="clickable ${selectedTicket === String(row.bugId) ? "active-row" : ""}" data-ticket="${esc(row.bugId)}"><td>#${esc(row.bugId)}</td><td>${esc(row.project)}</td><td>${esc(row.summary)}</td><td class="num">${fmtHours(row.hours)}</td></tr>`).join("") : `<tr><td colspan="4" class="empty">No tickets in scope.</td></tr>`}
                </tbody>
              </table>
            </div>
          </section>

          <section class="panel tt-entries" data-bento-id="tt-entries" data-bento-span="12">
              <div class="panel-head">
                <h2>Time Tracking Details</h2>
                <div class="panel-note">Every filtered Mantis time entry. Click a row to lock the ticket detail.</div>
              </div>
              <div class="table-wrap">
                <table class="entry-table">
                  <thead>
                    <tr>
                      <th>Day</th>
                      <th>User</th>
                      <th>Ticket</th>
                      <th>Project</th>
                      <th class="num">Hours</th>
                      <th>Category</th>
                      <th>Info</th>
                      <th>Created</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${entries.length ? entries.map((row) => `<tr class="clickable ${selectedTicket && String(row.bug_id) === selectedTicket ? "active-row" : ""}" data-ticket="${esc(row.bug_id || "")}"><td>${esc(fmtIsoDate(row.day))}</td><td>${esc(row.logged_by_name || row.logged_by_username)}</td><td>${row.bug_id ? "#" + esc(row.bug_id) : ""}</td><td>${esc(row.project_name)}</td><td class="num">${fmtHours(row.hours)}</td><td>${esc(row.category)}</td><td>${esc(row.info)}</td><td>${esc(fmtIsoDateTime(row.created_timestamp))}</td></tr>`).join("") : `<tr><td colspan="8" class="empty">No time entries match the current filters.</td></tr>`}
                  </tbody>
                </table>
              </div>
          </section>
      `;

      function setFilter(key, value) {
        const next = Object.assign({}, filters, { [key]: value });
        writeFilters(next);
        render();
      }

      document.getElementById("filter-user").addEventListener("change", (event) => setFilter("user", event.target.value));
      document.getElementById("filter-project").addEventListener("change", (event) => setFilter("project", event.target.value));
      const dayInput = document.getElementById("filter-day");
      setDateInputDisplay(dayInput, filters.day === "all" ? "" : filters.day);
      bindDdMmDatePicker(dayInput, (iso) => setFilter("day", iso || "all"), {
        placeholder: "All workdays",
        min: normalizeDayKey(DATA.month.start),
        max: normalizeDayKey(isoDateAddDays(DATA.month.end, -1)),
      });
      document.getElementById("filter-ticket").addEventListener("change", (event) => setFilter("ticket", event.target.value.trim() || "all"));
      document.getElementById("filter-search").addEventListener("input", (event) => setFilter("search", event.target.value));
      document.getElementById("reset-filters").addEventListener("click", () => { writeFilters(FILTER_DEFAULTS); render(); });
      grid.querySelectorAll("[data-clear]").forEach((node) => node.addEventListener("click", () => setFilter(node.dataset.clear, FILTER_DEFAULTS[node.dataset.clear])));
      grid.querySelectorAll("[data-project]").forEach((node) => node.addEventListener("click", () => setFilter("project", filters.project === node.dataset.project ? "all" : node.dataset.project)));
      grid.querySelectorAll("[data-project-row]").forEach((node) => node.addEventListener("click", () => setFilter("project", filters.project === node.dataset.projectRow ? "all" : node.dataset.projectRow)));
      grid.querySelectorAll("[data-user]").forEach((node) => node.addEventListener("click", () => setFilter("user", filters.user === node.dataset.user ? "all" : node.dataset.user)));
      grid.querySelectorAll("[data-day]").forEach((node) => node.addEventListener("click", () => setFilter("day", filters.day === node.dataset.day ? "all" : node.dataset.day)));
      grid.querySelectorAll("[data-user-day]").forEach((node) => node.addEventListener("click", () => {
        const [user, day] = node.dataset.userDay.split("|");
        const next = Object.assign({}, filters, {
          user: filters.user === user && filters.day === day ? "all" : user,
          day: filters.user === user && filters.day === day ? "all" : day
        });
        writeFilters(next);
        render();
      }));
      grid.querySelectorAll("[data-ticket]").forEach((node) => node.addEventListener("click", () => setFilter("ticket", filters.ticket === node.dataset.ticket ? "all" : node.dataset.ticket || "all")));
      try {
        if (grid && window.DlaBentoLayout) {
          DlaBentoLayout.refreshTiles(grid, LAYOUT_ID, { toolbar: "none" });
          if (wasEditing) DlaBentoLayout.restoreEditing(grid, true);
        }
      } catch (err) {
        console.error("Bento layout init failed", err);
      }
    }

    render();
  })();
  </script>
</body>
</html>
