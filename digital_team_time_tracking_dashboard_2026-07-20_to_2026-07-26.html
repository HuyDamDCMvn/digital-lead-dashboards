<!doctype html>
<html lang="en" data-carbon-theme="g100">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Digital Team Time Tracking</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@carbon/styles@1/css/styles.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@carbon/charts@1.27.16/styles.min.css">
<link rel="stylesheet" href="https://1.www.s81c.com/common/carbon/plex/sans.css">


<script src="https://cdn.jsdelivr.net/npm/@carbon/charts@1.27.16/dist/umd/bundle.umd.js"></script>

<style>

:root,
[data-carbon-theme="g100"],
.cds--g100 {
  color-scheme: dark;

  /* Carbon Gray 100 tokens */
  --cds-background: #161616;
  --cds-layer-01: #262626;
  --cds-layer-02: #393939;
  --cds-layer-03: #525252;
  --cds-text-primary: #f4f4f4;
  --cds-text-secondary: #c6c6c6;
  --cds-text-helper: #8d8d8d;
  --cds-interactive: #4589ff;
  --cds-link-primary: #78a9ff;
  --cds-border-subtle-01: #525252;
  --cds-border-strong-01: #6f6f6f;
  --cds-support-error: #fa4d56;
  --cds-support-success: #42be65;
  --cds-support-warning: #f1c21b;
  --cds-support-info: #4589ff;
  --cds-focus: #ffffff;
  --cds-layer-hover-01: #333333;
  --cds-layer-selected-01: #393939;
  --cds-overlay: rgba(0, 0, 0, 0.7);
  --cds-skeleton-element: #353535;

  /* Carbon motion */
  --cds-motion-standard-productive: cubic-bezier(0.2, 0, 0.38, 0.9);
  --cds-motion-standard-expressive: cubic-bezier(0.4, 0.14, 0.3, 1);
  --cds-motion-duration-fast-01: 70ms;
  --cds-motion-duration-moderate-01: 150ms;
  --cds-motion-duration-moderate-02: 240ms;
  --cds-transition: var(--cds-motion-duration-fast-01) var(--cds-motion-standard-productive);
  --cds-transition-panel: var(--cds-motion-duration-moderate-01) var(--cds-motion-standard-productive);
  --cds-transition-overlay: var(--cds-motion-duration-moderate-02) var(--cds-motion-standard-productive);

  /* Carbon breakpoints (min-width) */
  --cds-breakpoint-sm: 320px;
  --cds-breakpoint-md: 672px;
  --cds-breakpoint-lg: 1056px;
  --cds-breakpoint-xlg: 1312px;
  --cds-breakpoint-max: 1584px;

  /* Typography — IBM Plex Sans productive */
  --cds-font-family: "IBM Plex Sans", system-ui, -apple-system, "Segoe UI", sans-serif;
  --cds-type-body-compact-01: 0.875rem;
  --cds-type-heading-compact-01: 0.875rem;
  --cds-type-heading-03: 1.25rem;
  --cds-type-heading-04: 1.75rem;
  --cds-type-label-01: 0.75rem;

  /* Legacy bridge — existing dashboard CSS */
  --bg: var(--cds-background);
  --panel: var(--cds-layer-01);
  --surface-raised: var(--cds-layer-02);
  --ink: var(--cds-text-primary);
  --muted: var(--cds-text-secondary);
  --line: var(--cds-border-subtle-01);
  --accent: var(--cds-interactive);
  --accent-strong: #0f62fe;
  --accent-soft: rgba(69, 137, 255, 0.15);
  --hero-bg: var(--cds-layer-02);
  --shadow: 0 4px 14px rgba(0, 0, 0, 0.4);
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.32);
  --radius: 0;
  --radius-lg: 0;
  --font: var(--cds-font-family);
  --transition: var(--cds-transition);
  --focus-ring: 0 0 0 2px var(--cds-focus);
  --sidebar: var(--cds-layer-02);
  --danger: var(--cds-support-error);
  --danger-soft: rgba(250, 77, 86, 0.15);
  --success: var(--cds-support-success);
  --success-soft: rgba(66, 190, 101, 0.15);
  --warning: var(--cds-support-warning);
  --warning-soft: rgba(241, 194, 27, 0.15);
  --control-height: 40px;
  --type-kpi: var(--cds-type-heading-04);
  --type-section: var(--cds-type-heading-03);
  --type-label: var(--cds-type-label-01);
}


* { box-sizing: border-box; }
html {
  overflow-x: clip;
  font-size: 100%;
}
body {
  margin: 0;
  font-family: var(--cds-font-family);
  font-size: var(--cds-type-body-compact-01);
  font-weight: 400;
  letter-spacing: 0.16px;
  color: var(--cds-text-primary);
  background: var(--cds-background);
  line-height: 1.29;
  -webkit-font-smoothing: antialiased;
  overflow-x: clip;
  max-width: 100%;
}
a { color: var(--cds-link-primary); }
a:hover { color: var(--cds-interactive); }
.table-wrap, .compliance-wrap, .heatmap-wrap {
  display: block;
  width: 100%;
  max-width: 100%;
  min-width: 0;
  overflow-x: auto;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior-x: contain;
}
.table-wrap > table,
.compliance-wrap > table,
.heatmap-wrap > table {
  max-width: none;
}
main, .wrap, .shell, .app, .dashboard-grid, .grid-nested, .grid-cell,
.project-stack, .project-section, .member-section, .member, .panel, .card {
  max-width: 100%;
  min-width: 0;
}
@media (max-width: 767px) {
  .project-stack, .project-section, .member-section, .member, .members {
    overflow-x: clip;
  }
}
.chip button, .filter-chip button, [data-clear] {
  min-width: 28px;
  min-height: 28px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}
button, input, select { font: inherit; }
button { cursor: pointer; }
button:focus-visible, input:focus-visible, select:focus-visible {
  outline: 2px solid var(--cds-focus);
  outline-offset: 2px;
}
.skip-link,
.cds--skip-to-content {
  position: absolute;
  left: 8px;
  top: 8px;
  z-index: 1000;
  padding: 8px 12px;
  background: var(--cds-interactive);
  color: var(--cds-text-primary);
  border-radius: 0;
  text-decoration: none;
  clip: rect(0 0 0 0);
  clip-path: inset(50%);
  height: 1px;
  width: 1px;
  overflow: hidden;
  white-space: nowrap;
  transition: background var(--cds-transition);
}
.skip-link:focus, .skip-link:focus-visible,
.cds--skip-to-content:focus, .cds--skip-to-content:focus-visible {
  clip: auto;
  clip-path: none;
  height: auto;
  width: auto;
  overflow: visible;
  outline: 2px solid var(--cds-focus);
  outline-offset: 2px;
}
.visually-hidden {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0 0 0 0);
  white-space: nowrap;
  border: 0;
}
a:focus-visible {
  outline: 2px solid var(--cds-focus);
  outline-offset: 2px;
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}


/* ------------------------------------------------------------------ */
/* Carbon 2x Grid — 16-column condensed (1px gutters)                 */
/* ------------------------------------------------------------------ */
.carbon-grid {
  display: grid;
  grid-template-columns: repeat(16, minmax(0, 1fr));
  gap: 1px;
  align-items: start;
  width: 100%;
  max-width: 100%;
  margin: 0;
  padding: 0 24px;
  background: var(--cds-border-subtle-01);
}
.carbon-grid--md { grid-template-columns: repeat(8, minmax(0, 1fr)); }
.carbon-grid--sm { grid-template-columns: repeat(4, minmax(0, 1fr)); }

.carbon-tile,
.cds--tile.carbon-tile {
  background: var(--cds-layer-01);
  padding: 16px;
  border: 1px solid var(--cds-border-subtle-01);
  min-width: 0;
  transition: background var(--cds-transition);
}
.carbon-tile:hover { background: var(--cds-layer-hover-01); }
.carbon-tile--span-4 { grid-column: span 4; }
.carbon-tile--span-8 { grid-column: span 8; }
.carbon-tile--span-16 { grid-column: span 16; }

/* Legacy 12-column grid — backward compat for existing builders */
:root { --layout-gap: 1px; }
.dashboard-grid {
  display: grid;
  grid-template-columns: repeat(12, minmax(0, 1fr));
  gap: var(--layout-gap);
  align-items: start;
  background: var(--cds-border-subtle-01);
}
.grid-cell { min-width: 0; }
.grid-span-12 { grid-column: span 12; }
.grid-span-8 { grid-column: span 8; }
.grid-span-6 { grid-column: span 6; }
.grid-span-4 { grid-column: span 4; }
.grid-span-3 { grid-column: span 3; }
.grid-span-2 { grid-column: span 2; }
.grid-nested {
  display: grid;
  grid-template-columns: repeat(12, minmax(0, 1fr));
  gap: var(--layout-gap);
  width: 100%;
  grid-column: span 12;
  align-items: start;
}

/* Carbon breakpoints */
@media (max-width: 1055px) {
  .carbon-grid { grid-template-columns: repeat(8, minmax(0, 1fr)); padding: 0 16px; }
  .carbon-tile--span-16 { grid-column: span 8; }
  .carbon-tile--span-8 { grid-column: span 8; }
  .carbon-tile--span-4 { grid-column: span 4; }
  .grid-span-8, .grid-span-6 { grid-column: span 12; }
  .grid-span-4, .grid-span-3 { grid-column: span 6; }
  .grid-span-2 { grid-column: span 4; }
}
@media (max-width: 671px) {
  .carbon-grid,
  .carbon-grid--md,
  .carbon-grid--sm {
    grid-template-columns: repeat(4, minmax(0, 1fr));
    padding: 0 16px;
  }
  .carbon-page-header { padding: 12px 16px; }
  .carbon-page__content { padding: 0 16px 24px; }
  .carbon-tile--span-16,
  .carbon-tile--span-8,
  .carbon-tile--span-4 { grid-column: span 4; }
  .grid-span-8, .grid-span-6, .grid-span-4, .grid-span-3, .grid-span-2 {
    grid-column: span 12;
  }
  .dashboard-grid, .shell, .wrap, .app { max-width: 100%; width: 100%; }
  .dashboard-grid, .grid-nested, .grid-cell, .panel, .card, .member, .project-section {
    min-width: 0;
  }
  .filters, .toolbar, .grid.filters { grid-template-columns: 1fr !important; }
}
@media (min-width: 1312px) {
  .carbon-grid { padding: 0 32px; }
}
@media (min-width: 1584px) {
  .carbon-grid { padding: 0 40px; }
}
@media print {
  .dashboard-grid, .grid-nested, .carbon-grid { display: block; background: transparent; }
  .dashboard-grid > *, .grid-nested > *, .carbon-grid > * {
    break-inside: avoid;
    margin-bottom: 12px;
  }
}


/* ------------------------------------------------------------------ */
/* Carbon component layer — page shell, toolbar, tables, KPI, charts  */
/* ------------------------------------------------------------------ */
.carbon-page {
  min-height: 100vh;
  background: var(--cds-background);
  color: var(--cds-text-primary);
}
.carbon-page__content {
  max-width: 100%;
  margin: 0;
  padding: 0 24px 32px;
}
.carbon-page-header {
  background: var(--cds-layer-01);
  border-bottom: 1px solid var(--cds-border-subtle-01);
  padding: 16px 24px;
  margin-bottom: 1px;
}
.carbon-page-header__breadcrumb {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  align-items: center;
  margin: 0 0 8px;
  padding: 0;
  list-style: none;
  font-size: var(--cds-type-label-01);
  color: var(--cds-text-secondary);
}
.carbon-page-header__breadcrumb li:not(:last-child)::after {
  content: "/";
  margin-left: 4px;
  color: var(--cds-text-helper);
}
.carbon-page-header__breadcrumb a {
  color: var(--cds-link-primary);
  text-decoration: none;
  transition: color var(--cds-transition);
}
.carbon-page-header__breadcrumb a:hover { color: var(--cds-interactive); }
.carbon-page-header__row {
  display: flex;
  flex-wrap: wrap;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px 16px;
}
.carbon-page-header__title {
  margin: 0;
  font-size: var(--cds-type-heading-04);
  font-weight: 400;
  line-height: 1.29;
  letter-spacing: 0;
  color: var(--cds-text-primary);
}
.carbon-page-header__actions {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
}
.carbon-tabs {
  display: flex;
  flex-wrap: wrap;
  gap: 0;
  margin-top: 12px;
  border-bottom: 1px solid var(--cds-border-subtle-01);
}
.carbon-tabs__tab {
  padding: 11px 16px;
  font-size: var(--cds-type-body-compact-01);
  font-weight: 400;
  color: var(--cds-text-secondary);
  background: transparent;
  border: 0;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  transition: color var(--cds-transition), border-color var(--cds-transition);
}
.carbon-tabs__tab:hover { color: var(--cds-text-primary); background: var(--cds-layer-hover-01); }
.carbon-tabs__tab--active {
  color: var(--cds-text-primary);
  border-bottom-color: var(--cds-interactive);
  font-weight: 600;
}

.carbon-toolbar {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
  padding: 8px 16px;
  background: var(--cds-layer-01);
  border-bottom: 1px solid var(--cds-border-subtle-01);
  min-height: 48px;
}
.carbon-toolbar__title {
  flex: 1 1 auto;
  margin: 0;
  font-size: var(--cds-type-heading-compact-01);
  font-weight: 600;
  color: var(--cds-text-primary);
}
.carbon-toolbar__actions {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
}

.carbon-kpi {
  display: flex;
  flex-direction: column;
  gap: 4px;
  min-height: 88px;
}
.carbon-kpi__label {
  font-size: var(--cds-type-label-01);
  font-weight: 400;
  letter-spacing: 0.32px;
  color: var(--cds-text-secondary);
  text-transform: none;
}
.carbon-kpi__value {
  font-size: var(--cds-type-heading-04);
  font-weight: 400;
  line-height: 1.29;
  font-variant-numeric: tabular-nums;
  color: var(--cds-text-primary);
}
.carbon-kpi__subtitle {
  font-size: var(--cds-type-label-01);
  color: var(--cds-text-helper);
}
.carbon-kpi__trend {
  font-size: var(--cds-type-label-01);
  font-weight: 600;
}
.carbon-kpi__trend--up { color: var(--cds-support-success); }
.carbon-kpi__trend--down { color: var(--cds-support-error); }
.carbon-kpi__trend--neutral { color: var(--cds-text-secondary); }
.carbon-kpi[data-status="warning"] {
  border-left: 3px solid var(--cds-support-warning, #f1c21b);
}
.carbon-kpi[data-status="error"] {
  border-left: 3px solid var(--cds-support-error, #da1e28);
}
.carbon-kpi[data-status="success"] {
  border-left: 3px solid var(--cds-support-success, #24a148);
}
.carbon-kpi[data-status="warning"] .carbon-kpi__value {
  color: var(--cds-support-warning, #f1c21b);
}
.carbon-kpi[data-status="error"] .carbon-kpi__value {
  color: var(--cds-support-error, #da1e28);
}

.carbon-data-table-container {
  background: var(--cds-layer-01);
  border: 1px solid var(--cds-border-subtle-01);
}
.carbon-data-table-container__head {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--cds-border-subtle-01);
}
.carbon-data-table-container__title {
  margin: 0;
  font-size: var(--cds-type-heading-compact-01);
  font-weight: 600;
  color: var(--cds-text-primary);
}
.carbon-data-table-wrap { overflow-x: auto; }
.carbon-data-table,
.cds--data-table.carbon-data-table {
  width: 100%;
  border-collapse: collapse;
  font-size: var(--cds-type-body-compact-01);
}
.carbon-data-table caption {
  padding: 8px 16px;
  text-align: left;
  font-size: var(--cds-type-label-01);
  color: var(--cds-text-helper);
}
.carbon-data-table th,
.carbon-data-table td {
  padding: 11px 16px;
  text-align: left;
  border-bottom: 1px solid var(--cds-border-subtle-01);
  vertical-align: top;
  color: var(--cds-text-primary);
}
.carbon-data-table th {
  position: sticky;
  top: 0;
  background: var(--cds-layer-01);
  font-size: var(--cds-type-heading-compact-01);
  font-weight: 600;
  color: var(--cds-text-secondary);
  z-index: 1;
  cursor: pointer;
  user-select: none;
  transition: background var(--cds-transition);
}
.carbon-data-table th:hover { background: var(--cds-layer-hover-01); }
.carbon-data-table th[aria-sort="ascending"]::after { content: " ↑"; }
.carbon-data-table th[aria-sort="descending"]::after { content: " ↓"; }
.carbon-data-table tbody tr:hover td { background: var(--cds-layer-hover-01); }

.carbon-chart-container {
  background: var(--cds-layer-01);
  border: 1px solid var(--cds-border-subtle-01);
  padding: 16px;
  min-width: 0;
}
.carbon-chart-container__title {
  margin: 0 0 12px;
  font-size: var(--cds-type-heading-compact-01);
  font-weight: 600;
  color: var(--cds-text-primary);
}
.carbon-chart-container__plot { width: 100%; min-height: 200px; }
.carbon-chart-container:empty,
.carbon-chart-container__plot:empty {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 200px;
  background: var(--cds-layer-01);
  border-radius: 4px;
}
.carbon-chart-container:empty::after,
.carbon-chart-container__plot:empty::after {
  content: "Loading chart…";
  color: var(--cds-text-placeholder);
  font-size: var(--cds-type-body-compact-01, 14px);
  animation: pulse 1.5s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 1; }
}

.carbon-status-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 0 8px;
  min-height: 24px;
  font-size: var(--cds-type-label-01);
  font-weight: 400;
  letter-spacing: 0.32px;
  border-radius: 999px;
  white-space: nowrap;
  max-width: 100%;
}
.carbon-status-badge__icon {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.carbon-status-badge--success {
  background: rgba(66, 190, 101, 0.15);
  color: var(--cds-support-success);
}
.carbon-status-badge--success .carbon-status-badge__icon { background: var(--cds-support-success); }
.carbon-status-badge--error {
  background: rgba(250, 77, 86, 0.15);
  color: var(--cds-support-error);
}
.carbon-status-badge--error .carbon-status-badge__icon { background: var(--cds-support-error); }
.carbon-status-badge--warning {
  background: rgba(241, 194, 27, 0.15);
  color: var(--cds-support-warning);
}
.carbon-status-badge--warning .carbon-status-badge__icon { background: var(--cds-support-warning); }
.carbon-status-badge--info {
  background: rgba(69, 137, 255, 0.15);
  color: var(--cds-support-info);
}
.carbon-status-badge--info .carbon-status-badge__icon { background: var(--cds-support-info); }
.carbon-status-badge--neutral {
  background: var(--cds-layer-02);
  color: var(--cds-text-secondary);
}
.carbon-status-badge--neutral .carbon-status-badge__icon { background: var(--cds-text-helper); }

.carbon-filter-summary {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
  padding: 8px 16px;
  background: var(--cds-layer-01);
  border-bottom: 1px solid var(--cds-border-subtle-01);
}
.carbon-filter-summary__label {
  font-size: var(--cds-type-label-01);
  color: var(--cds-text-secondary);
  margin-right: 4px;
}
.carbon-filter-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 0 8px;
  min-height: 24px;
  font-size: var(--cds-type-label-01);
  background: var(--cds-layer-02);
  color: var(--cds-text-primary);
  border: 1px solid var(--cds-border-subtle-01);
  border-radius: 999px;
}
.carbon-filter-tag__dismiss {
  border: 0;
  background: transparent;
  color: var(--cds-text-secondary);
  cursor: pointer;
  padding: 0;
  line-height: 1;
  font-size: 0.875rem;
  transition: color var(--cds-transition);
}
.carbon-filter-tag__dismiss:hover { color: var(--cds-text-primary); }

.carbon-empty-state {
  display: grid;
  gap: 8px;
  justify-items: start;
  padding: 48px 32px;
  background: var(--cds-layer-01);
  border: 1px solid var(--cds-border-subtle-01);
  text-align: left;
}
.carbon-empty-state__title {
  margin: 0;
  font-size: var(--cds-type-heading-03);
  font-weight: 400;
  color: var(--cds-text-primary);
}
.carbon-empty-state__description {
  margin: 0;
  font-size: var(--cds-type-body-compact-01);
  color: var(--cds-text-secondary);
  max-width: 52ch;
}
.carbon-empty-state__action {
  margin-top: 8px;
  display: inline-flex;
  align-items: center;
  min-height: 40px;
  padding: 0 16px;
  background: var(--cds-interactive);
  color: var(--cds-text-primary);
  border: 0;
  font-size: var(--cds-type-body-compact-01);
  font-weight: 400;
  text-decoration: none;
  cursor: pointer;

      return fmtIsoDate(iso);
    }

    function searchText(row) {
      return [
        row.day,
        row.project_name,
        row.ticket_summary,
        row.logged_by_username,
        row.logged_by_name,
        row.category,
        row.info,
        row.bug_id
      ].filter(Boolean).join(" ").toLowerCase();
    }

    function matches(row, filters) {
      if (filters.user !== "all" && row.logged_by_username !== filters.user) return false;
      if (filters.project !== "all" && row.project_name !== filters.project) return false;
      const day = normalizeDayKey(row.day);
      if (filters.from !== "all" && day < filters.from) return false;
      if (filters.to !== "all" && day > filters.to) return false;
      if (filters.ticket !== "all" && String(row.bug_id) !== String(filters.ticket)) return false;
      if (filters.search.trim() && !searchText(row).includes(filters.search.trim().toLowerCase())) return false;
      return true;
    }

    function isDaySelected(filters, day) {
      const key = normalizeDayKey(day);
      if (!key) return false;
      if (filters.from === "all" && filters.to === "all") return false;
      const from = filters.from === "all" ? key : filters.from;
      const to = filters.to === "all" ? key : filters.to;
      return key >= from && key <= to;
    }

    function toggleDayFilter(filters, day) {
      const key = normalizeDayKey(day);
      if (filters.from === key && filters.to === key) {
        return Object.assign({}, filters, { from: "all", to: "all" });
      }
      return Object.assign({}, filters, { from: key, to: key });
    }

    function uniqueOptions(rows, key, labelKey) {
      const seen = new Map();
      rows.forEach((row) => {
        const value = row[key];
        if (value == null || value === "") return;
        if (!seen.has(String(value))) seen.set(String(value), row[labelKey] || String(value));
      });
      return Array.from(seen.entries())
        .map(([value, label]) => ({ value, label }))
        .sort((a, b) => String(a.label).localeCompare(String(b.label)));
    }

    function groupBy(rows, keyFn, amountFn) {
      const map = new Map();
      rows.forEach((row) => {
        const meta = keyFn(row);
        if (!meta || meta.value == null || meta.value === "") return;
        const key = String(meta.value);
        const current = map.get(key) || { value: key, raw: meta.raw || key, label: meta.label || key, amount: 0, count: 0 };
        current.amount += asNumber(amountFn(row));
        current.count += 1;
        map.set(key, current);
      });
      return Array.from(map.values());
    }

    function ticketRows(rows) {
      const map = new Map();
      rows.forEach((row) => {
        const key = String(row.bug_id || "");
        if (!key) return;
        const current = map.get(key) || {
          bugId: key,
          project: row.project_name || "",
          summary: row.ticket_summary || "",
          hours: 0,
          entries: 0,
          users: new Set()
        };
        current.hours += asNumber(row.hours);
        current.entries += 1;
        if (row.logged_by_username) current.users.add(row.logged_by_username);
        map.set(key, current);
      });
      return Array.from(map.values())
        .map((row) => Object.assign({}, row, { userCount: row.users.size }))
        .sort((a, b) => b.hours - a.hours || String(a.bugId).localeCompare(String(b.bugId)));
    }

    function projectRows(rows) {
      const total = rows.reduce((sum, row) => sum + asNumber(row.hours), 0);
      return groupBy(
        rows,
        (row) => ({ value: row.project_name || "No project", label: row.project_name || "No project" }),
        (row) => row.hours
      )
        .map((row) => Object.assign({}, row, { percent: total ? row.amount / total * 100 : 0 }))
        .sort((a, b) => b.amount - a.amount || String(a.label).localeCompare(String(b.label)));
    }

    function alphaProjectRows(rows) {
      return rows.slice().sort((a, b) => String(a.label).localeCompare(String(b.label)));
    }

    function memberRows(rows) {
      return groupBy(
        rows,
        (row) => ({ value: row.logged_by_username, raw: row.logged_by_username, label: row.logged_by_name || row.logged_by_username }),
        (row) => row.hours
      ).sort((a, b) => b.amount - a.amount || String(a.label).localeCompare(String(b.label)));
    }

    function dayRows(rows) {
      return groupBy(
        rows,
        (row) => {
          const day = normalizeDayKey(row.day);
          return { value: day, raw: day, label: compactDate(day) };
        },
        (row) => row.hours
      ).sort((a, b) => String(a.value).localeCompare(String(b.value)));
    }

    function isLeaveDay(username, day) {
      const ld = DATA.leaveDays;
      if (!ld) return false;
      const users = ld[day];
      if (!users) return false;
      return Array.isArray(users) ? users.indexOf(username) >= 0 : false;
    }

    function isHalfDayLeave(username, day) {
      const hd = DATA.halfDayLeaves;
      if (!hd) return false;
      const users = hd[day];
      if (!users) return false;
      return Array.isArray(users) ? users.indexOf(username) >= 0 : false;
    }

    function specialOffdayLabel(day) {
      const special = DATA.specialOffDays || {};
      return special[day] || "";
    }

    function complianceSnapshotDay(rows) {
      const candidates = [];
      const generated = normalizeDayKey(DATA.generatedAt);
      if (generated) candidates.push(generated);
      rows.forEach((row) => {
        const day = normalizeDayKey(row.day);
        if (day) candidates.push(day);
      });
      candidates.sort();
      return candidates.length ? candidates[candidates.length - 1] : normalizeDayKey(DATA.month.start);
    }

    function complianceGapLabel(hours, isOffday, isLeave, isHalfLeave, isPending, offdayLabel) {
      if (isLeave) return "Leave Day";
      if (isHalfLeave) return "Half-day Leave";
      if (isOffday) return offdayLabel || "Weekend";
      if (isPending) return "Not due yet";
      if (isExactTargetHours(hours)) return "Exactly " + fmtHours(TARGET) + "h";
      if (hours <= 0) return "No hours logged";
      if (hours > TARGET) return "Over by " + fmtHours(hours - TARGET);
      return "Short by " + fmtHours(TARGET - hours);
    }

    function complianceRows(rows, members, workdays, complianceThroughDay) {
      const byUserDay = new Map();
      rows.forEach((row) => {
        const day = normalizeDayKey(row.day);
        if (!row.logged_by_username || !day) return;
        const key = row.logged_by_username + "|" + day;
        byUserDay.set(key, asNumber(byUserDay.get(key)) + asNumber(row.hours));
      });
      return members.map((member) => {
        const days = workdays.map((meta) => {
          const offdayLabel = specialOffdayLabel(meta.day);
          const isOffday = meta.weekday === 0 || meta.weekday === 6 || Boolean(offdayLabel);
          const isLeave = isLeaveDay(member.username, meta.day);
          const isHalfLeave = isHalfDayLeave(member.username, meta.day);
          const isPending = meta.day > complianceThroughDay;
          const hours = asNumber(byUserDay.get(member.username + "|" + meta.day));
          const onTarget = isOffday || isLeave || isHalfLeave || isPending || isExactTargetHours(hours);
          return {
            day: meta.day,
            weekday: meta.weekday,
            isOffday,
            isLeave,
            isHalfLeave,
            isPending,
            hours,
            onTarget,
            offdayLabel,
            gapLabel: complianceGapLabel(hours, isOffday, isLeave, isHalfLeave, isPending, offdayLabel)
          };
        });
        return {
          username: member.username,
          name: member.realname || member.username,
          totalHours: days.reduce((sum, item) => sum + item.hours, 0),
          offTargetHours: days.reduce((sum, item) => {
            if (item.isOffday || item.isLeave || item.isHalfLeave || item.isPending || item.onTarget) return sum;
            return sum + Math.abs(item.hours - TARGET);
          }, 0),
          days
        };
      });
    }

    const CHART_COLORS = ["#6929c4","#1192e8","#005d5d","#9f1853","#fa4d56","#570408","#198038","#002d9c","#b28600","#009d9a","#012749","#8a3800"];
    let projectChart = null;
    let dailyTrendChart = null;
    let memberChart = null;

    function destroyChart(instance) {
      if (instance && typeof instance.destroy === "function") instance.destroy();
    }

    function carbonKpiTile(label, value, subtitle, titleAttr) {
      const subtitleHtml = subtitle ? `<p class="carbon-kpi__subtitle">${esc(subtitle)}</p>` : "";
      const titleHtml = titleAttr ? ` title="${esc(titleAttr)}"` : "";
      return `<article class="carbon-tile carbon-tile--span-4 carbon-kpi"${titleHtml}><p class="carbon-kpi__label">${esc(label)}</p><p class="carbon-kpi__value">${esc(value)}</p>${subtitleHtml}</article>`;
    }

    function carbonStatusBadge(status, label) {
      const map = { success: "success", ok: "success", error: "error", miss: "error", warning: "warning", info: "info", pending: "info", neutral: "neutral", leave: "info" };
      const key = map[String(status || "neutral").toLowerCase()] || "neutral";
      return `<span class="carbon-status-badge carbon-status-badge--${key}"><span class="carbon-status-badge__icon" aria-hidden="true"></span><span>${esc(label)}</span></span>`;
    }

    function carbonEmptyState(title, description) {
      return `<div class="carbon-empty-state" role="status"><h2 class="carbon-empty-state__title">${esc(title)}</h2><p class="carbon-empty-state__description">${esc(description)}</p></div>`;
    }

    function carbonChartShell(chartId, title, height) {
      return `<section class="carbon-chart-container"><h2 class="carbon-chart-container__title">${esc(title)}</h2><div id="${esc(chartId)}" class="carbon-chart-container__plot cds--chart-container" style="height:${esc(height)}"></div></section>`;
    }

    function carbonDataTableShell(title, headHtml, bodyHtml, note) {
      const noteHtml = note ? `<p class="panel-note">${esc(note)}</p>` : "";
      return `<section class="carbon-data-table-container"><div class="carbon-data-table-container__head"><h2 class="carbon-data-table-container__title">${esc(title)}</h2></div>${noteHtml}<div class="carbon-data-table-wrap"><table class="carbon-data-table cds--data-table"><caption>${esc(title)}</caption><thead>${headHtml}</thead><tbody>${bodyHtml}</tbody></table></div></section>`;
    }

    function chartOptions(title, leftTitle, bottomTitle, height) {
      return {
        title: title,
        theme: "g100",
        accessibility: { svgAriaLabel: title },
        axes: {
          left: { mapsTo: "value", title: leftTitle },
          bottom: { mapsTo: "key", title: bottomTitle, scaleType: "labels" },
        },
        height: height || "320px",
      };
    }

    function renderProjectChart(projects, filters) {
      destroyChart(projectChart);
      projectChart = null;
      const host = document.getElementById("chart-project-hours");
      if (!host) return;
      if (!projects.length || typeof Charts === "undefined") {
        host.innerHTML = carbonEmptyState("No project hours in scope", "Clear chart or table filters to widen the scope.");
        return;
      }
      const data = projects.map((row) => ({ group: row.label, value: row.amount }));
      host.innerHTML = "";
      projectChart = new Charts.DonutChart(host, {
        data: data,
        options: {
          title: "Hours by project",
          theme: "g100",
          resizable: true,
          height: "100%",
          donut: { center: { label: "Total hours" }, alignment: "center" },
          pie: { labels: { enabled: false } },
          legend: { enabled: false },
          color: { scale: data.reduce((acc, d, i) => { acc[d.group] = CHART_COLORS[i % CHART_COLORS.length]; return acc; }, {}) },
          tooltip: { valueFormatter: (v) => v.toFixed(2) + "h" },
          accessibility: { svgAriaLabel: "Hours by project donut chart" },
        },
      });
    }

    function renderDailyTrendChart(days) {
      destroyChart(dailyTrendChart);
      dailyTrendChart = null;
      const host = document.getElementById("chart-daily-trend");
      if (!host) return;
      if (!days.length || typeof Charts === "undefined") {
        host.innerHTML = carbonEmptyState("No workdays in scope", "Clear chart or table filters to widen the scope.");
        return;
      }
      const data = days.map((row) => ({ group: "Daily hours", key: row.label, value: row.amount }));
      host.innerHTML = "";
      dailyTrendChart = new Charts.LineChart(host, { data: data, options: chartOptions("Daily hours trend", "Hours", "Workday", "280px") });
    }

    function renderMemberChart(members) {
      destroyChart(memberChart);
      memberChart = null;
      const host = document.getElementById("chart-member-comparison");
      if (!host) return;
      if (!members.length || typeof Charts === "undefined") {
        host.innerHTML = carbonEmptyState("No member hours in scope", "Clear chart or table filters to widen the scope.");
        return;
      }
      const data = members.map((row) => ({ group: row.label, value: row.amount }));
      host.innerHTML = "";
      memberChart = new Charts.DonutChart(host, {
        data: data,
        options: {
          title: "Hours by Team Member",
          theme: "g100",
          resizable: true,
          height: "100%",
          donut: { center: { label: "Total hours" }, alignment: "center" },
          pie: { labels: { enabled: false } },
          legend: { enabled: false },
          color: { scale: data.reduce((acc, d, i) => { acc[d.group] = CHART_COLORS[i % CHART_COLORS.length]; return acc; }, {}) },
          tooltip: { valueFormatter: (v) => v.toFixed(2) + "h" },
          accessibility: { svgAriaLabel: "Hours by team member donut chart" },
        },
      });
    }

    function ensureGridShell() {
      let root = document.getElementById("tt-root");
      if (!root) {
        const main = document.getElementById("main-content");
        if (main) {
          main.innerHTML = '<div id="tt-root" class="carbon-grid"></div>';
          root = document.getElementById("tt-root");
        }
      }
      return { root };
    }

    function render() {
      const shell = ensureGridShell();
      const root = shell.root;
      if (!root) return;
      const filters = readFilters();
      const entries = DATA.timeEntries.filter((row) => matches(row, filters));
      const totalHours = entries.reduce((sum, row) => sum + asNumber(row.hours), 0);
      const projects = alphaProjectRows(projectRows(entries));
      const projectTableRows = projects;
      const members = memberRows(entries);
      const days = dayRows(entries);
      const tickets = ticketRows(entries);
      const allCalendarDays = calendarDaysForFilters(filters);
      const complianceThroughDay = complianceSnapshotDay(DATA.timeEntries);
      const compliance = complianceRows(DATA.timeEntries, DATA.members, allCalendarDays, complianceThroughDay);
      const activeMembers = new Set(entries.map((row) => row.logged_by_username).filter(Boolean)).size;
      const workdaysInScope = allCalendarDays.filter((meta) => meta.weekday >= 1 && meta.weekday <= 5 && !specialOffdayLabel(meta.day)).length;
      const avgHoursPerDay = workdaysInScope ? totalHours / workdaysInScope : 0;
      const options = {
        users: uniqueOptions(DATA.members.map((row) => ({ username: row.username, label: row.realname || row.username })), "username", "label"),
        projects: uniqueOptions(DATA.timeEntries, "project_name", "project_name"),
        days: allCalendarDays.map((meta) => ({ value: meta.day, label: compactDate(meta.day) }))
      };
      const selectedTicket = filters.ticket !== "all" ? String(filters.ticket) : "";
      const selectedEntries = selectedTicket ? entries.filter((row) => String(row.bug_id) === selectedTicket) : [];
      const detailBase = selectedEntries[0] || tickets.find((row) => String(row.bugId) === selectedTicket) || null;

      const activeFilterKeys = Object.keys(filters).filter((key) => filters[key] && filters[key] !== FILTER_DEFAULTS[key]);

      const forecastWorkloadHtml = (() => {
        const fw = DATA.forecastWorkload;
        if (!fw) return "";
        const cols = fw.columns || [];
        const prev = fw.previewRows || [];
        const head = cols.length ? `<tr>${cols.map((c) => `<th scope="col">${esc(c)}</th>`).join("")}</tr>` : "";
        const colSpan = Math.max(1, cols.length);
        const body = prev.length
          ? prev.map((row) => `<tr>${cols.map((c) => `<td>${esc(row[c] != null ? row[c] : "")}</td>`).join("")}</tr>`).join("")
          : `<tr><td colspan="${colSpan}">${carbonEmptyState("No rows in CSV preview", "The forecast CSV has no preview rows to display.")}</td></tr>`;
        return `
        <section class="forecast-snippet-wrap carbon-tile">
          <div class="panel-head">
            <h2 class="carbon-data-table-container__title">Forecast workload (CSV)</h2>
            <div class="panel-note">${esc(fw.sourcePath || "")}</div>
          </div>
          <p class="forecast-disclaimer">Supplementary model output for planning only; not a commitment or booking instruction. Confirm with the forecasting pipeline and owning team before acting on these figures.</p>
          ${carbonDataTableShell("Forecast preview", head, body, "")}
        </section>`;
      })();

      function filterChipLabel(key, value) {
        if ((key === "from" || key === "to" || key === "day") && value && value !== "all") return fmtIsoDate(value);
        return value;
      }

      const filterTagsHtml = activeFilterKeys.length
        ? activeFilterKeys.map((key) => `<span class="carbon-filter-tag"><span class="carbon-filter-tag__label">${esc(key)}: ${esc(filterChipLabel(key, filters[key]))}</span><button type="button" class="carbon-filter-tag__dismiss" data-clear="${esc(key)}" aria-label="Remove filter ${esc(key)}">×</button></span>`).join("")
        : `<span class="chips-hint">Click any chart, project row, compliance cell, or ticket row to drill down.</span>`;

      const projectTableHead = `<tr><th scope="col">Project</th><th scope="col" class="num">Hours</th><th scope="col" class="num">%</th></tr>`;
      const projectTableBody = projectTableRows.length
        ? projectTableRows.map((row, i) => { const c = CHART_COLORS[i % CHART_COLORS.length]; return `<tr class="clickable ${filters.project === row.value ? "active-row" : ""}" data-project-row="${esc(row.value)}" style="border-left:4px solid ${c};background:${c}18"><td>${esc(row.label)}</td><td class="num">${fmtHours(row.amount)}</td><td class="num">${fmtPct(row.percent)}</td></tr>`; }).join("")
        : `<tr><td colspan="3">${carbonEmptyState("No project hours in scope", "Clear chart or table filters to widen the scope.")}</td></tr>`;

      const ticketTableHead = `<tr><th scope="col">Ticket</th><th scope="col">Project</th><th scope="col">Summary</th><th scope="col" class="num">Hours</th></tr>`;
      const ticketTableBody = tickets.length
        ? tickets.slice(0, 20).map((row) => `<tr class="clickable ${selectedTicket === String(row.bugId) ? "active-row" : ""}" data-ticket="${esc(row.bugId)}"><td>#${esc(row.bugId)}</td><td>${esc(row.project)}</td><td>${esc(row.summary)}</td><td class="num">${fmtHours(row.hours)}</td></tr>`).join("")
        : `<tr><td colspan="4">${carbonEmptyState("No tickets in scope", "Clear chart or table filters to widen the scope.")}</td></tr>`;

      const entryTableHead = `<tr><th scope="col">Day</th><th scope="col">User</th><th scope="col">Ticket</th><th scope="col">Project</th><th scope="col" class="num">Hours</th><th scope="col">Category</th><th scope="col">Info</th><th scope="col">Created</th></tr>`;
      const entryTableBody = entries.length
        ? entries.map((row) => `<tr class="clickable ${selectedTicket && String(row.bug_id) === selectedTicket ? "active-row" : ""}" data-ticket="${esc(row.bug_id || "")}"><td>${esc(fmtIsoDate(row.day))}</td><td>${esc(row.logged_by_name || row.logged_by_username)}</td><td>${row.bug_id ? "#" + esc(row.bug_id) : ""}</td><td>${esc(row.project_name)}</td><td class="num">${fmtHours(row.hours)}</td><td>${esc(row.category)}</td><td>${esc(row.info)}</td><td>${esc(fmtIsoDateTime(row.created_timestamp))}</td></tr>`).join("")
        : `<tr><td colspan="8">${carbonEmptyState("No time entries match the current filters", "Clear chart or table filters to widen the scope.")}</td></tr>`;

      root.innerHTML = `
        ${forecastWorkloadHtml}
        <section class="carbon-tile tt-toolbar" aria-label="Filters">
          <div class="control">
            <label for="filter-user">User</label>
            <select id="filter-user">
              <option value="all">All users</option>
              ${options.users.map((opt) => `<option value="${esc(opt.value)}" ${filters.user === opt.value ? "selected" : ""}>${esc(opt.label)}</option>`).join("")}
            </select>
          </div>
          <div class="control">
            <label for="filter-project">Project</label>
            <select id="filter-project">
              <option value="all">All projects</option>
              ${options.projects.map((opt) => `<option value="${esc(opt.value)}" ${filters.project === opt.value ? "selected" : ""}>${esc(opt.label)}</option>`).join("")}
            </select>
          </div>
          <div class="control">
            <label for="filter-from">From</label>
            <input type="text" id="filter-from" readonly placeholder="Start (dd/mm/yyyy)" autocomplete="off" />
          </div>
          <div class="control">
            <label for="filter-to">To</label>
            <input type="text" id="filter-to" readonly placeholder="End (dd/mm/yyyy)" autocomplete="off" />
          </div>
          <div class="control">
            <label for="filter-ticket">Ticket</label>
            <input id="filter-ticket" value="${filters.ticket === "all" ? "" : esc(filters.ticket)}" placeholder="Ticket ID">
          </div>
          <div class="control">
            <label for="filter-search">Search</label>
            <input id="filter-search" value="${esc(filters.search)}" placeholder="Project, ticket, note...">
          </div>
          <button type="button" class="carbon-btn carbon-btn--ghost tt-reset" id="reset-filters">Reset filters</button>
        </section>

        <section class="carbon-filter-summary tt-chips" role="region" aria-label="Active filters">
          <span class="carbon-filter-summary__label">Filters:</span>
          ${filterTagsHtml}
        </section>

        <section class="tt-metrics" aria-label="Summary metrics">
          ${carbonKpiTile("Total Hours", fmtHours(totalHours), `${fmtInt(entries.length)} filtered entries`, `${fmtInt(entries.length)} filtered time entries`)}
          ${carbonKpiTile("Avg Hours / Day", fmtHours(avgHoursPerDay), `${fmtInt(workdaysInScope)} workdays in scope`)}
          ${carbonKpiTile("Active Members", fmtInt(activeMembers), `Out of ${fmtInt(DATA.summary.matched_members)} matched`)}
          ${carbonKpiTile("Projects", fmtInt(projects.length), "Projects with booked hours")}
          ${carbonKpiTile("Off-target Hours", fmtHours(compliance.reduce((sum, row) => sum + row.offTargetHours, 0)), `Target ${fmtHours(TARGET)}h per workday`)}
        </section>

        <section class="carbon-tile tt-compliance-panel">
          <div class="panel-head">
            <h2 class="carbon-data-table-container__title">Daily ${fmtHours(TARGET)}h Compliance by Member</h2>
            <div class="compliance-legend panel-note">
              ${carbonStatusBadge("success", "Exactly " + fmtHours(TARGET) + "h")}
              ${carbonStatusBadge("error", "Not exactly " + fmtHours(TARGET) + "h")}
              ${carbonStatusBadge("info", "Leave Day")}
              ${carbonStatusBadge("info", "Half Leave")}
              ${carbonStatusBadge("neutral", "Weekend / Public Holiday")}
              ${carbonStatusBadge("pending", "Pending future workday")}
            </div>
          </div>
          <div class="compliance-wrap">
            <table class="compliance carbon-data-table" aria-label="Daily compliance by member">
              <colgroup>
                <col class="user-col">
                ${allCalendarDays.map(() => `<col class="day-col">`).join("")}
              </colgroup>
              <thead>
                <tr>
                  <th scope="col">User</th>
                  ${allCalendarDays.map((meta) => `<th scope="col">${compactDate(meta.day)}</th>`).join("")}
                </tr>
              </thead>
              <tbody>
                ${compliance.map((row) => `<tr><th scope="row">${esc(row.name)}</th>${row.days.map((item) => {
                  const active = filters.user === row.username && isDaySelected(filters, item.day);
                  const cellClass = item.isLeave ? "leave" : (item.isHalfLeave ? "leave half" : (item.isOffday ? "offday" : (item.isPending ? "pending" : (item.onTarget ? "ok" : "miss"))));
                  const cellLabel = item.isLeave ? "Leave Day" : (item.isHalfLeave ? (item.hours > 0 ? fmtHours(item.hours) : "Half Leave") : (item.isOffday ? "—" : (item.isPending ? "Pending" : (item.hours <= 0 ? "No hours" : fmtHours(item.hours)))));
                  const gapRaw = item.isHalfLeave ? "Half-day Leave" : (item.gapLabel || "");
                  const gapText = esc(gapRaw);
                  const showGap = Boolean(gapRaw)
                    && gapRaw !== cellLabel
                    && !item.onTarget
                    && !item.isLeave
                    && !item.isOffday
                    && !item.isPending
                    && cellLabel !== "No hours"
                    && /^(Over by|Short by|Half-day)/.test(gapRaw);
                  const tip = gapRaw || cellLabel;
                  const aria = `${esc(row.name)} ${esc(compactDate(item.day))}: ${esc(tip)}`;
                  return `<td><button type="button" class="cell-button ${cellClass} ${active ? "active" : ""}" data-user-day="${esc(row.username)}|${esc(item.day)}" title="${esc(tip)}" aria-label="${aria}"><div class="cell-hours">${cellLabel}</div>${showGap ? `<div class="cell-gap">${gapText}</div>` : ""}</button></td>`;
                }).join("")}</tr>`).join("")}
              </tbody>
            </table>
          </div>
        </section>

        <section class="carbon-tile tt-project">
          <div class="tt-project-grid">
            <div class="tt-project-chart">
              ${carbonChartShell("chart-project-hours", "Hours by Project", "100%")}
            </div>
            <div class="tt-project-table">
              <div class="carbon-data-table-wrap"><table class="carbon-data-table cds--data-table"><thead>${projectTableHead}</thead><tbody>${projectTableBody}</tbody></table></div>
            </div>
          </div>
        </section>

        <section class="carbon-tile tt-project tt-member-section">
          <div class="tt-project-grid">
            <div class="tt-project-chart">
              ${carbonChartShell("chart-member-comparison", "Hours by Team Member", "100%")}
            </div>
            <div class="tt-project-table">
              <div class="carbon-data-table-wrap"><table class="carbon-data-table cds--data-table"><thead><tr><th scope="col">Member</th><th scope="col" class="num">Hours</th><th scope="col" class="num">%</th></tr></thead><tbody>${members.length ? members.map((row, i) => { const c = CHART_COLORS[i % CHART_COLORS.length]; const pct = totalHours ? (row.amount / totalHours * 100) : 0; return `<tr class="clickable" data-member-row="${esc(row.value)}" style="border-left:4px solid ${c};background:${c}18"><td>${esc(row.label)}</td><td class="num">${fmtHours(row.amount)}</td><td class="num">${fmtPct(pct)}</td></tr>`; }).join("") : `<tr><td colspan="3">${carbonEmptyState("No members in scope", "")}</td></tr>`}</tbody></table></div>
            </div>
          </div>
        </section>

        <section class="carbon-tile tt-breakdown">
          ${carbonChartShell("chart-daily-trend", "By Workday", "280px")}
          <div class="panel-note" style="margin-top:8px">Click a compliance day cell to filter by date range.</div>
        </section>

        <section class="carbon-tile tt-breakdown">
          ${carbonDataTableShell("By Ticket", ticketTableHead, ticketTableBody, "Click a ticket row to lock the detail panel")}
        </section>

        <section class="carbon-tile tt-entries">
          ${carbonDataTableShell("Time Tracking Details", entryTableHead, entryTableBody, "Every filtered Mantis time entry. Click a row to lock the ticket detail.")}
        </section>
      `;

      renderProjectChart(projects, filters);
      renderDailyTrendChart(days);
      renderMemberChart(members);

      function setFilter(key, value) {
        const next = Object.assign({}, filters, { [key]: value });
        writeFilters(next);
        render();
      }

      document.getElementById("filter-user").addEventListener("change", (event) => setFilter("user", event.target.value));
      document.getElementById("filter-project").addEventListener("change", (event) => setFilter("project", event.target.value));
      const bounds = periodBounds();
      const fromInput = document.getElementById("filter-from");
      const toInput = document.getElementById("filter-to");
      setDateInputDisplay(fromInput, filters.from === "all" ? "" : filters.from);
      setDateInputDisplay(toInput, filters.to === "all" ? "" : filters.to);
      bindDdMmDatePicker(fromInput, (iso) => {
        const next = normalizeRangeFilters(Object.assign({}, filters, { from: iso || "all" }));
        writeFilters(next);
        render();
      }, {
        placeholder: "Start (dd/mm/yyyy)",
        clearable: true,
        min: bounds.min,
        max: bounds.max,
      });
      bindDdMmDatePicker(toInput, (iso) => {
        const next = normalizeRangeFilters(Object.assign({}, filters, { to: iso || "all" }));
        writeFilters(next);
        render();
      }, {
        placeholder: "End (dd/mm/yyyy)",
        clearable: true,
        min: bounds.min,
        max: bounds.max,
      });
      document.getElementById("filter-ticket").addEventListener("change", (event) => setFilter("ticket", event.target.value.trim() || "all"));
      document.getElementById("filter-search").addEventListener("input", (event) => setFilter("search", event.target.value));
      document.getElementById("reset-filters").addEventListener("click", () => { writeFilters(FILTER_DEFAULTS); render(); });
      root.querySelectorAll("[data-clear]").forEach((node) => node.addEventListener("click", () => setFilter(node.dataset.clear, FILTER_DEFAULTS[node.dataset.clear])));
      root.querySelectorAll("[data-project-row]").forEach((node) => node.addEventListener("click", () => setFilter("project", filters.project === node.dataset.projectRow ? "all" : node.dataset.projectRow)));
      root.querySelectorAll("[data-user-day]").forEach((node) => node.addEventListener("click", () => {
        const [user, day] = node.dataset.userDay.split("|");
        const same = filters.user === user && filters.from === day && filters.to === day;
        const next = Object.assign({}, filters, {
          user: same ? "all" : user,
          from: same ? "all" : day,
          to: same ? "all" : day
        });
        writeFilters(normalizeRangeFilters(next));
        render();
      }));
      root.querySelectorAll("[data-ticket]").forEach((node) => node.addEventListener("click", () => setFilter("ticket", filters.ticket === node.dataset.ticket ? "all" : node.dataset.ticket || "all")));
    }

    render();
  })();
  </script>
</body>
</html>
