<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Digital Team Time Tracking Dashboard</title>
  <style>
.dla-date-field {
  position: relative;
  display: flex;
  align-items: center;
  gap: 4px;
  width: 100%;
}
.dla-date-field input {
  flex: 1 1 auto;
  min-width: 0;
  cursor: pointer;
}
.dla-date-trigger,
.dla-date-clear {
  flex: 0 0 auto;
  position: relative;
  z-index: 1;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 32px;
  height: 32px;
  min-width: 32px;
  min-height: 32px;
  border: 1px solid var(--line-strong, #cbd5e1);
  border-radius: 8px;
  background: #fff;
  color: var(--text, #0f172a);
  padding: 0;
  cursor: pointer;
}
.dla-date-trigger:hover,
.dla-date-clear:hover {
  background: var(--surface-raised, #f8fafc);
}
.dla-date-clear {
  width: 28px;
  font-size: 1.1rem;
  line-height: 1;
}
.dla-date-field input.invalid-date {
  border-color: #dc2626;
  box-shadow: 0 0 0 1px #fecaca;
}
.dla-date-popup {
  position: fixed;
  z-index: 10050;
  width: 280px;
  padding: 12px;
  border: 1px solid var(--line-strong, #cbd5e1);
  border-radius: 12px;
  background: #fff;
  box-shadow: 0 16px 40px rgba(15, 23, 42, 0.18);
  color: var(--text, #0f172a);
}
.dla-date-popup-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 10px;
}
.dla-date-popup-title {
  font-weight: 600;
  font-size: 0.9375rem;
}
.dla-date-popup-nav {
  display: inline-flex;
  gap: 4px;
}
.dla-date-popup-nav button {
  width: 28px;
  height: 28px;
  border: 1px solid var(--line, #e2e8f0);
  border-radius: 8px;
  background: #fff;
  cursor: pointer;
}
.dla-date-popup-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
}
.dla-date-popup-grid .dla-cal-wd {
  text-align: center;
  font-size: 0.6875rem;
  font-weight: 600;
  color: var(--muted, #64748b);
  padding: 2px 0 6px;
}
.dla-date-popup-grid button {
  height: 32px;
  border: none;
  border-radius: 8px;
  background: transparent;
  cursor: pointer;
  font-variant-numeric: tabular-nums;
}
.dla-date-popup-grid button:hover:not(:disabled) {
  background: var(--surface-raised, #f1f5f9);
}
.dla-date-popup-grid button.is-selected {
  background: var(--accent, #0f766e);
  color: #fff;
}
.dla-date-popup-grid button.is-today {
  box-shadow: inset 0 0 0 1px var(--accent, #0f766e);
}
.dla-date-popup-grid button:disabled {
  opacity: 0.35;
  cursor: not-allowed;
}
.dla-date-popup-grid button.is-outside {
  color: var(--muted, #94a3b8);
}

:root {
  color-scheme: light;
  --bg: #f4f6f8;
  --panel: #ffffff;
  --surface-raised: #f8fafc;
  --ink: #0f172a;
  --muted: #475569;
  --line: #e2e8f0;
  --accent: #0f766e;
  --accent-strong: #115e59;
  --accent-soft: #ccfbf1;
  --hero-bg: #134e4a;
  --shadow: 0 4px 14px rgba(15, 23, 42, 0.07);
  --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.06);
  --radius: 10px;
  --radius-lg: 12px;
  --font: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  --transition: 160ms cubic-bezier(0.22, 1, 0.36, 1);
  --focus-ring: 0 0 0 3px var(--accent-soft);
  --sidebar: #eef3f9;
  --danger: #b91c1c;
  --danger-soft: #fee2e2;
  --success: #166534;
  --success-soft: #dcfce7;
  --warning: #92400e;
  --warning-soft: #fef3c7;
  --control-height: 40px;
  --type-kpi: 1.75rem;
  --type-section: 1.0625rem;
  --type-label: 0.75rem;
}


* { box-sizing: border-box; }
html { overflow-x: clip; }
body {
  margin: 0;
  font-family: var(--font);
  color: var(--ink);
  background: var(--bg);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  overflow-x: clip;
  max-width: 100%;
}
.table-wrap, .compliance-wrap, .heatmap-wrap {
  display: block;
  width: 100%;
  max-width: 100%;
  min-width: 0;
  overflow-x: auto;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior-x: contain;
}
.table-wrap > table,
.compliance-wrap > table,
.heatmap-wrap > table {
  max-width: none;
}
main, .wrap, .shell, .app, .bento-grid, .bento-nested, .bento-cell,
.project-stack, .project-section, .member-section, .member, .panel, .card {
  max-width: 100%;
  min-width: 0;
}
@media (max-width: 767px) {
  .project-stack, .project-section, .member-section, .member, .members {
    overflow-x: clip;
  }
}
.chip button, .filter-chip button, [data-clear] {
  min-width: 28px;
  min-height: 28px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}
button, input, select { font: inherit; }
button { cursor: pointer; }
button:focus-visible, input:focus-visible, select:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
  box-shadow: var(--focus-ring);
}
.skip-link {
  position: absolute;
  left: 8px;
  top: 8px;
  z-index: 1000;
  padding: 8px 12px;
  background: var(--ink);
  color: #fff;
  border-radius: var(--radius);
  text-decoration: none;
  clip: rect(0 0 0 0);
  clip-path: inset(50%);
  height: 1px;
  width: 1px;
  overflow: hidden;
  white-space: nowrap;
}
.skip-link:focus, .skip-link:focus-visible {
  clip: auto;
  clip-path: none;
  height: auto;
  width: auto;
  overflow: visible;
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}
.visually-hidden {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0 0 0 0);
  white-space: nowrap;
  border: 0;
}
a:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}


:root { --bento-gap: 14px; }
.bento-grid {
  display: grid;
  grid-template-columns: repeat(12, minmax(0, 1fr));
  gap: var(--bento-gap);
  align-items: start;
}
.bento-cell { min-width: 0; }
.bento-span-12 { grid-column: span 12; }
.bento-span-8 { grid-column: span 8; }
.bento-span-6 { grid-column: span 6; }
.bento-span-4 { grid-column: span 4; }
.bento-span-3 { grid-column: span 3; }
.bento-span-2 { grid-column: span 2; }
.bento-nested {
  display: grid;
  grid-template-columns: repeat(12, minmax(0, 1fr));
  gap: var(--bento-gap);
  width: 100%;
  grid-column: span 12;
  align-items: start;
}
@media (max-width: 1199px) {
  .bento-span-8, .bento-span-6 { grid-column: span 12; }
  .bento-span-4, .bento-span-3 { grid-column: span 6; }
  .bento-span-2 { grid-column: span 4; }
}
@media (max-width: 767px) {
  .bento-span-8, .bento-span-6, .bento-span-4, .bento-span-3, .bento-span-2 {
    grid-column: span 12;
  }
  .bento-grid, .shell, .wrap, .app { max-width: 100%; width: 100%; }
  .bento-grid, .bento-nested, .bento-cell, .panel, .card, .member, .project-section {
    min-width: 0;
  }
  .filters, .toolbar, .grid.filters { grid-template-columns: 1fr !important; }
}
@media print {
  .bento-grid, .bento-nested { display: block; }
  .bento-grid > *, .bento-nested > * { break-inside: avoid; margin-bottom: 12px; }
}


.meta-strip {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm);
  padding: 14px 18px;
}
.meta-strip-main {
  display: flex;
  flex-wrap: wrap;
  align-items: flex-start;
  justify-content: space-between;
  gap: 10px 16px;
}
.meta-title {
  margin: 0;
  font-size: 1.375rem;
  font-weight: 700;
  line-height: 1.25;
  text-wrap: balance;
  color: var(--ink);
}
.meta-sub { margin: 4px 0 0; color: var(--muted); font-size: 0.875rem; }
.meta-pills {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
  max-width: 100%;
  min-width: 0;
}
.meta-pill {
  border-radius: 999px;
  padding: 5px 10px;
  font-size: 0.75rem;
  background: var(--surface-raised);
  border: 1px solid var(--line);
  color: var(--muted);
  white-space: normal;
  overflow-wrap: anywhere;
  max-width: min(100%, 36ch);
}
.meta-strip-main,
.meta-strip-main > div {
  min-width: 0;
  max-width: 100%;
}
.meta-strip .source-panel {
  margin-top: 10px;
  padding: 10px 12px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: var(--surface-raised);
}
.meta-warning { color: #b91c1c; font-weight: 600; font-size: 0.8125rem; margin: 8px 0 0; }


.empty-state {
  display: grid;
  gap: 8px;
  justify-items: start;
  padding: 28px 24px;
  border: 1px dashed var(--line);
  border-radius: var(--radius-lg);
  background: var(--surface-raised);
  color: var(--ink);
}
.empty-state[hidden] { display: none !important; }
.empty-state-title {
  margin: 0;
  font-size: var(--type-section, 1.0625rem);
  font-weight: 700;
  line-height: 1.3;
}
.empty-state-message {
  margin: 0;
  color: var(--muted);
  font-size: 0.875rem;
  max-width: 52ch;
}
.empty-state-action {
  margin-top: 4px;
  min-height: var(--control-height, 40px);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 0 14px;
  border: 1px solid var(--accent);
  border-radius: var(--radius);
  background: var(--accent);
  color: #fff;
  font-weight: 600;
  cursor: pointer;
}
.empty-state-action:hover { background: var(--accent-strong); border-color: var(--accent-strong); }
.empty-state--filter { border-color: color-mix(in srgb, var(--accent) 35%, var(--line)); }
.empty-state--nodata { border-style: solid; }
.empty-state--error {
  border-color: color-mix(in srgb, var(--danger, #b91c1c) 40%, var(--line));
  background: var(--danger-soft, #fee2e2);
}
.skeleton-panel {
  display: grid;
  gap: 10px;
  padding: 16px;
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  background: var(--panel);
}
.skeleton-panel[hidden] { display: none !important; }
.skeleton-line, .skeleton-kpi, .skeleton-row {
  display: block;
  border-radius: 6px;
  background: linear-gradient(90deg, var(--line) 0%, var(--surface-raised) 50%, var(--line) 100%);
  background-size: 200% 100%;
  animation: dla-skeleton-shimmer 1.2s ease-in-out infinite;
}
.skeleton-line { height: 12px; width: 100%; }
.skeleton-line.w-60 { width: 60%; }
.skeleton-line.w-40 { width: 40%; }
.skeleton-kpi { height: 44px; width: 100%; }
.skeleton-row { height: 32px; width: 100%; }
.skeleton-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 10px;
}
.is-loading {
  position: relative;
  pointer-events: none;
}
.is-loading > *:not(.skeleton-panel) { opacity: 0.35; }
@keyframes dla-skeleton-shimmer {
  0% { background-position: 100% 0; }
  100% { background-position: -100% 0; }
}
@media (prefers-reduced-motion: reduce) {
  .skeleton-line, .skeleton-kpi, .skeleton-row {
    animation: none;
    background: var(--line);
  }
}
.freshness-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 2px 8px;
  border-radius: 999px;
  font-size: 0.6875rem;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  border: 1px solid var(--line);
}
.freshness-pill[data-freshness="fresh"] {
  color: var(--success, #166534);
  background: var(--success-soft, #dcfce7);
  border-color: color-mix(in srgb, var(--success, #166534) 25%, var(--line));
}
.freshness-pill[data-freshness="stale"] {
  color: var(--warning, #92400e);
  background: var(--warning-soft, #fef3c7);
  border-color: color-mix(in srgb, var(--warning, #92400e) 25%, var(--line));
}
.freshness-pill[data-freshness="missing"] {
  color: var(--danger, #b91c1c);
  background: var(--danger-soft, #fee2e2);
  border-color: color-mix(in srgb, var(--danger, #b91c1c) 25%, var(--line));
}


.bento-grid.bento-layout-root {
  position: relative;
  grid-auto-rows: minmax(72px, auto);
}
[data-bento-host] { display: contents; }
.bento-grid.bento-layout-editing [data-bento-id]:not([data-bento-id] [data-bento-id]) {
  outline: 2px dashed var(--accent, #0f766e);
  outline-offset: -2px;
  cursor: default;
  touch-action: none;
  position: relative;
}
.bento-grid.bento-layout-editing [data-bento-id]:not([data-bento-id] [data-bento-id])[data-bento-locked="true"] {
  outline: 2px solid rgba(15, 118, 110, 0.35);
  outline-offset: -2px;
  cursor: not-allowed;
  opacity: 0.92;
}
.bento-grid.bento-layout-editing [data-bento-id]:not([data-bento-id] [data-bento-id]):not([data-bento-locked="true"]) .bento-drag-handle {
  display: flex;
}
.bento-grid.bento-layout-editing [data-bento-id]:not([data-bento-id] [data-bento-id]):not([data-bento-locked="true"]) .bento-resize-handle {
  display: block;
}
.bento-drag-handle {
  display: none;
  align-items: center;
  gap: 6px;
  margin: -4px 0 8px;
  padding: 8px 12px;
  min-height: 28px;
  border-radius: 6px;
  background: var(--accent-soft, #ccfbf1);
  color: var(--accent-strong, #115e59);
  font-size: 0.6875rem;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  cursor: grab;
  user-select: none;
  touch-action: none;
  width: fit-content;
  max-width: 100%;
  z-index: 4;
}
.bento-drag-handle::before {
  content: "⋮⋮";
  font-size: 0.875rem;
  line-height: 1;
}
.bento-drag-handle:active { cursor: grabbing; }
.bento-resize-handle {
  display: none;
  position: absolute;
  right: 4px;
  bottom: 4px;
  width: 24px;
  height: 24px;
  border-radius: 4px;
  background: var(--accent, #0f766e);
  cursor: nwse-resize;
  opacity: 0.92;
  z-index: 5;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.35);
}
.bento-resize-handle::after {
  content: "";
  position: absolute;
  right: 5px;
  bottom: 5px;
  width: 10px;
  height: 10px;
  border-right: 2px solid #fff;
  border-bottom: 2px solid #fff;
}
.bento-resize-row-handle {
  display: none;
  position: absolute;
  left: 50%;
  bottom: 2px;
  transform: translateX(-50%);
  width: 56px;
  height: 24px;
  border-radius: 4px;
  background: var(--accent, #0f766e);
  cursor: ns-resize;
  opacity: 0.92;
  z-index: 5;
}
.bento-grid.bento-layout-editing [data-bento-id]:not([data-bento-id] [data-bento-id]):not([data-bento-locked="true"]) .bento-resize-row-handle {
  display: block;
}
@media (prefers-reduced-motion: reduce) {
  .bento-layout-drop-indicator,
  .bento-drag-handle,
  .bento-resize-handle,
  .bento-resize-row-handle {
    transition: none !important;
  }
}
.bento-layout-toolbar {
  display: inline-flex;
  flex-wrap: wrap;
  gap: 6px;
  align-items: center;
}
.bento-layout-toolbar.meta-inline {
  margin-left: auto;
}
.bento-layout-toolbar button {
  border: 1px solid var(--line, #e2e8f0);
  border-radius: 8px;
  background: #fff;
  color: var(--ink, #0f172a);
  padding: 6px 11px;
  font-size: 0.8125rem;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
}
.bento-layout-toolbar button:hover { background: var(--surface-raised, #f8fafc); }
.bento-layout-toolbar button.primary {
  background: var(--accent, #0f766e);
  border-color: var(--accent, #0f766e);
  color: #fff;
}
.bento-layout-toolbar button.layout-edit-btn {
  background: #0f766e;
  border-color: #0f766e;
  color: #fff;
}
.bento-layout-toolbar button.layout-edit-btn:hover { background: #115e59; }
.bento-grid.bento-layout-editing [data-bento-id]:not([data-bento-id] [data-bento-id]).bento-tile-dragging {
  opacity: 0.38;
  pointer-events: none;
}
.bento-layout-drop-indicator {
  position: absolute;
  border: 2px solid var(--accent, #0f766e);
  border-radius: 10px;
  background: rgba(15, 118, 110, 0.12);
  box-shadow: 0 8px 24px rgba(15, 118, 110, 0.18);
  pointer-events: none;
  z-index: 100;
  display: none;
  box-sizing: border-box;
  will-change: transform, width, height;
}
@media (max-width: 767px) {
  .bento-layout-toolbar.meta-inline {
    margin-left: 0;
    width: 100%;
    justify-content: flex-end;
  }
  .bento-grid.bento-layout-root:not(.bento-layout-editing) > [data-bento-id]:not([data-bento-id] [data-bento-id]) {
    grid-column: 1 / -1 !important;
    grid-row: auto !important;
  }
}
@media print {
  .bento-grid.bento-layout-root [data-bento-id]:not([data-bento-id] [data-bento-id]) {
    grid-column: 1 / -1 !important;
    grid-row: auto !important;
    break-inside: avoid;
  }
  .bento-drag-handle, .bento-resize-handle, .bento-resize-row-handle, .bento-layout-drop-indicator { display: none !important; }
}


:root {
  --deep: var(--hero-bg);
  --teal: var(--accent);
  --teal-soft: var(--accent-soft);
  --red: #dc2626;
  --red-soft: #fee2e2;
  --gold: #ca8a04;
  --gold-soft: #fef9c3;
  --blue: #2563eb;
  --compliance-ok-bg: #ecfdf5;
  --compliance-ok-border: #86efac;
  --compliance-miss-bg: #fef2f2;
  --compliance-miss-border: #fecaca;
  --compliance-offday-bg: #f1f5f9;
  --compliance-offday-border: #e2e8f0;
  --compliance-pending-bg: #f8fafc;
  --compliance-pending-border: #cbd5e1;
  --compliance-leave-bg: #e0f2fe;
  --compliance-leave-border: #7dd3fc;
  --compliance-leave-half-bg: #f0f9ff;
}
body { margin: 0; color: var(--ink); background: var(--bg); }
#app { display: contents; min-height: 100vh; }
#tt-root { display: contents; }
.shell { width: calc(100% - 32px); max-width: none; margin: 0 auto; padding: 18px 0; }
.shell.bento-grid { width: 100%; padding: 16px; max-width: 1840px; }
.tt-toolbar { grid-column: span 12; }
.tt-chips { grid-column: span 12; }
.tt-kpis {
  display: contents;
}
.tt-kpis > .card { grid-column: span 2; min-width: 0; }
.tt-compliance-panel { grid-column: span 12; }
.tt-project { grid-column: span 7; }
.tt-detail { grid-column: span 5; position: sticky; top: 12px; align-self: start; }
.tt-breakdown { grid-column: span 4; }
.tt-entries { grid-column: span 12; }
.toolbar {
  display: grid;
  grid-template-columns: repeat(6, minmax(150px, 1fr));
  gap: 12px;
  margin-bottom: 14px;
  align-items: end;
}
.control label {
  display: block;
  margin-bottom: 6px;
  color: var(--muted);
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.control input, .control select, .action-button {
  width: 100%;
  min-width: 0;
  height: 40px;
  border-radius: var(--radius);
  border: 1px solid var(--line);
  background: var(--panel);
  color: var(--ink);
  padding: 0 12px;
  box-shadow: var(--shadow-sm);
  transition: border-color var(--transition), box-shadow var(--transition);
}
.control input:focus, .control select:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}
.action-button { font-weight: 600; background: var(--panel); }
.action-button:hover { background: var(--surface-raised); }
.chips {
  display: flex;
  flex-wrap: wrap;

    el.dataset.bentoRowSpan = String(rs);
  }

  function rowFromTop(topPx, metrics) {
    return Math.max(1, Math.floor(Math.max(0, topPx) / metrics.rowUnit) + 1);
  }

  function columnFromLeft(leftPx, cs, metrics) {
    let c = Math.floor(Math.max(0, leftPx) / metrics.colUnit) + 1;
    return Math.max(1, Math.min(COLS - cs + 1, c));
  }

  function packLayoutDefault(grid, onlyMissing = true) {
    const list = sortedTiles(grid).filter((el) => !(onlyMissing && el.dataset.bentoCol));
    let row = 1;
    let col = 1;
    for (const el of list) {
      const cs = Math.max(1, Math.min(COLS, Number(el.dataset.bentoColSpan || defaultSpan(el))));
      const rs = defaultRowSpan(el);
      if (cs >= COLS) {
        if (col > 1) {
          row += 1;
          col = 1;
        }
        applyPlacement(el, { c: 1, cs: COLS, r: row, rs });
        row += rs;
        col = 1;
        continue;
      }
      if (col + cs - 1 > COLS) {
        row += 1;
        col = 1;
      }
      applyPlacement(el, { c: col, cs, r: row, rs });
      col += cs;
      if (col > COLS) {
        row += 1;
        col = 1;
      }
    }
  }

  function sortedTiles(grid) {
    return tiles(grid)
      .map((el, idx) => ({
        el,
        idx,
        order: Number(el.dataset.bentoOrder || 0),
      }))
      .sort((a, b) => (a.order - b.order) || (a.idx - b.idx))
      .map((item) => item.el);
  }

  function defaultRowSpan(el) {
    const rs = Number(el.dataset.bentoRowSpan || 0);
    return rs > 0 ? rs : 1;
  }

  function packOrphans(grid) {
    for (const el of tiles(grid).filter((t) => !t.dataset.bentoCol)) {
      const cs = Math.max(1, Math.min(COLS, Number(el.dataset.bentoColSpan || defaultSpan(el))));
      const rs = defaultRowSpan(el);
      let placed = false;
      for (let row = 1; row < 400 && !placed; row += 1) {
        for (let col = 1; col <= COLS - cs + 1; col += 1) {
          const test = { c: col, cs, r: row, rs };
          if (!findOccupants(grid, el, test).length) {
            applyPlacement(el, test);
            placed = true;
            break;
          }
        }
      }
      if (!placed) applyPlacement(el, { c: 1, cs, r: 1, rs });
    }
  }

  function packLayoutFromVisual(grid, onlyMissing = true) {
    packLayoutDefault(grid, onlyMissing);
  }

  function isLayoutCorrupt(layout) {
    // Only treat "almost everything forced to column 1" as corruption.
    // Dense KPI boards (many cs<=4 across many rows) are valid custom layouts
    // and must not be wiped on refreshTiles / Done.
    const items = Object.values(layout?.items || {});
    if (items.length < 4) return false;
    const atCol1 = items.filter((p) => Number(p.c || 1) === 1).length;
    return atCol1 / items.length >= 0.85;
  }

  function applyLayoutFromStorageOrDefault(grid, dashboardId) {
    const saved = loadLayout(dashboardId);
    if (saved?.items && !isLayoutCorrupt(saved)) {
      applySaved(grid, saved);
      if (saved._loadedFromVersion && saved._loadedFromVersion !== VERSION) {
        const st = getState(grid);
        if (st) persist(st);
      }
      return;
    }
    if (saved?.items && isLayoutCorrupt(saved)) {
      try {
        localStorage.removeItem(storageKey(dashboardId));
        for (const ver of [3, 2, 1]) {
          localStorage.removeItem(`dla-bento-layout:v${ver}:${dashboardId}`);
        }
      } catch {
        // ignore
      }
    }
    packLayoutDefault(grid, false);
  }

  function findRowForTop(grid, dragging, topPx) {
    const gridRect = grid.getBoundingClientRect();
    const scrollTop = grid.scrollTop || 0;
    const bands = tiles(grid)
      .filter((t) => t !== dragging)
      .map((t) => {
        const rect = t.getBoundingClientRect();
        return {
          row: Number(t.dataset.bentoRow || 1),
          mid: (rect.top + rect.bottom) / 2 - gridRect.top + scrollTop,
        };
      })
      .sort((a, b) => a.mid - b.mid);
    for (const band of bands) {
      if (topPx < band.mid) return Math.max(1, band.row);
    }
    return (bands.length ? Math.max(...bands.map((b) => b.row)) : 0) + 1;
  }

  function columnsOverlap(c1, cs1, c2, cs2) {
    const e1 = c1 + cs1 - 1;
    const e2 = c2 + cs2 - 1;
    return !(e1 < c2 || c1 > e2);
  }

  function isLocked(el) {
    if (!el) return false;
    if (el.dataset.bentoLocked === "true") return true;
    const id = String(el.dataset.bentoId || "");
    return id.endsWith("-meta") || id.includes("-toolbar") || id.includes("-filter");
  }

  function placementBox(p) {
    return {
      c: Number(p.c || 1),
      cs: Number(p.cs || 1),
      r: Number(p.r || 1),
      rs: Number(p.rs || 1),
    };
  }

  function boxesOverlap(a, b) {
    return !(
      a.c + a.cs - 1 < b.c ||
      b.c + b.cs - 1 < a.c ||
      a.r + a.rs - 1 < b.r ||
      b.r + b.rs - 1 < a.r
    );
  }

  function findOccupants(grid, tile, placement) {
    const box = placementBox(placement);
    return tiles(grid).filter((other) => {
      if (other === tile || isLocked(other)) return false;
      return boxesOverlap(box, placementBox(readPlacement(other)));
    });
  }

  function placeTile(grid, tile, placement) {
    const next = placementBox(placement);
    const moved = new Set();
    function resolveOverlaps(box, depth) {
      if (depth > tiles(grid).length + 2) return;
      for (const other of findOccupants(grid, tile, box)) {
        if (moved.has(other)) continue;
        const op = placementBox(readPlacement(other));
        const pushed = { c: op.c, cs: op.cs, r: box.r + box.rs, rs: op.rs };
        applyPlacement(other, pushed);
        moved.add(other);
        resolveOverlaps(placementBox(readPlacement(other)), depth + 1);
      }
    }
    resolveOverlaps(next, 0);
    applyPlacement(tile, next);
  }

  function defaultLayout(grid) {
    const items = {};
    for (const el of tiles(grid)) {
      items[el.dataset.bentoId] = readPlacement(el);
    }
    return { version: VERSION, items };
  }

  function clearPlacements(grid) {
    for (const el of tiles(grid)) {
      el.style.removeProperty("grid-column");
      el.style.removeProperty("grid-row");
      delete el.dataset.bentoCol;
      delete el.dataset.bentoColSpan;
      delete el.dataset.bentoRow;
      delete el.dataset.bentoRowSpan;
    }
  }

  function serialize(grid) {
    const items = {};
    for (const el of tiles(grid)) {
      items[el.dataset.bentoId] = readPlacement(el);
    }
    return { version: VERSION, items };
  }

  function applySaved(grid, layout) {
    const items = layout?.items || {};
    for (const el of tiles(grid)) {
      const saved = items[el.dataset.bentoId];
      if (saved) applyPlacement(el, saved);
    }
    const orphans = tiles(grid).filter((el) => !el.dataset.bentoCol);
    if (orphans.length) packOrphans(grid);
  }

  function metaToolbarHost(grid) {
    const scope = grid.closest(".bento-grid") || grid.parentElement || grid;
    const strip = scope.querySelector(":scope > .meta-strip") || scope.querySelector(".meta-strip");
    if (!strip) return null;
    let main = strip.querySelector(".meta-strip-main");
    if (!main) {
      main = document.createElement("div");
      main.className = "meta-strip-main";
      strip.prepend(main);
    }
    main.style.display = "flex";
    main.style.alignItems = "flex-start";
    main.style.justifyContent = "space-between";
    main.style.gap = "12px";
    main.style.width = "100%";
    return main;
  }

  function ensureIndicator(grid, state) {
    if (state.indicator) return;
    const indicator = document.createElement("div");
    indicator.className = "bento-layout-drop-indicator";
    grid.appendChild(indicator);
    state.indicator = indicator;
  }

  function ensureToolbar(grid, state, mode) {
    ensureIndicator(grid, state);
    if (mode === "none") {
      state.toolbarMode = "none";
      if (state.toolbar) {
        state.toolbar.remove();
        state.toolbar = null;
      }
      return;
    }
    if (state.toolbar && state.toolbarMode === mode) return;
    if (state.toolbar) state.toolbar.remove();

    const bar = document.createElement("div");
    bar.className = "bento-layout-toolbar meta-inline";
    bar.innerHTML = `
      <button type="button" class="layout-edit-btn" data-bento-edit>Edit layout</button>
      <button type="button" data-bento-reset hidden>Reset default</button>
      <button type="button" data-bento-done class="primary" hidden>Done</button>
    `;
    const host = metaToolbarHost(grid);
    if (host) {
      host.appendChild(bar);
    } else {
      bar.style.margin = "8px 0 0";
      grid.parentElement?.insertBefore(bar, grid) || grid.prepend(bar);
    }
    state.toolbar = bar;
    state.toolbarMode = mode;

    bar.querySelector("[data-bento-edit]").addEventListener("click", () => setEditing(state, true));
    bar.querySelector("[data-bento-done]").addEventListener("click", () => setEditing(state, false));
    bar.querySelector("[data-bento-reset]").addEventListener("click", () => resetLayout());
  }

  function decorateTiles(state) {
    for (const el of tiles(state.grid)) {
      if (isLocked(el)) {
        el.dataset.bentoLocked = "true";
        el.title = el.title || "Locked tile — layout fixed";
        continue;
      }
      el.dataset.bentoLocked = "false";
      if (!el.querySelector(".bento-drag-handle")) {
        const handle = document.createElement("div");
        handle.className = "bento-drag-handle";
        handle.textContent = "Drag to move";
        el.prepend(handle);
      }
      if (!el.querySelector(".bento-resize-handle")) {
        const resize = document.createElement("div");
        resize.className = "bento-resize-handle";
        resize.title = "Drag to resize width";
        el.appendChild(resize);
      }
      if (!el.querySelector(".bento-resize-row-handle")) {
        const rowResize = document.createElement("div");
        rowResize.className = "bento-resize-row-handle";
        rowResize.title = "Drag to resize height";
        el.appendChild(rowResize);
      }
    }
  }

  function persist(state) {
    saveDashboardPrefs(storageKey(state.dashboardId), serialize(state.grid));
  }

  function syncToolbarButtons(state) {
    if (!state.toolbar) return;
    const on = state.editing;
    const edit = state.toolbar.querySelector("[data-bento-edit]");
    const reset = state.toolbar.querySelector("[data-bento-reset]");
    const done = state.toolbar.querySelector("[data-bento-done]");
    if (edit) edit.hidden = on;
    if (reset) reset.hidden = !on;
    if (done) done.hidden = !on;
  }

  function setEditing(state, on) {
    state.editing = on;
    state.grid.classList.toggle("bento-layout-editing", on);
    if (on) {
      const saved = loadLayout(state.dashboardId);
      if (!saved?.items) packLayoutDefault(state.grid, true);
      decorateTiles(state);
    } else {
      for (const el of tiles(state.grid)) el.classList.remove("bento-tile-dragging");
      hideIndicator(state);
    }
    syncToolbarButtons(state);
    if (!on) persist(state);
  }

  function isManagedTile(grid, el) {
    if (!el?.matches?.("[data-bento-id]")) return false;
    let parent = el.parentElement;
    while (parent && parent !== grid) {
      if (parent.matches("[data-bento-id]")) return false;
      parent = parent.parentElement;
    }
    return parent === grid;
  }

  function gridMetrics(grid) {
    const rect = grid.getBoundingClientRect();
    const style = getComputedStyle(grid);
    const gap = parseFloat(style.gap) || 16;
    const colGap = parseFloat(style.columnGap) || gap;
    const rowGap = parseFloat(style.rowGap) || gap;
    const colWidth = (rect.width - colGap * (COLS - 1)) / COLS;
    const rowMin = 72;
    return { rect, colWidth, colGap, rowGap, rowMin, colUnit: colWidth + colGap, rowUnit: rowMin + rowGap };
  }

  function snapColumn(metrics, clientX, cs) {
    const x = clientX - metrics.rect.left;
    let c = Math.floor(x / metrics.colUnit) + 1;
    return Math.max(1, Math.min(COLS - cs + 1, c));
  }

  function tileBox(grid, tile, c, cs) {
    const m = gridMetrics(grid);
    const left = (c - 1) * m.colUnit;
    const width = cs * m.colWidth + (cs - 1) * m.colGap;
    const height = Math.max(tile.offsetHeight || 0, tile.getBoundingClientRect().height);
    return { left, width, height, metrics: m };
  }

  function showIndicatorAt(state, tile, c, topPx, cs) {
    const box = tileBox(state.grid, tile, c, cs);
    const ind = state.indicator;
    ind.style.display = "block";
    ind.style.left = `${box.left}px`;
    ind.style.top = `${Math.max(0, topPx)}px`;
    ind.style.width = `${box.width}px`;
    ind.style.height = `${box.height}px`;
  }

  function hideIndicator(state) {
    if (state.indicator) state.indicator.style.display = "none";
  }

  function canStartDrag(ev, tile) {
    if (isLocked(tile)) return false;
    if (ev.target.closest(".bento-resize-handle, .bento-resize-row-handle")) return false;
    if (ev.target.closest("button, a, input, select, textarea, label, .cell-button, .bar-row")) return false;
    if (ev.target.closest(".bento-drag-handle")) return true;
    if (ev.target.closest(".panel-head")) return true;
    const rect = tile.getBoundingClientRect();
    return ev.clientY - rect.top <= 52;
  }

  function bindInteractions(state) {
    if (state.bound) return;
    state.bound = true;
    let moveFrame = 0;
    let lastMoveEv = null;

    function flushMove() {
      moveFrame = 0;
      const ev = lastMoveEv;
      if (!ev) return;
      if (state.dragging) {
        const cs = Number(state.dragging.dataset.bentoColSpan || defaultSpan(state.dragging));
        const m = gridMetrics(state.grid);
        const c = snapColumn(m, ev.clientX, cs);
        const scrollTop = state.grid.scrollTop || 0;
        const topPx = ev.clientY - m.rect.top + scrollTop - state.dragOffsetY;
        showIndicatorAt(state, state.dragging, c, topPx, cs);
        state.pendingDrop = { c, topPx, cs };
      }
      if (state.resizing) {
        const m = gridMetrics(state.grid);
        const delta = ev.clientX - state.resizeStartX;
        const next = Math.max(1, Math.min(COLS, Math.round(state.resizeStartSpan + delta / m.colUnit)));
        applyPlacement(state.resizing, {
          c: Number(state.resizing.dataset.bentoCol || 1),
          cs: next,
          r: Number(state.resizing.dataset.bentoRow || 1),
          rs: Number(state.resizing.dataset.bentoRowSpan || 1),
        });
      }
      if (state.rowResizing) {
        const m = gridMetrics(state.grid);
        const delta = ev.clientY - state.resizeStartY;
        const nextRs = Math.max(1, Math.min(24, Math.round(state.resizeStartRowSpan + delta / m.rowUnit)));
        applyPlacement(state.rowResizing, {
          c: Number(state.rowResizing.dataset.bentoCol || 1),
          cs: Number(state.rowResizing.dataset.bentoColSpan || defaultSpan(state.rowResizing)),
          r: Number(state.rowResizing.dataset.bentoRow || 1),
          rs: nextRs,
        });
      }
    }

    function onPointerMove(ev) {
      if (!state.dragging && !state.resizing && !state.rowResizing) return;
      lastMoveEv = ev;
      if (!moveFrame) moveFrame = requestAnimationFrame(flushMove);
    }

    function finishPointer(ev) {
      if (state.dragPointerId != null && state.dragCaptureEl?.releasePointerCapture) {
        try { state.dragCaptureEl.releasePointerCapture(state.dragPointerId); } catch { /* ignore */ }
      }
      state.dragPointerId = null;
      state.dragCaptureEl = null;

      if (state.dragging) {
        const cs = Number(state.dragging.dataset.bentoColSpan || defaultSpan(state.dragging));
        const rs = Number(state.dragging.dataset.bentoRowSpan || 1);
        const m = gridMetrics(state.grid);
        const c = state.pendingDrop?.c ?? snapColumn(m, ev.clientX, cs);
        const scrollTop = state.grid.scrollTop || 0;
        const topPx = state.pendingDrop?.topPx ?? (ev.clientY - m.rect.top + scrollTop - state.dragOffsetY);
        const r = findRowForTop(state.grid, state.dragging, topPx);
        placeTile(state.grid, state.dragging, { c, cs, r, rs });
        state.dragging.classList.remove("bento-tile-dragging");
        persist(state);
      }
      if (state.resizing || state.rowResizing) persist(state);
      state.dragging = null;
      state.resizing = null;
      state.rowResizing = null;
      state.pendingDrop = null;
      hideIndicator(state);
      window.removeEventListener("pointermove", onPointerMove);
      window.removeEventListener("pointerup", onPointerUp);
      window.removeEventListener("pointercancel", onPointerUp);
    }

    function onPointerUp(ev) {
      finishPointer(ev);
    }

    state.grid.addEventListener("pointerdown", (ev) => {
      if (!state.editing || ev.button !== 0) return;
      const colHandle = ev.target.closest(".bento-resize-handle");
      const rowHandle = ev.target.closest(".bento-resize-row-handle");
      let tile = ev.target.closest("[data-bento-id]");
      if (!tile || !isManagedTile(state.grid, tile) || isLocked(tile)) return;

      if (colHandle) {
        state.resizing = tile;
        state.resizeStartX = ev.clientX;
        state.resizeStartSpan = Number(tile.dataset.bentoColSpan || defaultSpan(tile));
        state.dragCaptureEl = colHandle;
        state.dragPointerId = ev.pointerId;
        try { colHandle.setPointerCapture(ev.pointerId); } catch { /* ignore */ }
        ev.preventDefault();
        window.addEventListener("pointermove", onPointerMove);
        window.addEventListener("pointerup", onPointerUp);
        window.addEventListener("pointercancel", onPointerUp);
        return;
      }

      if (rowHandle) {
        state.rowResizing = tile;
        state.resizeStartY = ev.clientY;
        state.resizeStartRowSpan = Number(tile.dataset.bentoRowSpan || 1);
        state.dragCaptureEl = rowHandle;
        state.dragPointerId = ev.pointerId;
        try { rowHandle.setPointerCapture(ev.pointerId); } catch { /* ignore */ }
        ev.preventDefault();
        window.addEventListener("pointermove", onPointerMove);
        window.addEventListener("pointerup", onPointerUp);
        window.addEventListener("pointercancel", onPointerUp);
        return;
      }

      if (!canStartDrag(ev, tile)) return;

      state.dragging = tile;
      tile.classList.add("bento-tile-dragging");
      const tileRect = tile.getBoundingClientRect();
      state.dragOffsetY = ev.clientY - tileRect.top;
      state.pendingDrop = null;
      state.dragCaptureEl = ev.target.closest(".bento-drag-handle") || tile;
      state.dragPointerId = ev.pointerId;
      try { state.dragCaptureEl.setPointerCapture(ev.pointerId); } catch { /* ignore */ }
      ev.preventDefault();
      onPointerMove(ev);
      window.addEventListener("pointermove", onPointerMove);
      window.addEventListener("pointerup", onPointerUp);
      window.addEventListener("pointercancel", onPointerUp);
    });
  }

  function getState(grid) {
    return mounted.get(grid) || null;
  }

  function mount(grid, options) {
    if (!grid) return null;
    const dashboardId = options?.dashboardId || grid.dataset.bentoDashboard;
    if (!dashboardId) return null;
    grid.classList.add("bento-layout-root");
    grid.dataset.bentoDashboard = dashboardId;

    const toolbarMode = resolveToolbarMode(options);
    let state = mounted.get(grid);
    if (!state) {
      state = { grid, dashboardId, editing: false };
      mounted.set(grid, state);
      bindInteractions(state);
    }
    state.dashboardId = dashboardId;
    ensureToolbar(grid, state, toolbarMode);

    const saved = loadLayout(dashboardId);
    applyLayoutFromStorageOrDefault(grid, dashboardId);
    if (state.editing) decorateTiles(state);
    window.__dlaBentoReady = true;
    return state;
  }

  function apply(grid, dashboardId, options) {
    const id = dashboardId || grid?.dataset?.bentoDashboard;
    if (!grid || !id) return;
    grid.dataset.bentoDashboard = id;
    mount(grid, Object.assign({ dashboardId: id }, options || {}));
    const state = getState(grid);
    if (!state) return;
    applyLayoutFromStorageOrDefault(grid, id);
    if (state.editing) decorateTiles(state);
    window.__dlaBentoReady = true;
  }

  function refreshTiles(grid, dashboardId, options) {
    const id = dashboardId || grid?.dataset?.bentoDashboard;
    if (!grid || !id) return;
    grid.dataset.bentoDashboard = id;
    const state = getState(grid) || mount(grid, Object.assign({ dashboardId: id }, options || {}));
    if (!state) return;
    state.dashboardId = id;
    applyLayoutFromStorageOrDefault(grid, id);
    if (state.editing) decorateTiles(state);
  }

  function restoreEditing(grid, on) {
    const state = getState(grid);
    if (!state) return false;
    setEditing(state, Boolean(on));
    return true;
  }

  function openEditor() {
    const root = layoutRoot();
    if (!root) return false;
    const state = getState(root);
    const id = state?.dashboardId || root.dataset.bentoDashboard;
    apply(root, id, { toolbar: "none" });
    const next = getState(root);
    if (next) setEditing(next, true);
    return Boolean(next);
  }

  function closeEditor() {
    const root = layoutRoot();
    if (!root) return false;
    const state = getState(root);
    if (!state) return false;
    setEditing(state, false);
    return true;
  }

  function resetLayout() {
    const root = layoutRoot();
    if (!root) return false;
    const state = getState(root) || mount(root, { dashboardId: root.dataset.bentoDashboard, toolbar: "none" });
    if (!state) return false;
    localStorage.removeItem(storageKey(state.dashboardId));
    for (const ver of [3, 2, 1]) {
      try { localStorage.removeItem(`dla-bento-layout:v${ver}:${state.dashboardId}`); } catch { /* ignore */ }
    }
    clearPlacements(state.grid);
    packLayoutDefault(state.grid, false);
    if (state.editing) decorateTiles(state);
    return true;
  }

  function isEditing() {
    const root = layoutRoot();
    const state = root ? getState(root) : null;
    return Boolean(state?.editing);
  }

  function exportLayout(dashboardId) {
    const root = layoutRoot();
    if (!root) return null;
    const state = getState(root);
    const id = dashboardId || state?.dashboardId || root.dataset.bentoDashboard;
    if (!id) return null;
    const layout = serialize(root);
    layout.dashboardId = id;
    layout.exportedAt = new Date().toISOString();
    return layout;
  }

  function importLayout(payload, options) {
    const root = layoutRoot();
    const items = payload?.items;
    if (!root || !items || typeof items !== "object" || Array.isArray(items)) return false;
    if (!Object.keys(items).length) return false;
    const id = payload.dashboardId || options?.dashboardId || root.dataset.bentoDashboard;
    if (!id) return false;
    // Reject only the stacked-col-1 corruption pattern — dense custom layouts
    // (many small spans / many rows) are valid and must remain importable.
    const placements = Object.values(items);
    if (placements.length >= 4) {
      const atCol1 = placements.filter((p) => Number(p.c || 1) === 1).length;
      if (atCol1 / placements.length >= 0.85) return false;
    }
    const normalized = { version: VERSION, items };
    applySaved(root, normalized);
    saveDashboardPrefs(storageKey(id), normalized);
    const state = getState(root) || mount(root, { dashboardId: id, toolbar: "none" });
    if (state) {
      state.dashboardId = id;
      root.dataset.bentoDashboard = id;
      if (state.editing) decorateTiles(state);
    }
    return true;
  }

  function downloadLayoutExport(dashboardId) {
    const layout = exportLayout(dashboardId);
    if (!layout) return false;

            <div class="card" data-bento-id="tt-kpi-tickets" data-bento-span="2"><div class="kpi-label">Tickets Worked</div><div class="kpi-value">${fmtInt(tickets.length)}</div><div class="kpi-sub">Tickets behind filtered hours</div></div>
            <div class="card" data-bento-id="tt-kpi-members" data-bento-span="2"><div class="kpi-label">Active Members</div><div class="kpi-value">${fmtInt(activeMembers)}</div><div class="kpi-sub">Out of ${fmtInt(DATA.summary.matched_members)}</div></div>
            <div class="card" data-bento-id="tt-kpi-offtarget" data-bento-span="2"><div class="kpi-label">Off-target Hours</div><div class="kpi-value">${fmtHours(compliance.reduce((sum, row) => sum + row.offTargetHours, 0))}</div><div class="kpi-sub">Total deviation from ${fmtHours(TARGET)}h per workday</div></div>

          <section class="panel tt-compliance-panel" data-bento-id="tt-compliance" data-bento-span="12">
              <div class="panel-head">
                <h2>Daily 7.5h Compliance by Member</h2>
                <div class="panel-note">
                  <span class="legend-swatch ok"></span> = exactly ${fmtHours(TARGET)}h &nbsp;
                  <span class="legend-swatch miss"></span> = not exactly ${fmtHours(TARGET)}h &nbsp;
                  <span class="legend-swatch leave"></span> = Leave Day &nbsp;
                  <span class="legend-swatch leave-half"></span> = Half Leave &nbsp;
                  <span class="legend-swatch offday"></span> = Weekend / Public Holiday &nbsp;
                  <span class="legend-swatch pending"></span> = Pending future workday
                </div>
              </div>
              <div class="compliance-wrap">
                <table class="compliance">
                  <colgroup>
                    <col class="user-col">
                    ${allCalendarDays.map(() => `<col class="day-col">`).join("")}
                  </colgroup>
                  <thead>
                    <tr>
                      <th>User</th>
                      ${allCalendarDays.map((meta) => `<th>${compactDate(meta.day)}</th>`).join("")}
                    </tr>
                  </thead>
                  <tbody>
                      ${compliance.map((row) => `<tr><th>${esc(row.name)}</th>${row.days.map((item) => {
                        const active = filters.user === row.username && isDaySelected(filters, item.day);
                        const cellClass = item.isLeave ? "leave" : (item.isHalfLeave ? "leave half" : (item.isOffday ? "offday" : (item.isPending ? "pending" : (item.onTarget ? "ok" : "miss"))));
                        const cellLabel = item.isLeave ? "Leave Day" : (item.isHalfLeave ? (item.hours > 0 ? fmtHours(item.hours) : "Half Leave") : (item.isOffday ? "—" : (item.isPending ? "Pending" : (item.hours <= 0 ? "No hours" : fmtHours(item.hours)))));
                        const gapRaw = item.isHalfLeave ? "Half-day Leave" : (item.gapLabel || "");
                        const gapText = esc(gapRaw);
                        // Heatmap density: show gap only when it adds info beyond the primary cell label.
                        const showGap = Boolean(gapRaw)
                          && gapRaw !== cellLabel
                          && !item.onTarget
                          && !item.isLeave
                          && !item.isOffday
                          && !item.isPending
                          && cellLabel !== "No hours"
                          && /^(Over by|Short by|Half-day)/.test(gapRaw);
                        const tip = gapRaw || cellLabel;
                        const aria = `${esc(row.name)} ${esc(compactDate(item.day))}: ${esc(tip)}`;
                        return `<td><button type="button" class="cell-button ${cellClass} ${active ? "active" : ""}" data-user-day="${esc(row.username)}|${esc(item.day)}" title="${esc(tip)}" aria-label="${aria}"><div class="cell-hours">${cellLabel}</div>${showGap ? `<div class="cell-gap">${gapText}</div>` : ""}</button></td>`;
                      }).join("")}</tr>`).join("")}
                  </tbody>
                </table>
              </div>
          </section>

          <section class="panel tt-project" data-bento-id="tt-project" data-bento-span="7">
                <div class="panel-head">
                  <h2>Project Hours Share</h2>
                  <div class="panel-note">${projects.length ? "Pie chart, legend, and project table are linked" : "No data"}</div>
                </div>
                ${projects.length ? `
                  <div class="project-combo">
                    <div>
                      <div class="pie-shell">
                        <div class="pie-area">
                          <svg viewBox="0 0 280 280" aria-label="Project hours pie chart">
                            ${pieSlices}
                            <circle cx="140" cy="140" r="58" fill="white"></circle>
                            <text x="140" y="134" text-anchor="middle" class="pie-center-main">${fmtHours(totalHours)}</text>
                            <text x="140" y="156" text-anchor="middle" class="pie-center-sub">team hours</text>
                          </svg>
                        </div>
                        <div class="legend">${pieLegend}</div>
                      </div>
                    </div>
                    <div class="table-wrap">
                      <table class="project-table">
                        <thead><tr><th>Project</th><th class="num">Hours</th><th class="num">%</th></tr></thead>
                        <tbody>
                          ${projectTableRows.map((row) => `<tr class="clickable ${filters.project === row.value ? "active-row" : ""}" data-project-row="${esc(row.value)}"><td>${esc(row.label)}</td><td class="num">${fmtHours(row.amount)}</td><td class="num">${fmtPct(row.percent)}</td></tr>`).join("")}
                        </tbody>
                      </table>
                    </div>
                  </div>` : `<div class="empty-state empty-state--filter" role="status"><p class="empty-state-title">No project hours in scope</p><p class="empty-state-message">Clear chart or table filters to widen the scope.</p></div>`}
          </section>

          <section class="panel tt-detail" data-bento-id="tt-detail" data-bento-span="5">
                <div class="panel-head">
                  <h2>Ticket Detail</h2>
                  <div class="panel-note">${selectedTicket ? "Selected from the current filters" : "Pick a ticket from any chart or table"}</div>
                </div>
                ${detailBase ? `
                  <div class="detail-grid">
                    <div class="detail-box"><div class="detail-label">Ticket</div><div class="detail-value">#${esc(detailBase.bugId || detailBase.bug_id || "")}</div></div>
                    <div class="detail-box"><div class="detail-label">Project</div><div class="detail-value">${esc(detailBase.project || detailBase.project_name || "")}</div></div>
                    <div class="detail-box"><div class="detail-label">Summary</div><div class="detail-value">${esc(detailBase.summary || detailBase.ticket_summary || "")}</div></div>
                    <div class="detail-box"><div class="detail-label">Hours in scope</div><div class="detail-value">${fmtHours(selectedEntries.reduce((sum, row) => sum + asNumber(row.hours), 0) || detailBase.hours || 0)}</div></div>
                    <div class="detail-box"><div class="detail-label">People logging to this ticket</div><div class="detail-value">${esc(Array.from(new Set(selectedEntries.map((row) => row.logged_by_name || row.logged_by_username).filter(Boolean))).join(", ") || "-")}</div></div>
                    <div class="detail-box"><div class="detail-label">Entries in scope</div><div class="detail-value">${fmtInt(selectedEntries.length || detailBase.entries || 0)}</div></div>
                  </div>
                ` : `<div class="empty-state empty-state--nodata" role="status"><p class="empty-state-title">No ticket selected yet</p><p class="empty-state-message">Pick a ticket from any chart or table to see details.</p></div>`}
          </section>

          <section class="panel tt-breakdown" data-bento-id="tt-breakdown-member" data-bento-span="4">
            <div class="panel-head">
              <h2>By Team Member</h2>
              <div class="panel-note">Click a member bar</div>
            </div>
            <div class="bar-list">
              ${members.length ? members.map((row) => `<button type="button" class="bar-row ${filters.user === row.raw ? "active" : ""}" data-user="${esc(row.raw)}"><div class="bar-label">${esc(row.label)}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.max(2, row.amount / maxMember * 100).toFixed(2)}%"></div></div><div class="bar-value">${fmtHours(row.amount)}</div></button>`).join("") : `<div class="empty-state empty-state--filter" role="status"><p class="empty-state-title">No member hours in scope</p><p class="empty-state-message">Clear chart or table filters to widen the scope.</p></div>`}
            </div>
          </section>

          <section class="panel tt-breakdown" data-bento-id="tt-breakdown-day" data-bento-span="4">
            <div class="panel-head">
              <h2>By Workday</h2>
              <div class="panel-note">Click a day bar</div>
            </div>
            <div class="bar-list">
              ${days.length ? days.map((row) => `<button type="button" class="bar-row ${isDaySelected(filters, row.raw) ? "active" : ""}" data-day="${esc(row.raw)}"><div class="bar-label">${esc(row.label)}</div><div class="bar-track"><div class="bar-fill blue" style="width:${Math.max(2, row.amount / maxDay * 100).toFixed(2)}%"></div></div><div class="bar-value">${fmtHours(row.amount)}</div></button>`).join("") : `<div class="empty-state empty-state--filter" role="status"><p class="empty-state-title">No workdays in scope</p><p class="empty-state-message">Clear chart or table filters to widen the scope.</p></div>`}
            </div>
          </section>

          <section class="panel tt-breakdown" data-bento-id="tt-breakdown-ticket" data-bento-span="4">
            <div class="panel-head">
              <h2>By Ticket</h2>
              <div class="panel-note">Click a ticket row</div>
            </div>
            <div class="table-wrap">
              <table class="ticket-table">
                <thead><tr><th>Ticket</th><th>Project</th><th>Summary</th><th class="num">Hours</th></tr></thead>
                <tbody>
                  ${tickets.length ? tickets.slice(0, 20).map((row) => `<tr class="clickable ${selectedTicket === String(row.bugId) ? "active-row" : ""}" data-ticket="${esc(row.bugId)}"><td>#${esc(row.bugId)}</td><td>${esc(row.project)}</td><td>${esc(row.summary)}</td><td class="num">${fmtHours(row.hours)}</td></tr>`).join("") : `<tr><td colspan="4"><div class="empty-state empty-state--filter" role="status"><p class="empty-state-title">No tickets in scope</p><p class="empty-state-message">Clear chart or table filters to widen the scope.</p></div></td></tr>`}
                </tbody>
              </table>
            </div>
          </section>

          <section class="panel tt-entries" data-bento-id="tt-entries" data-bento-span="12">
              <div class="panel-head">
                <h2>Time Tracking Details</h2>
                <div class="panel-note">Every filtered Mantis time entry. Click a row to lock the ticket detail.</div>
              </div>
              <div class="table-wrap">
                <table class="entry-table">
                  <thead>
                    <tr>
                      <th>Day</th>
                      <th>User</th>
                      <th>Ticket</th>
                      <th>Project</th>
                      <th class="num">Hours</th>
                      <th>Category</th>
                      <th>Info</th>
                      <th>Created</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${entries.length ? entries.map((row) => `<tr class="clickable ${selectedTicket && String(row.bug_id) === selectedTicket ? "active-row" : ""}" data-ticket="${esc(row.bug_id || "")}"><td>${esc(fmtIsoDate(row.day))}</td><td>${esc(row.logged_by_name || row.logged_by_username)}</td><td>${row.bug_id ? "#" + esc(row.bug_id) : ""}</td><td>${esc(row.project_name)}</td><td class="num">${fmtHours(row.hours)}</td><td>${esc(row.category)}</td><td>${esc(row.info)}</td><td>${esc(fmtIsoDateTime(row.created_timestamp))}</td></tr>`).join("") : `<tr><td colspan="8"><div class="empty-state empty-state--filter" role="status"><p class="empty-state-title">No time entries match the current filters</p><p class="empty-state-message">Clear chart or table filters to widen the scope.</p></div></td></tr>`}
                  </tbody>
                </table>
              </div>
          </section>
      `;

      function setFilter(key, value) {
        const next = Object.assign({}, filters, { [key]: value });
        writeFilters(next);
        render();
      }

      document.getElementById("filter-user").addEventListener("change", (event) => setFilter("user", event.target.value));
      document.getElementById("filter-project").addEventListener("change", (event) => setFilter("project", event.target.value));
      const bounds = periodBounds();
      const fromInput = document.getElementById("filter-from");
      const toInput = document.getElementById("filter-to");
      setDateInputDisplay(fromInput, filters.from === "all" ? "" : filters.from);
      setDateInputDisplay(toInput, filters.to === "all" ? "" : filters.to);
      bindDdMmDatePicker(fromInput, (iso) => {
        const next = normalizeRangeFilters(Object.assign({}, filters, { from: iso || "all" }));
        writeFilters(next);
        render();
      }, {
        placeholder: "Start (dd/mm/yyyy)",
        clearable: true,
        min: bounds.min,
        max: bounds.max,
      });
      bindDdMmDatePicker(toInput, (iso) => {
        const next = normalizeRangeFilters(Object.assign({}, filters, { to: iso || "all" }));
        writeFilters(next);
        render();
      }, {
        placeholder: "End (dd/mm/yyyy)",
        clearable: true,
        min: bounds.min,
        max: bounds.max,
      });
      document.getElementById("filter-ticket").addEventListener("change", (event) => setFilter("ticket", event.target.value.trim() || "all"));
      document.getElementById("filter-search").addEventListener("input", (event) => setFilter("search", event.target.value));
      document.getElementById("reset-filters").addEventListener("click", () => { writeFilters(FILTER_DEFAULTS); render(); });
      grid.querySelectorAll("[data-clear]").forEach((node) => node.addEventListener("click", () => setFilter(node.dataset.clear, FILTER_DEFAULTS[node.dataset.clear])));
      grid.querySelectorAll("[data-project]").forEach((node) => node.addEventListener("click", () => setFilter("project", filters.project === node.dataset.project ? "all" : node.dataset.project)));
      grid.querySelectorAll("[data-project-row]").forEach((node) => node.addEventListener("click", () => setFilter("project", filters.project === node.dataset.projectRow ? "all" : node.dataset.projectRow)));
      grid.querySelectorAll("[data-user]").forEach((node) => node.addEventListener("click", () => setFilter("user", filters.user === node.dataset.user ? "all" : node.dataset.user)));
      grid.querySelectorAll("[data-day]").forEach((node) => node.addEventListener("click", () => {
        writeFilters(toggleDayFilter(filters, node.dataset.day));
        render();
      }));
      grid.querySelectorAll("[data-user-day]").forEach((node) => node.addEventListener("click", () => {
        const [user, day] = node.dataset.userDay.split("|");
        const same = filters.user === user && filters.from === day && filters.to === day;
        const next = Object.assign({}, filters, {
          user: same ? "all" : user,
          from: same ? "all" : day,
          to: same ? "all" : day
        });
        writeFilters(normalizeRangeFilters(next));
        render();
      }));
      grid.querySelectorAll("[data-ticket]").forEach((node) => node.addEventListener("click", () => setFilter("ticket", filters.ticket === node.dataset.ticket ? "all" : node.dataset.ticket || "all")));
      try {
        if (grid && window.DlaBentoLayout) {
          DlaBentoLayout.refreshTiles(grid, LAYOUT_ID, { toolbar: "none" });
          if (wasEditing) DlaBentoLayout.restoreEditing(grid, true);
        }
      } catch (err) {
        console.error("Bento layout init failed", err);
      }
    }

    render();
  })();
  </script>
</body>
</html>
