<!doctype html>
<html lang="en" data-carbon-theme="g100" class="cds--g100">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dashboard Control Center</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@carbon/styles@1/css/styles.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@carbon/charts@1.27.16/styles.min.css">
<link rel="stylesheet" href="https://1.www.s81c.com/common/carbon/plex/sans.css">


<script src="https://cdn.jsdelivr.net/npm/@carbon/charts@1.27.16/dist/umd/bundle.umd.js"></script>

<style>

:root,
[data-carbon-theme="g100"],
.cds--g100 {
  color-scheme: dark;

  /* Carbon Gray 100 tokens */
  --cds-background: #161616;
  --cds-layer-01: #262626;
  --cds-layer-02: #393939;
  --cds-layer-03: #525252;
  --cds-text-primary: #f4f4f4;
  --cds-text-secondary: #c6c6c6;
  --cds-text-helper: #8d8d8d;
  --cds-interactive: #4589ff;
  --cds-link-primary: #78a9ff;
  --cds-border-subtle-01: #525252;
  --cds-border-strong-01: #6f6f6f;
  --cds-support-error: #fa4d56;
  --cds-support-success: #42be65;
  --cds-support-warning: #f1c21b;
  --cds-support-info: #4589ff;
  --cds-focus: #ffffff;
  --cds-layer-hover-01: #333333;
  --cds-layer-selected-01: #393939;
  --cds-overlay: rgba(0, 0, 0, 0.7);
  --cds-skeleton-element: #353535;

  /* Carbon motion */
  --cds-motion-standard-productive: cubic-bezier(0.2, 0, 0.38, 0.9);
  --cds-motion-standard-expressive: cubic-bezier(0.4, 0.14, 0.3, 1);
  --cds-motion-duration-fast-01: 70ms;
  --cds-motion-duration-moderate-01: 150ms;
  --cds-motion-duration-moderate-02: 240ms;
  --cds-transition: var(--cds-motion-duration-fast-01) var(--cds-motion-standard-productive);
  --cds-transition-panel: var(--cds-motion-duration-moderate-01) var(--cds-motion-standard-productive);
  --cds-transition-overlay: var(--cds-motion-duration-moderate-02) var(--cds-motion-standard-productive);

  /* Carbon breakpoints (min-width) */
  --cds-breakpoint-sm: 320px;
  --cds-breakpoint-md: 672px;
  --cds-breakpoint-lg: 1056px;
  --cds-breakpoint-xlg: 1312px;
  --cds-breakpoint-max: 1584px;

  /* Typography — IBM Plex Sans productive */
  --cds-font-family: "IBM Plex Sans", system-ui, -apple-system, "Segoe UI", sans-serif;
  --cds-type-body-compact-01: 0.875rem;
  --cds-type-heading-compact-01: 0.875rem;
  --cds-type-heading-03: 1.25rem;
  --cds-type-heading-04: 1.75rem;
  --cds-type-label-01: 0.75rem;

  /* Legacy bridge — existing dashboard CSS */
  --bg: var(--cds-background);
  --panel: var(--cds-layer-01);
  --surface-raised: var(--cds-layer-02);
  --ink: var(--cds-text-primary);
  --muted: var(--cds-text-secondary);
  --line: var(--cds-border-subtle-01);
  --accent: var(--cds-interactive);
  --accent-strong: #0f62fe;
  --accent-soft: rgba(69, 137, 255, 0.15);
  --hero-bg: var(--cds-layer-02);
  --shadow: 0 4px 14px rgba(0, 0, 0, 0.4);
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.32);
  --radius: 0;
  --radius-lg: 0;
  --font: var(--cds-font-family);
  --transition: var(--cds-transition);
  --focus-ring: 0 0 0 2px var(--cds-focus);
  --sidebar: var(--cds-layer-02);
  --danger: var(--cds-support-error);
  --danger-soft: rgba(250, 77, 86, 0.15);
  --success: var(--cds-support-success);
  --success-soft: rgba(66, 190, 101, 0.15);
  --warning: var(--cds-support-warning);
  --warning-soft: rgba(241, 194, 27, 0.15);
  --control-height: 40px;
  --type-kpi: var(--cds-type-heading-04);
  --type-section: var(--cds-type-heading-03);
  --type-label: var(--cds-type-label-01);
}


* { box-sizing: border-box; }
html {
  overflow-x: clip;
  font-size: 100%;
}
body {
  margin: 0;
  font-family: var(--cds-font-family);
  font-size: var(--cds-type-body-compact-01);
  font-weight: 400;
  letter-spacing: 0.16px;
  color: var(--cds-text-primary);
  background: var(--cds-background);
  line-height: 1.29;
  -webkit-font-smoothing: antialiased;
  overflow-x: clip;
  max-width: 100%;
}
a { color: var(--cds-link-primary); }
a:hover { color: var(--cds-interactive); }
.table-wrap, .compliance-wrap, .heatmap-wrap {
  display: block;
  width: 100%;
  max-width: 100%;
  min-width: 0;
  overflow-x: auto;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior-x: contain;
}
.table-wrap > table,
.compliance-wrap > table,
.heatmap-wrap > table {
  max-width: none;
}
main, .wrap, .shell, .app, .dashboard-grid, .grid-nested, .grid-cell,
.project-stack, .project-section, .member-section, .member, .panel, .card {
  max-width: 100%;
  min-width: 0;
}
@media (max-width: 767px) {
  .project-stack, .project-section, .member-section, .member, .members {
    overflow-x: clip;
  }
}
.chip button, .filter-chip button, [data-clear] {
  min-width: 28px;
  min-height: 28px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}
button, input, select { font: inherit; }
button { cursor: pointer; }
button:focus-visible, input:focus-visible, select:focus-visible {
  outline: 2px solid var(--cds-focus);
  outline-offset: 2px;
}
.skip-link,
.cds--skip-to-content {
  position: absolute;
  left: 8px;
  top: 8px;
  z-index: 1000;
  padding: 8px 12px;
  background: var(--cds-interactive);
  color: var(--cds-text-primary);
  border-radius: 0;
  text-decoration: none;
  clip: rect(0 0 0 0);
  clip-path: inset(50%);
  height: 1px;
  width: 1px;
  overflow: hidden;
  white-space: nowrap;
  transition: background var(--cds-transition);
}
.skip-link:focus, .skip-link:focus-visible,
.cds--skip-to-content:focus, .cds--skip-to-content:focus-visible {
  clip: auto;
  clip-path: none;
  height: auto;
  width: auto;
  overflow: visible;
  outline: 2px solid var(--cds-focus);
  outline-offset: 2px;
}
.visually-hidden {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0 0 0 0);
  white-space: nowrap;
  border: 0;
}
a:focus-visible {
  outline: 2px solid var(--cds-focus);
  outline-offset: 2px;
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}


/* ------------------------------------------------------------------ */
/* Carbon 2x Grid — 16-column condensed (1px gutters)                 */
/* ------------------------------------------------------------------ */
.carbon-grid {
  display: grid;
  grid-template-columns: repeat(16, 1fr);
  gap: 1px;
  align-items: start;
  width: 100%;
  max-width: 100%;
  margin: 0;
  padding: 0 24px;
  background: var(--cds-border-subtle-01);
}
.carbon-grid--md { grid-template-columns: repeat(8, 1fr); }
.carbon-grid--sm { grid-template-columns: repeat(4, 1fr); }

.carbon-tile,
.cds--tile.carbon-tile {
  background: var(--cds-layer-01);
  padding: 16px;
  border: 1px solid var(--cds-border-subtle-01);
  min-width: 0;
  transition: background var(--cds-transition);
}
.carbon-tile:hover { background: var(--cds-layer-hover-01); }
.carbon-tile--span-4 { grid-column: span 4; }
.carbon-tile--span-8 { grid-column: span 8; }
.carbon-tile--span-16 { grid-column: span 16; }

/* Legacy 12-column grid — backward compat for existing builders */
:root { --layout-gap: 1px; }
.dashboard-grid {
  display: grid;
  grid-template-columns: repeat(12, minmax(0, 1fr));
  gap: var(--layout-gap);
  align-items: start;
  background: var(--cds-border-subtle-01);
}
.grid-cell { min-width: 0; }
.grid-span-12 { grid-column: span 12; }
.grid-span-8 { grid-column: span 8; }
.grid-span-6 { grid-column: span 6; }
.grid-span-4 { grid-column: span 4; }
.grid-span-3 { grid-column: span 3; }
.grid-span-2 { grid-column: span 2; }
.grid-nested {
  display: grid;
  grid-template-columns: repeat(12, minmax(0, 1fr));
  gap: var(--layout-gap);
  width: 100%;
  grid-column: span 12;
  align-items: start;
}

/* Carbon breakpoints */
@media (max-width: 1055px) {
  .carbon-grid { grid-template-columns: repeat(8, 1fr); padding: 0 16px; }
  .carbon-tile--span-16 { grid-column: span 8; }
  .carbon-tile--span-8 { grid-column: span 8; }
  .carbon-tile--span-4 { grid-column: span 4; }
  .grid-span-8, .grid-span-6 { grid-column: span 12; }
  .grid-span-4, .grid-span-3 { grid-column: span 6; }
  .grid-span-2 { grid-column: span 4; }
}
@media (max-width: 671px) {
  .carbon-grid,
  .carbon-grid--md,
  .carbon-grid--sm {
    grid-template-columns: repeat(4, 1fr);
    padding: 0 16px;
  }
  .carbon-tile--span-16,
  .carbon-tile--span-8,
  .carbon-tile--span-4 { grid-column: span 4; }
  .grid-span-8, .grid-span-6, .grid-span-4, .grid-span-3, .grid-span-2 {
    grid-column: span 12;
  }
  .dashboard-grid, .shell, .wrap, .app { max-width: 100%; width: 100%; }
  .dashboard-grid, .grid-nested, .grid-cell, .panel, .card, .member, .project-section {
    min-width: 0;
  }
  .filters, .toolbar, .grid.filters { grid-template-columns: 1fr !important; }
}
@media (min-width: 1312px) {
  .carbon-grid { padding: 0 32px; }
}
@media (min-width: 1584px) {
  .carbon-grid { padding: 0 40px; }
}
@media print {
  .dashboard-grid, .grid-nested, .carbon-grid { display: block; background: transparent; }
  .dashboard-grid > *, .grid-nested > *, .carbon-grid > * {
    break-inside: avoid;
    margin-bottom: 12px;
  }
}


/* ------------------------------------------------------------------ */
/* Carbon component layer — page shell, toolbar, tables, KPI, charts  */
/* ------------------------------------------------------------------ */
.carbon-page {
  min-height: 100vh;
  background: var(--cds-background);
  color: var(--cds-text-primary);
}
.carbon-page__content {
  max-width: 100%;
  margin: 0;
  padding: 0 24px 32px;
}
.carbon-page-header {
  background: var(--cds-layer-01);
  border-bottom: 1px solid var(--cds-border-subtle-01);
  padding: 16px 24px;
  margin-bottom: 1px;
}
.carbon-page-header__breadcrumb {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  align-items: center;
  margin: 0 0 8px;
  padding: 0;
  list-style: none;
  font-size: var(--cds-type-label-01);
  color: var(--cds-text-secondary);
}
.carbon-page-header__breadcrumb li:not(:last-child)::after {
  content: "/";
  margin-left: 4px;
  color: var(--cds-text-helper);
}
.carbon-page-header__breadcrumb a {
  color: var(--cds-link-primary);
  text-decoration: none;
  transition: color var(--cds-transition);
}
.carbon-page-header__breadcrumb a:hover { color: var(--cds-interactive); }
.carbon-page-header__row {
  display: flex;
  flex-wrap: wrap;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px 16px;
}
.carbon-page-header__title {
  margin: 0;
  font-size: var(--cds-type-heading-04);
  font-weight: 400;
  line-height: 1.29;
  letter-spacing: 0;
  color: var(--cds-text-primary);
}
.carbon-page-header__actions {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
}
.carbon-tabs {
  display: flex;
  flex-wrap: wrap;
  gap: 0;
  margin-top: 12px;
  border-bottom: 1px solid var(--cds-border-subtle-01);
}
.carbon-tabs__tab {
  padding: 11px 16px;
  font-size: var(--cds-type-body-compact-01);
  font-weight: 400;
  color: var(--cds-text-secondary);
  background: transparent;
  border: 0;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  transition: color var(--cds-transition), border-color var(--cds-transition);
}
.carbon-tabs__tab:hover { color: var(--cds-text-primary); background: var(--cds-layer-hover-01); }
.carbon-tabs__tab--active {
  color: var(--cds-text-primary);
  border-bottom-color: var(--cds-interactive);
  font-weight: 600;
}

.carbon-toolbar {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
  padding: 8px 16px;
  background: var(--cds-layer-01);
  border-bottom: 1px solid var(--cds-border-subtle-01);
  min-height: 48px;
}
.carbon-toolbar__title {
  flex: 1 1 auto;
  margin: 0;
  font-size: var(--cds-type-heading-compact-01);
  font-weight: 600;
  color: var(--cds-text-primary);
}
.carbon-toolbar__actions {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
}

.carbon-kpi {
  display: flex;
  flex-direction: column;
  gap: 4px;
  min-height: 88px;
}
.carbon-kpi__label {
  font-size: var(--cds-type-label-01);
  font-weight: 400;
  letter-spacing: 0.32px;
  color: var(--cds-text-secondary);
  text-transform: none;
}
.carbon-kpi__value {
  font-size: var(--cds-type-heading-04);
  font-weight: 400;
  line-height: 1.29;
  font-variant-numeric: tabular-nums;
  color: var(--cds-text-primary);
}
.carbon-kpi__subtitle {
  font-size: var(--cds-type-label-01);
  color: var(--cds-text-helper);
}
.carbon-kpi__trend {
  font-size: var(--cds-type-label-01);
  font-weight: 600;
}
.carbon-kpi__trend--up { color: var(--cds-support-success); }
.carbon-kpi__trend--down { color: var(--cds-support-error); }
.carbon-kpi__trend--neutral { color: var(--cds-text-secondary); }
.carbon-kpi[data-status="warning"] {
  border-left: 3px solid var(--cds-support-warning, #f1c21b);
}
.carbon-kpi[data-status="error"] {
  border-left: 3px solid var(--cds-support-error, #da1e28);
}
.carbon-kpi[data-status="success"] {
  border-left: 3px solid var(--cds-support-success, #24a148);
}
.carbon-kpi[data-status="warning"] .carbon-kpi__value {
  color: var(--cds-support-warning, #f1c21b);
}
.carbon-kpi[data-status="error"] .carbon-kpi__value {
  color: var(--cds-support-error, #da1e28);
}

.carbon-data-table-container {
  background: var(--cds-layer-01);
  border: 1px solid var(--cds-border-subtle-01);
}
.carbon-data-table-container__head {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--cds-border-subtle-01);
}
.carbon-data-table-container__title {
  margin: 0;
  font-size: var(--cds-type-heading-compact-01);
  font-weight: 600;
  color: var(--cds-text-primary);
}
.carbon-data-table-wrap { overflow-x: auto; }
.carbon-data-table,
.cds--data-table.carbon-data-table {
  width: 100%;
  border-collapse: collapse;
  font-size: var(--cds-type-body-compact-01);
}
.carbon-data-table caption {
  padding: 8px 16px;
  text-align: left;
  font-size: var(--cds-type-label-01);
  color: var(--cds-text-helper);
}
.carbon-data-table th,
.carbon-data-table td {
  padding: 11px 16px;
  text-align: left;
  border-bottom: 1px solid var(--cds-border-subtle-01);
  vertical-align: top;
  color: var(--cds-text-primary);
}
.carbon-data-table th {
  position: sticky;
  top: 0;
  background: var(--cds-layer-01);
  font-size: var(--cds-type-heading-compact-01);
  font-weight: 600;
  color: var(--cds-text-secondary);
  z-index: 1;
  cursor: pointer;
  user-select: none;
  transition: background var(--cds-transition);
}
.carbon-data-table th:hover { background: var(--cds-layer-hover-01); }
.carbon-data-table th[aria-sort="ascending"]::after { content: " ↑"; }
.carbon-data-table th[aria-sort="descending"]::after { content: " ↓"; }
.carbon-data-table tbody tr:hover td { background: var(--cds-layer-hover-01); }

.carbon-chart-container {
  background: var(--cds-layer-01);
  border: 1px solid var(--cds-border-subtle-01);
  padding: 16px;
  min-width: 0;
}
.carbon-chart-container__title {
  margin: 0 0 12px;
  font-size: var(--cds-type-heading-compact-01);
  font-weight: 600;
  color: var(--cds-text-primary);
}
.carbon-chart-container__plot { width: 100%; min-height: 200px; }
.carbon-chart-container:empty,
.carbon-chart-container__plot:empty {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 200px;
  background: var(--cds-layer-01);
  border-radius: 4px;
}
.carbon-chart-container:empty::after,
.carbon-chart-container__plot:empty::after {
  content: "Loading chart…";
  color: var(--cds-text-placeholder);
  font-size: var(--cds-type-body-compact-01, 14px);
  animation: pulse 1.5s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 1; }
}

.carbon-status-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 0 8px;
  min-height: 24px;
  font-size: var(--cds-type-label-01);
  font-weight: 400;
  letter-spacing: 0.32px;
  border-radius: 999px;
  white-space: nowrap;
  max-width: 100%;
}
.carbon-status-badge__icon {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.carbon-status-badge--success {
  background: rgba(66, 190, 101, 0.15);
  color: var(--cds-support-success);
}
.carbon-status-badge--success .carbon-status-badge__icon { background: var(--cds-support-success); }
.carbon-status-badge--error {
  background: rgba(250, 77, 86, 0.15);
  color: var(--cds-support-error);
}
.carbon-status-badge--error .carbon-status-badge__icon { background: var(--cds-support-error); }
.carbon-status-badge--warning {
  background: rgba(241, 194, 27, 0.15);
  color: var(--cds-support-warning);
}
.carbon-status-badge--warning .carbon-status-badge__icon { background: var(--cds-support-warning); }
.carbon-status-badge--info {
  background: rgba(69, 137, 255, 0.15);
  color: var(--cds-support-info);
}
.carbon-status-badge--info .carbon-status-badge__icon { background: var(--cds-support-info); }
.carbon-status-badge--neutral {
  background: var(--cds-layer-02);
  color: var(--cds-text-secondary);
}
.carbon-status-badge--neutral .carbon-status-badge__icon { background: var(--cds-text-helper); }

.carbon-filter-summary {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
  padding: 8px 16px;
  background: var(--cds-layer-01);
  border-bottom: 1px solid var(--cds-border-subtle-01);
}
.carbon-filter-summary__label {
  font-size: var(--cds-type-label-01);
  color: var(--cds-text-secondary);
  margin-right: 4px;
}
.carbon-filter-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 0 8px;
  min-height: 24px;
  font-size: var(--cds-type-label-01);
  background: var(--cds-layer-02);
  color: var(--cds-text-primary);
  border: 1px solid var(--cds-border-subtle-01);
  border-radius: 999px;
}
.carbon-filter-tag__dismiss {
  border: 0;
  background: transparent;
  color: var(--cds-text-secondary);
  cursor: pointer;
  padding: 0;
  line-height: 1;
  font-size: 0.875rem;
  transition: color var(--cds-transition);
}
.carbon-filter-tag__dismiss:hover { color: var(--cds-text-primary); }

.carbon-empty-state {
  display: grid;
  gap: 8px;
  justify-items: start;
  padding: 48px 32px;
  background: var(--cds-layer-01);
  border: 1px solid var(--cds-border-subtle-01);
  text-align: left;
}
.carbon-empty-state__title {
  margin: 0;
  font-size: var(--cds-type-heading-03);
  font-weight: 400;
  color: var(--cds-text-primary);
}
.carbon-empty-state__description {
  margin: 0;
  font-size: var(--cds-type-body-compact-01);
  color: var(--cds-text-secondary);
  max-width: 52ch;
}
.carbon-empty-state__action {
  margin-top: 8px;
  display: inline-flex;
  align-items: center;
  min-height: 40px;
  padding: 0 16px;
  background: var(--cds-interactive);
  color: var(--cds-text-primary);
  border: 0;
  font-size: var(--cds-type-body-compact-01);
  font-weight: 400;
  text-decoration: none;
  cursor: pointer;
  transition: background var(--cds-transition);
}
.carbon-empty-state__action:hover { background: #0f62fe; color: var(--cds-text-primary); }

.carbon-btn {
  display: inline-flex;

function variantSpanDays(row) {
  if (!row?.start || !row?.end) return Number.MAX_SAFE_INTEGER;
  const start = new Date(row.start + 'T00:00:00');
  const end = new Date(row.end + 'T00:00:00');

function findVariantForRange(item, from, to, cw) {

  if (compareIso(from, to) > 0) return { variant: null, reason: 'invalid-order' };

function renderCatalog(rows) {

    return;
  }
  const variant = selectedVariant(item);
  const frameItem = variant || item;
  renderTimeRangeSelect(item, variant);
  $('viewerMeta').textContent = `${frameItem.file} · ${frameItem.size}`;
  const bust = frameItem.modified ? String(frameItem.modified).replace(/[^0-9]/g, '').slice(0, 14) : Date.now();
  frameWrap?.classList.add('is-loading');
  $('dashboardFrame').src = `${frameItem.href}?v=${bust}`;
  $('viewerOpen').href = `${frameItem.href}?v=${bust}`;
  setTimeout(expandFrameContent, 250);
  setTimeout(expandFrameContent, 900);
}

function renderTimeRangeSelect(item, variant) {
  const select = $('timeRangeSelect');
  const rangeBar = $('viewerRangeBar');
  if (!item?.variants?.length) {
    select.classList.add('hidden');
    rangeBar?.classList.add('hidden');
    $('timeRangeTools').classList.remove('active');
    select.innerHTML = '';
    return;
  }
  select.classList.remove('hidden');
  rangeBar?.classList.remove('hidden');
  select.innerHTML = item.variants.map(row => `<option value="${escapeAttr(row.file)}">${escapeHtml(row.label)}</option>`).join('');
  select.value = (variant || item.variants[0]).file;
  $('timeRangeTools').classList.add('active');
  const base = variant || item.variants[0];
  setDateInputDisplay($('timeFrom'), base.start || '');
  setDateInputDisplay($('timeTo'), base.end || '');
  const weeks = [...new Set(item.variants.map(row => row.cw).filter(Boolean))].sort().reverse();
  $('timeCw').innerHTML = '<option value="">CW</option>' + weeks.map(week => `<option value="${escapeAttr(week)}">${escapeHtml(week)}</option>`).join('');
  $('timeCw').value = base.cw || '';
}

function applyTimeRange() {
  const item = selectedDashboard();
  if (!item?.variants?.length) {
    showToast('Date range controls only apply to Digital Team Time Tracking.');
    return;
  }
  const from = readDateInputIso($('timeFrom'));
  const to = readDateInputIso($('timeTo'));
  const cw = $('timeCw').value;
  if (!from || !to) {
    showToast('Choose both From and To dates (dd/mm/yyyy).');
    return;
  }
  if (compareIso(from, to) > 0) {
    showToast('From date must be on or before To date.');
    return;
  }
  const match = findVariantForRange(item, from, to, cw);
  if (match.variant) {
    item.currentVariantFile = match.variant.file;
    renderViewer();
    saveControlCenterPrefs();
    if (match.mode === 'exact') {
      showToast(`Loaded ${match.variant.label}`);
    } else {
      showToast(`Loaded ${match.variant.label} (closest available range covering ${fmtIsoDate(from)} to ${fmtIsoDate(to)})`);
    }
    return;
  }
  const template = item.rangeRefreshTemplate || 'python -m dashboard_assistant --month {from}..{to} --team digital --react --limit 20 --strict-dq';
  copyText(template.replaceAll('{from}', from).replaceAll('{to}', to));
  showToast(`No HTML for ${fmtIsoDate(from)} to ${fmtIsoDate(to)}. Refresh command copied — run it, then rebuild control center.`);
}

function checkIframeRenderHealth() {
  const frame = $('dashboardFrame');
  try {
    const doc = frame.contentDocument || frame.contentWindow?.document;
    const app = doc?.getElementById('app');
    const root = doc?.querySelector('.dashboard-grid, main.shell, #main');
    const htmlLen = (app?.innerHTML || root?.innerHTML || doc?.body?.innerHTML || '').trim().length;
    if (doc && htmlLen < 40) {
      showToast('Preview failed to render. Hard refresh (Ctrl+Shift+R) or use Open in tab.');
    }
  } catch {
    // ignore cross-origin
  }
}

function expandFrameContent() {
  const frame = $('dashboardFrame');
  try {
    const doc = frame.contentDocument || frame.contentWindow.document;
    if (!doc || doc.getElementById('dla-full-frame-style')) return;
    const style = doc.createElement('style');
    style.id = 'dla-full-frame-style';
    style.textContent = `
      html, body { width: 100% !important; max-width: none !important; overflow-x: hidden !important; }
      body { margin-left: 0 !important; margin-right: 0 !important; }
      .wrap, .shell, .main, .container, .dashboard, .dashboard-shell, .page, main {
        width: 100% !important; max-width: none !important; margin-left: 0 !important; margin-right: 0 !important;
      }
      .card, .panel, .section, .project-section, .chart-panel { max-width: none !important; }
    `;
    doc.head.appendChild(style);
  } catch {
    // Cross-origin or protected frame. Local dashboards should allow this.
  }
}

async function copyText(text) {
  if (!text) {
    showToast('Nothing to copy.');
    return;
  }
  try {
    await navigator.clipboard.writeText(text);
    showToast('Copied to clipboard');
  } catch {
    showToast(text);
  }
}

function showToast(message) {
  toast.textContent = message;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 4200);
}

function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, char => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[char]));
}
function escapeAttr(value) { return escapeHtml(value); }
init();
</script>
</main></div>
</body>
</html>
