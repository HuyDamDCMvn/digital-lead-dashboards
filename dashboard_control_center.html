}

  cursor: pointer;
}
.dla-date-popup-grid {

}

.dla-date-popup-grid button:hover:not(:disabled) {

}
.dla-date-popup-grid button:disabled {

}

}
    
.bento-grid.bento-layout-root {
  position: relative;

}
[data-bento-host] { display: contents; }

.bento-drag-handle {
  display: none;
  align-items: center;
  gap: 6px;
  margin: -4px 0 8px;
  padding: 8px 12px;
  min-height: 28px;
  border-radius: 6px;

  user-select: none;
  touch-action: none;
  width: fit-content;

  content: "⋮⋮";

  line-height: 1;

    :root {
      color-scheme: light;
      --bg: #f6f8fb;
      --panel: #ffffff;
      --text: #111827;
      --muted: #64748b;
      --line: #dbe3ee;
      --line-strong: #c7d2df;
      --primary: #2563eb;
      --primary-soft: #dbeafe;
      --teal: #0f766e;
      --teal-soft: #ccfbf1;
      --amber: #b45309;
      --amber-soft: #fef3c7;
      --red: #b91c1c;
      --red-soft: #fee2e2;
      --green: #15803d;
      --green-soft: #dcfce7;
      --sidebar: #eef3f9;
      --shadow: 0 1px 2px rgba(15, 23, 42, .06);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: var(--bg); color: var(--text); overflow-x: hidden; }
    a { color: inherit; text-decoration: none; }
    button, input, select { font: inherit; }
    /* .button { display: inline-flex } must not override the hidden attribute */
    [hidden] { display: none !important; }
    .app { min-height: 100vh; display: grid; grid-template-columns: 320px minmax(0, 1fr); }
    .sidebar { position: sticky; top: 0; height: 100vh; background: var(--sidebar); border-right: 1px solid var(--line); padding: 18px 14px; overflow-y: auto; }
    .brand { display: flex; align-items: center; gap: 10px; padding: 8px 8px 18px; }
    .brand-mark { width: 32px; height: 32px; border-radius: 8px; display: grid; place-items: center; background: #111827; color: #fff; font-weight: 800; }
    .brand h1 { margin: 0; font-size: 15px; line-height: 1.2; }
    .brand span { display: block; color: var(--muted); font-size: 12px; margin-top: 2px; }
    .nav-title { color: var(--muted); font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; padding: 14px 8px 8px; }
    .nav-button { width: 100%; min-height: 36px; display: flex; align-items: center; justify-content: space-between; gap: 8px; border: 0; border-radius: 8px; background: transparent; color: #334155; padding: 8px 10px; cursor: pointer; text-align: left; }
    .nav-button:hover, .nav-button.active { background: #fff; color: var(--text); box-shadow: var(--shadow); }
    .nav-button .count { color: var(--muted); font-size: 12px; font-variant-numeric: tabular-nums; }
    .catalog-list { display: grid; gap: 6px; }
    .catalog-item { width: 100%; min-width: 0; min-height: 54px; display: grid; gap: 4px; border: 1px solid transparent; border-radius: 8px; background: transparent; color: #334155; padding: 9px 10px; cursor: pointer; text-align: left; overflow: hidden; }
    .catalog-item:hover, .catalog-item.active { background: #fff; color: var(--text); border-color: var(--line); box-shadow: var(--shadow); }
    .catalog-item strong { font-size: 13px; line-height: 1.25; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .catalog-meta { display: flex; align-items: center; justify-content: space-between; gap: 8px; color: var(--muted); font-size: 11px; }
    .catalog-file { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .content { min-width: 0; display: flex; flex-direction: column; }
    .topbar { position: sticky; top: 0; z-index: 5; min-height: 58px; display: flex; align-items: center; justify-content: space-between; gap: 16px; border-bottom: 1px solid var(--line); background: rgba(246, 248, 251, .92); backdrop-filter: blur(10px); padding: 12px 22px; }
    .topbar h2 { margin: 0; font-size: 18px; }
    .topbar p { margin: 2px 0 0; color: var(--muted); font-size: 12px; }
    .top-actions { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .main { width: 100%; max-width: none; min-width: 0; margin: 0; padding: 20px 22px 32px; display: grid; gap: 18px; }
    .main > * { min-width: 0; max-width: 100%; }
    .input, .select { width: 100%; height: 38px; border: 1px solid var(--line-strong); border-radius: 8px; background: #fff; color: var(--text); padding: 0 12px; outline: none; }
    .input:focus, .select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, .12); }
    .button { height: 36px; display: inline-flex; align-items: center; justify-content: center; gap: 7px; border: 1px solid var(--line-strong); border-radius: 8px; background: #fff; color: var(--text); padding: 0 12px; cursor: pointer; white-space: nowrap; }
    .button:hover { border-color: #94a3b8; background: #f8fafc; }
    .button.primary { background: #111827; color: #fff; border-color: #111827; }
    .button.icon { width: 36px; padding: 0; }
    .viewer-select { width: auto; min-width: 180px; max-width: 260px; }
    .viewer-range-tools { display: none; align-items: center; gap: 8px; flex-wrap: wrap; }
    .viewer-range-tools.active { display: flex; }
    .viewer-range-tools .dla-date-field {
      width: auto;
      max-width: 210px;
      flex: 0 0 auto;
    }
    .viewer-range-tools .dla-date-field input.date-input {
      flex: 0 0 118px;
      width: 118px;
      min-width: 118px;
    }
    .viewer-range-tools .dla-date-trigger,
    .viewer-range-tools .dla-date-clear {
      position: relative;
      z-index: 1;
    }
    .date-input { width: 118px; height: 36px; border: 1px solid var(--line-strong); border-radius: 8px; background: #fff; color: var(--text); padding: 0 10px; font-variant-numeric: tabular-nums; }
    .date-input.invalid-date { border-color: #dc2626; box-shadow: 0 0 0 1px #fecaca; }
    .cw-select { width: 116px; min-width: 116px; }
    .viewer-select.hidden { display: none; }
    .viewer { min-width: 0; overflow: hidden; position: relative; }
    .viewer-head { padding: 14px; display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; border-bottom: 1px solid var(--line); }
    .viewer-title { min-width: 0; }
    .viewer-title h3 { margin: 0; font-size: 16px; line-height: 1.25; }
    .viewer-title p { margin: 5px 0 0; color: var(--muted); font-size: 12px; overflow-wrap: anywhere; }
    .viewer-actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .viewer-frame-wrap { height: calc(100vh - 260px); min-height: 640px; background: #fff; position: relative; }
    .button.layout-edit {
      background: #0f766e;
      border-color: #0f766e;
      color: #fff;
      font-weight: 700;
    }
    .button.layout-edit:hover { background: #115e59; border-color: #115e59; }
    .viewer-frame { width: 100%; height: 100%; border: 0; display: block; background: #fff; }
    .card { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; box-shadow: var(--shadow); min-width: 0; }
    .muted { color: var(--muted); }
    .toast { position: fixed; right: 18px; bottom: 18px; min-width: 220px; max-width: 360px; background: #111827; color: #fff; border-radius: 8px; padding: 11px 13px; box-shadow: 0 18px 45px rgba(15,23,42,.22); opacity: 0; transform: translateY(8px); transition: .18s ease; pointer-events: none; z-index: 20; }
    .toast.show { opacity: 1; transform: translateY(0); }
    @media (max-width: 900px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { position: static; height: auto; }
      .topbar { position: static; align-items: flex-start; flex-direction: column; }
    }
  </style>
</head>

      </main>

    function loadDashboardPrefs(key) {
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : null;
  } catch {
    return null;
  }
}
function loadLayout(dashboardId) {
  try {
    for (const ver of [4, 3, 2, 1]) {
      const raw = localStorage.getItem(`dla-bento-layout:v${ver}:${dashboardId}`);
      if (!raw) continue;
      const parsed = JSON.parse(raw);
      parsed._loadedFromVersion = ver;
      return parsed;
    }
  } catch {
    // ignore parse errors
  }
  return null;
}
function saveDashboardPrefs(key, value) {
  try {
    localStorage.setItem(key, JSON.stringify(value));
  } catch {
    // ignore quota / private mode
  }
}
const DlaBentoLayout = (() => {
  const VERSION = 4;
  const COLS = 12;
  const mounted = new WeakMap();

  function storageKey(dashboardId) {
    return `dla-bento-layout:v${VERSION}:${dashboardId}`;
  }

  function inIframe() {
    try {
      return window.self !== window.top;
    } catch {
      return true;
    }
  }

  function resolveToolbarMode(options) {
    const mode = options?.toolbar;
    if (mode === "none" || mode === "meta") return mode;
    return inIframe() ? "none" : "meta";
  }

  function layoutRoot() {
    return (
      document.querySelector("[data-bento-dashboard]") ||
      document.querySelector(".bento-grid.bento-layout-root") ||
      document.querySelector(".bento-grid")
    );
  }

  function tiles(grid) {
    if (!grid) return [];
    return [...grid.querySelectorAll("[data-bento-id]")].filter((el) => {
      let parent = el.parentElement;
      while (parent && parent !== grid) {
        if (parent.matches("[data-bento-id]")) return false;
        parent = parent.parentElement;
      }
      return true;
    });
  }

  function defaultSpan(el) {
    const attr = Number(el.dataset.bentoSpan || el.getAttribute("data-bento-span") || 0);
    if (attr > 0) return Math.min(COLS, attr);
    const match = String(el.className || "").match(/bento-span-(\d+)/);
    if (match) return Math.min(COLS, Number(match[1]));
    if (el.classList.contains("tt-compliance-panel") || el.classList.contains("tt-entries")) return 12;
    if (el.classList.contains("tt-project")) return 7;
    if (el.classList.contains("tt-detail")) return 5;
    if (el.classList.contains("tt-breakdown")) return 4;
    if (el.classList.contains("tt-toolbar") || el.classList.contains("tt-chips")) return 12;
    return 6;
  }

  function readPlacement(el) {
    const cs = getComputedStyle(el);
    const col = Number(el.dataset.bentoCol || 0);
    const span = Number(el.dataset.bentoColSpan || 0);
    const row = Number(el.dataset.bentoRow || 0);
    const rowSpan = Number(el.dataset.bentoRowSpan || 1);
    if (col && span) {
      return { c: col, cs: span, r: row || 1, rs: rowSpan || 1 };
    }
    const gc = cs.gridColumnStart;
    const gspan = cs.gridColumnEnd;
    const gr = cs.gridRowStart;
    const grs = cs.gridRowEnd;
    let c = 1;
    let csVal = defaultSpan(el);
    let r = 1;
    let rs = 1;
    if (gc && gc !== "auto") c = Number(gc);
    if (gspan && gspan !== "auto" && String(gspan).includes("span")) {
      csVal = Number(String(gspan).replace("span", "").trim()) || csVal;
    }
    if (gr && gr !== "auto") r = Number(gr);
    if (grs && grs !== "auto" && String(grs).includes("span")) {
      rs = Number(String(grs).replace("span", "").trim()) || 1;
    }
    return { c, cs: csVal, r, rs };
  }

  function applyPlacement(el, p) {
    const c = Math.max(1, Math.min(COLS, Number(p.c || 1)));
    const cs = Math.max(1, Math.min(COLS, Number(p.cs || defaultSpan(el))));
    const safeC = Math.min(c, COLS - cs + 1);
    const r = Math.max(1, Number(p.r || 1));
    const rs = Math.max(1, Number(p.rs || 1));
    el.style.setProperty("grid-column", `${safeC} / span ${cs}`, "important");
    el.style.setProperty("grid-row", `${r} / span ${rs}`, "important");
    el.dataset.bentoCol = String(safeC);
    el.dataset.bentoColSpan = String(cs);
    el.dataset.bentoRow = String(r);
    el.dataset.bentoRowSpan = String(rs);
  }

  function rowFromTop(topPx, metrics) {
    return Math.max(1, Math.floor(Math.max(0, topPx) / metrics.rowUnit) + 1);
  }

  function columnFromLeft(leftPx, cs, metrics) {
    let c = Math.floor(Math.max(0, leftPx) / metrics.colUnit) + 1;
    return Math.max(1, Math.min(COLS - cs + 1, c));
  }

  function packLayoutDefault(grid, onlyMissing = true) {
    const list = sortedTiles(grid).filter((el) => !(onlyMissing && el.dataset.bentoCol));
    let row = 1;
    let col = 1;
    for (const el of list) {
      const cs = Math.max(1, Math.min(COLS, Number(el.dataset.bentoColSpan || defaultSpan(el))));
      const rs = defaultRowSpan(el);
      if (cs >= COLS) {
        if (col > 1) {
          row += 1;
          col = 1;
        }
        applyPlacement(el, { c: 1, cs: COLS, r: row, rs });
        row += rs;
        col = 1;
        continue;
      }
      if (col + cs - 1 > COLS) {
        row += 1;
        col = 1;
      }
      applyPlacement(el, { c: col, cs, r: row, rs });
      col += cs;
      if (col > COLS) {
        row += 1;
        col = 1;
      }
    }
  }

  function sortedTiles(grid) {
    return tiles(grid)
      .map((el, idx) => ({
        el,
        idx,
        order: Number(el.dataset.bentoOrder || 0),

      .sort((a, b) => (a.order - b.order) || (a.idx - b.idx))

      const cs = Math.max(1, Math.min(COLS, Number(el.dataset.bentoColSpan || defaultSpan(el))));
      const rs = defaultRowSpan(el);
      let placed = false;
      for (let row = 1; row < 400 && !placed; row += 1) {
        for (let col = 1; col <= COLS - cs + 1; col += 1) {
          const test = { c: col, cs, r: row, rs };
          if (!findOccupants(grid, el, test).length) {
            applyPlacement(el, test);
            placed = true;
            break;
          }
        }

  function packLayoutFromVisual(grid, onlyMissing = true) {
    packLayoutDefault(grid, onlyMissing);
  }

  function isLayoutCorrupt(layout) {
    // Only treat "almost everything forced to column 1" as corruption.
    // Dense KPI boards (many cs<=4 across many rows) are valid custom layouts
    // and must not be wiped on refreshTiles / Done.
    const items = Object.values(layout?.items || {});
    if (items.length < 4) return false;
    const atCol1 = items.filter((p) => Number(p.c || 1) === 1).length;
    return atCol1 / items.length >= 0.85;
  }

  function applyLayoutFromStorageOrDefault(grid, dashboardId) {
    const saved = loadLayout(dashboardId);
    if (saved?.items && !isLayoutCorrupt(saved)) {

      if (saved._loadedFromVersion && saved._loadedFromVersion !== VERSION) {

        localStorage.removeItem(storageKey(dashboardId));
        for (const ver of [3, 2, 1]) {

        }
      } catch {
        // ignore
      }

    packLayoutDefault(grid, false);
  }

  function findRowForTop(grid, dragging, topPx) {
    const gridRect = grid.getBoundingClientRect();
    const scrollTop = grid.scrollTop || 0;
    const bands = tiles(grid)
      .filter((t) => t !== dragging)
      .map((t) => {
        const rect = t.getBoundingClientRect();
        return {
          row: Number(t.dataset.bentoRow || 1),
          mid: (rect.top + rect.bottom) / 2 - gridRect.top + scrollTop,

      .sort((a, b) => a.mid - b.mid);
    for (const band of bands) {
      if (topPx < band.mid) return Math.max(1, band.row);
    }
    return (bands.length ? Math.max(...bands.map((b) => b.row)) : 0) + 1;
  }

  function columnsOverlap(c1, cs1, c2, cs2) {
    const e1 = c1 + cs1 - 1;
    const e2 = c2 + cs2 - 1;
    return !(e1 < c2 || c1 > e2);
  }

  function isLocked(el) {
    if (!el) return false;
    if (el.dataset.bentoLocked === "true") return true;
    const id = String(el.dataset.bentoId || "");
    return id.endsWith("-meta") || id.includes("-toolbar") || id.includes("-filter");
  }

  function placementBox(p) {
    return {
      c: Number(p.c || 1),
      cs: Number(p.cs || 1),
      r: Number(p.r || 1),
      rs: Number(p.rs || 1),
    };
  }

  function boxesOverlap(a, b) {
    return !(
      a.c + a.cs - 1 < b.c ||
      b.c + b.cs - 1 < a.c ||
      a.r + a.rs - 1 < b.r ||
      b.r + b.rs - 1 < a.r

  }

  function findOccupants(grid, tile, placement) {
    const box = placementBox(placement);
    return tiles(grid).filter((other) => {
      if (other === tile || isLocked(other)) return false;
      return boxesOverlap(box, placementBox(readPlacement(other)));

    const next = placementBox(placement);

    function resolveOverlaps(box, depth) {
      if (depth > tiles(grid).length + 2) return;
      for (const other of findOccupants(grid, tile, box)) {
        if (moved.has(other)) continue;
        const op = placementBox(readPlacement(other));
        const pushed = { c: op.c, cs: op.cs, r: box.r + box.rs, rs: op.rs };
        applyPlacement(other, pushed);
        moved.add(other);
        resolveOverlaps(placementBox(readPlacement(other)), depth + 1);
      }

    resolveOverlaps(next, 0);
    applyPlacement(tile, next);

  function defaultLayout(grid) {
    const items = {};
    for (const el of tiles(grid)) {
      items[el.dataset.bentoId] = readPlacement(el);
    }
    return { version: VERSION, items };
  }

  function clearPlacements(grid) {
    for (const el of tiles(grid)) {
      el.style.removeProperty("grid-column");
      el.style.removeProperty("grid-row");
      delete el.dataset.bentoCol;
      delete el.dataset.bentoColSpan;
      delete el.dataset.bentoRow;
      delete el.dataset.bentoRowSpan;
    }
  }

  function serialize(grid) {
    const items = {};
    for (const el of tiles(grid)) {
      items[el.dataset.bentoId] = readPlacement(el);
    }
    return { version: VERSION, items };
  }

  function applySaved(grid, layout) {
    const items = layout?.items || {};
    for (const el of tiles(grid)) {
      const saved = items[el.dataset.bentoId];
      if (saved) applyPlacement(el, saved);
    }
    const orphans = tiles(grid).filter((el) => !el.dataset.bentoCol);
    if (orphans.length) packOrphans(grid);

  function metaToolbarHost(grid) {
    const scope = grid.closest(".bento-grid") || grid.parentElement || grid;
    const strip = scope.querySelector(":scope > .meta-strip") || scope.querySelector(".meta-strip");
    if (!strip) return null;
    let main = strip.querySelector(".meta-strip-main");
    if (!main) {
      main = document.createElement("div");
      main.className = "meta-strip-main";
      strip.prepend(main);
    }
    main.style.display = "flex";
    main.style.alignItems = "flex-start";
    main.style.justifyContent = "space-between";
    main.style.gap = "12px";
    main.style.width = "100%";

    const indicator = document.createElement("div");
    indicator.className = "bento-layout-drop-indicator";
    grid.appendChild(indicator);
    state.indicator = indicator;

  function ensureToolbar(grid, state, mode) {

    state.toolbarMode = mode;

        continue;
      }
      el.dataset.bentoLocked = "false";
      if (!el.querySelector(".bento-drag-handle")) {
        const handle = document.createElement("div");
        handle.className = "bento-drag-handle";
        handle.textContent = "Drag to move";
        el.prepend(handle);
      }
      if (!el.querySelector(".bento-resize-handle")) {
        const resize = document.createElement("div");
        resize.className = "bento-resize-handle";
        resize.title = "Drag to resize width";
        el.appendChild(resize);
      }
      if (!el.querySelector(".bento-resize-row-handle")) {
        const rowResize = document.createElement("div");
        rowResize.className = "bento-resize-row-handle";
        rowResize.title = "Drag to resize height";
        el.appendChild(rowResize);

  }

  function persist(state) {
    saveDashboardPrefs(storageKey(state.dashboardId), serialize(state.grid));
  }

  function syncToolbarButtons(state) {
    if (!state.toolbar) return;
    const on = state.editing;
    const edit = state.toolbar.querySelector("[data-bento-edit]");
    const reset = state.toolbar.querySelector("[data-bento-reset]");
    const done = state.toolbar.querySelector("[data-bento-done]");
    if (edit) edit.hidden = on;
    if (reset) reset.hidden = !on;
    if (done) done.hidden = !on;
  }

  function setEditing(state, on) {
    state.editing = on;
    state.grid.classList.toggle("bento-layout-editing", on);

      const saved = loadLayout(state.dashboardId);
      if (!saved?.items) packLayoutDefault(state.grid, true);
      decorateTiles(state);
    } else {
      for (const el of tiles(state.grid)) el.classList.remove("bento-tile-dragging");

    }
    syncToolbarButtons(state);
    if (!on) persist(state);

      parent = parent.parentElement;

      if (item?.variants?.length) {
        perDashboard[item.file] = {
          variantFile: item.currentVariantFile || '',
          from: readDateInputIso($('timeFrom')),
          to: readDateInputIso($('timeTo')),
          cw: $('timeCw').value || ''
        };
      }
      state.savedPerDashboard = perDashboard;
      saveDashboardPrefs(PREFS_KEY, {
        selectedFile: state.selectedFile,
        perDashboard
      });
    }

    function restoreControlCenterPrefs() {
      const prefs = loadDashboardPrefs(PREFS_KEY);
      if (!prefs) return;
      if (prefs.selectedFile) state.selectedFile = prefs.selectedFile;
      if (prefs.perDashboard && typeof prefs.perDashboard === 'object') {
        state.savedPerDashboard = prefs.perDashboard;
        Object.entries(prefs.perDashboard).forEach(([file, cfg]) => {
          const item = payload.dashboards.find(row => row.file === file);
          if (item && cfg?.variantFile) item.currentVariantFile = cfg.variantFile;
        });
      }
    }

    function variantSpanDays(row) {
      if (!row?.start || !row?.end) return Number.MAX_SAFE_INTEGER;
      const start = new Date(row.start + 'T00:00:00');
      const end = new Date(row.end + 'T00:00:00');
      if (Number.isNaN(start.getTime()) || Number.isNaN(end.getTime())) return Number.MAX_SAFE_INTEGER;
      return Math.max(0, Math.round((end - start) / 86400000));
    }

    function findVariantForRange(item, from, to, cw) {
      const variants = item?.variants || [];
      if (!from || !to) return { variant: null, reason: 'missing-dates' };
      if (compareIso(from, to) > 0) return { variant: null, reason: 'invalid-order' };

      const exact = variants.find(row => row.start === from && row.end === to);
      if (exact) return { variant: exact, mode: 'exact' };

      if (cw) {
        const cwMatches = variants.filter(row => row.cw === cw && compareIso(row.start, from) <= 0 && compareIso(row.end, to) >= 0);
        if (cwMatches.length) {
          cwMatches.sort((a, b) => variantSpanDays(a) - variantSpanDays(b));
          return { variant: cwMatches[0], mode: 'cw-cover' };
        }
      }

      const covering = variants.filter(row => row.start && row.end && compareIso(row.start, from) <= 0 && compareIso(row.end, to) >= 0);
      if (covering.length) {
        covering.sort((a, b) => variantSpanDays(a) - variantSpanDays(b));
        return { variant: covering[0], mode: 'cover' };
      }

      return { variant: null, reason: 'no-file' };
    }

    function init() {
      $('generatedText').textContent = `Generated ${payload.generatedAt}`;
      restoreControlCenterPrefs();
      bindEvents();
      bindDdMmDatePicker($('timeFrom'), saveControlCenterPrefs);
      bindDdMmDatePicker($('timeTo'), saveControlCenterPrefs);
      render();
    }

    function bindEvents() {
      $('dashboardCatalog').addEventListener('click', (event) => {
        const button = event.target.closest('[data-file]');
        if (!button) return;
        selectDashboard(button.dataset.file);
      });
      $('viewerEditLayout').addEventListener('click', triggerIframeLayoutEdit);
      $('viewerLayoutDone').addEventListener('click', () => finishIframeLayoutEdit());
      $('viewerLayoutReset').addEventListener('click', () => resetIframeLayout());
      $('viewerLayoutExport').addEventListener('click', () => exportIframeLayout());
      $('viewerLayoutImport').addEventListener('click', () => $('viewerLayoutImportFile').click());
      $('viewerLayoutImportFile').addEventListener('change', (event) => {
        const file = event.target.files?.[0];
        if (file) importIframeLayout(file);
        event.target.value = '';
      });
      $('dashboardFrame').addEventListener('load', () => {
        syncViewerLayoutControls(false);
        setTimeout(expandFrameContent, 120);
        setTimeout(primeIframeLayoutEngine, 180);
        setTimeout(checkIframeRenderHealth, 220);
      });
      $('timeRangeSelect').addEventListener('change', (event) => {
        const item = selectedDashboard();
        const variant = (item?.variants || []).find(row => row.file === event.target.value);
        if (!variant) return;
        item.currentVariantFile = variant.file;
        renderViewer();
        saveControlCenterPrefs();
      });
      $('timeCw').addEventListener('change', (event) => {
        const item = selectedDashboard();
        if (!item?.variants?.length) return;
        const cw = event.target.value;
        if (!cw) return;
        const from = readDateInputIso($('timeFrom'));
        const to = readDateInputIso($('timeTo'));
        const match = findVariantForRange(item, from, to, cw);
        if (match.variant) {
          item.currentVariantFile = match.variant.file;
          renderViewer();
          saveControlCenterPrefs();
          return;
        }
        const cwOnly = item.variants.filter(row => row.cw === cw).sort((a, b) => compareIso(b.start, a.start));
        if (cwOnly.length) {
          item.currentVariantFile = cwOnly[0].file;
          renderViewer();
          saveControlCenterPrefs();
        }
      });
      $('timeApply').addEventListener('click', applyTimeRange);
      $('dashboardFrame').addEventListener('load', expandFrameContent);
      $('themeToggle').addEventListener('click', toggleTheme);
    }

    function filteredDashboards() {
      return payload.dashboards.filter(item => item.exists);
    }

    function render() {
      const rows = filteredDashboards();
      ensureSelection(rows);
      renderCatalog(rows);
      renderViewer();
    }

    function ensureSelection(rows) {
      const stillVisible = rows.some(item => item.exists && item.file === state.selectedFile);
      if (state.selectedFile && stillVisible) return;
      const first = rows.find(item => item.exists);
      state.selectedFile = first ? first.file : '';
    }

    function selectedDashboard() {
      return payload.dashboards.find(item => item.file === state.selectedFile) || null;
    }

    function selectedVariant(item) {
      if (!item?.variants?.length) return null;
      return item.variants.find(row => row.file === item.currentVariantFile) || item.variants[0];
    }

    function renderCatalog(rows) {
      $('dashboardCatalog').innerHTML = rows.map(item => {
        const active = item.file === state.selectedFile ? 'active' : '';
        const disabled = item.exists ? '' : 'disabled';
        return `
          <button class="catalog-item ${active}" data-file="${escapeAttr(item.file)}" ${disabled}>
            <strong>${escapeHtml(item.title)}</strong>
            <span class="catalog-meta">
              <span class="catalog-file">${escapeHtml(item.group)}</span>
              <span>${item.variants?.length ? `${item.variants.length} ranges` : escapeHtml(item.freshness)}</span>
            </span>
          </button>
        `;
      }).join('') || '<div class="empty">No dashboards match.</div>';
    }

    function selectDashboard(file) {
      closeIframeLayoutBeforeSwitch();
      const item = payload.dashboards.find(row => row.file === file && row.exists);
      if (!item) return;
      state.selectedFile = file;
      renderCatalog(filteredDashboards());
      renderViewer();
      saveControlCenterPrefs();
    }

    function syncViewerLayoutControls(editing) {
      $('viewerEditLayout').hidden = editing;
      $('viewerLayoutExport').hidden = !editing;
      $('viewerLayoutImport').hidden = !editing;
      $('viewerLayoutDone').hidden = !editing;
      $('viewerLayoutReset').hidden = !editing;
    }

    function iframeLayoutWindow() {
      try {
        return $('dashboardFrame').contentWindow || null;
      } catch {
        return null;
      }
    }

    function primeIframeLayoutEngine() {
      const win = iframeLayoutWindow();
      const doc = win?.document;
      if (!win?.DlaBentoLayout || !doc) return false;
      const grid = doc.querySelector('[data-bento-dashboard]') || doc.querySelector('.bento-grid');
      const dashboardId = currentFrameLayoutId();
      if (grid && dashboardId && win.DlaBentoLayout.apply) {
        win.DlaBentoLayout.apply(grid, dashboardId, { toolbar: 'none' });
      }
      return Boolean(win.__dlaBentoReady || win.DlaBentoLayout);
    }

    function currentFrameLayoutId() {
      const item = selectedDashboard();
      const variant = selectedVariant(item);
      if (variant?.layoutId) return variant.layoutId;
      if (item?.layoutId) return item.layoutId;
      try {
        const doc = iframeLayoutWindow()?.document;
        const grid = doc?.querySelector('[data-bento-dashboard]');
        return grid?.dataset?.bentoDashboard || null;
      } catch {
        return null;
      }
    }

    function closeIframeLayoutBeforeSwitch() {
      const win = iframeLayoutWindow();
      try {
        if (win?.DlaBentoLayout?.isEditing?.()) win.DlaBentoLayout.closeEditor();
      } catch {
        // ignore
      }
      syncViewerLayoutControls(false);
    }

    function triggerIframeLayoutEdit() {
      const win = iframeLayoutWindow();
      if (!win) {
        showToast('Dashboard preview is still loading. Try again in a moment.');
        return;
      }
      primeIframeLayoutEngine();
      let ok = false;
      try {
        ok = Boolean(win.DlaBentoLayout?.openEditor?.());
      } catch {
        ok = false;
      }
      if (!ok) {
        try {
          win.postMessage({ type: 'dla-bento-open' }, '*');
          ok = Boolean(win.DlaBentoLayout?.isEditing?.());
        } catch {
          ok = false;
        }
      }
      if (ok) {
        syncViewerLayoutControls(true);
        showToast('Layout editor enabled — drag the green handle or top edge of each tile.');
        return;
      }
      showToast('Open the dashboard in a new tab to edit layout.');
    }

    function finishIframeLayoutEdit() {
      const win = iframeLayoutWindow();
      try {
        if (win?.DlaBentoLayout?.closeEditor) win.DlaBentoLayout.closeEditor();
        else win?.postMessage({ type: 'dla-bento-close' }, '*');
      } catch {
        // ignore
      }
      syncViewerLayoutControls(false);
      showToast('Layout saved on this browser.');
    }

    function resetIframeLayout() {
      const win = iframeLayoutWindow();
      try {
        if (win?.DlaBentoLayout?.resetLayout) win.DlaBentoLayout.resetLayout();
        else win?.postMessage({ type: 'dla-bento-reset' }, '*');
        showToast('Layout reset to default.');
      } catch {
        showToast('Could not reset layout in preview.');
      }
    }

    function exportIframeLayout() {
      const win = iframeLayoutWindow();
      const dashboardId = currentFrameLayoutId();
      try {
        if (win?.DlaBentoLayout?.downloadLayoutExport?.(dashboardId)) {
          showToast('Layout JSON downloaded.');
          return;
        }
        win?.postMessage({ type: 'dla-bento-export', dashboardId }, '*');
        showToast('Layout export requested.');
      } catch {
        showToast('Could not export layout from preview.');
      }
    }

    function importIframeLayout(file) {
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const payload = JSON.parse(String(reader.result || '{}'));
          const items = payload?.items;
          if (!items || typeof items !== 'object' || Array.isArray(items) || !Object.keys(items).length) {
            showToast('Invalid layout JSON — expected non-empty items map.');
            return;
          }
          const win = iframeLayoutWindow();
          const dashboardId = currentFrameLayoutId();
          if (win?.DlaBentoLayout?.importLayout?.(payload, { dashboardId })) {
            showToast('Layout imported on this browser.');
            return;
          }
          win?.postMessage({ type: 'dla-bento-import', dashboardId, payload }, '*');
          showToast('Could not apply layout — check JSON matches this dashboard.');
        } catch {
          showToast('Invalid layout JSON file.');
        }
      };
      reader.readAsText(file);
    }

    function renderViewer() {
      const item = selectedDashboard();
      if (!item) {
        $('viewerTitle').textContent = 'No dashboard selected';
        $('viewerMeta').textContent = 'Adjust filters or search.';
        $('dashboardFrame').removeAttribute('src');
        $('viewerOpen').removeAttribute('href');
        return;
      }
      const variant = selectedVariant(item);
      const frameItem = variant || item;
      renderTimeRangeSelect(item, variant);
      $('viewerTitle').textContent = item.title;
      $('viewerMeta').textContent = `${frameItem.file} · ${item.group} · ${frameItem.modifiedDisplay} · ${frameItem.size}`;
      const bust = frameItem.modified ? String(frameItem.modified).replace(/[^0-9]/g, '').slice(0, 14) : Date.now();
      $('dashboardFrame').src = `${frameItem.href}?v=${bust}`;
      $('viewerOpen').href = `${frameItem.href}?v=${bust}`;
      syncViewerLayoutControls(false);
      setTimeout(expandFrameContent, 250);
      setTimeout(expandFrameContent, 900);
    }

    function renderTimeRangeSelect(item, variant) {
      const select = $('timeRangeSelect');
      if (!item?.variants?.length) {
        select.classList.add('hidden');
        $('timeRangeTools').classList.remove('active');
        select.innerHTML = '';
        return;
      }
      select.classList.remove('hidden');
      select.innerHTML = item.variants.map(row => `<option value="${escapeAttr(row.file)}">${escapeHtml(row.label)}</option>`).join('');
      select.value = (variant || item.variants[0]).file;
      $('timeRangeTools').classList.add('active');
      const base = variant || item.variants[0];
      // Always mirror the selected HTML variant — saved From/To must not desync the dropdown.
      setDateInputDisplay($('timeFrom'), base.start || '');
      setDateInputDisplay($('timeTo'), base.end || '');
      const weeks = [...new Set(item.variants.map(row => row.cw).filter(Boolean))].sort().reverse();
      $('timeCw').innerHTML = '<option value="">CW</option>' + weeks.map(week => `<option value="${escapeAttr(week)}">${escapeHtml(week)}</option>`).join('');
      $('timeCw').value = base.cw || '';
    }

    function applyTimeRange() {
      const item = selectedDashboard();
      if (!item?.variants?.length) {
        showToast('Date range controls only apply to Digital Team Time Tracking.');
        return;
      }
      const from = readDateInputIso($('timeFrom'));
      const to = readDateInputIso($('timeTo'));
      const cw = $('timeCw').value;
      if (!from || !to) {
        showToast('Choose both From and To dates (dd/mm/yyyy).');
        return;
      }
      if (compareIso(from, to) > 0) {
        showToast('From date must be on or before To date.');
        return;
      }
      const match = findVariantForRange(item, from, to, cw);
      if (match.variant) {
        item.currentVariantFile = match.variant.file;
        renderViewer();
        saveControlCenterPrefs();
        if (match.mode === 'exact') {
          showToast(`Loaded ${match.variant.label}`);
        } else {
          showToast(`Loaded ${match.variant.label} (closest available range covering ${fmtIsoDate(from)} to ${fmtIsoDate(to)})`);
        }
        return;
      }
      const template = item.rangeRefreshTemplate || 'python -m dashboard_assistant --month {from}..{to} --team digital --react --limit 20 --strict-dq';
      copyText(template.replaceAll('{from}', from).replaceAll('{to}', to));
      showToast(`No HTML for ${fmtIsoDate(from)} to ${fmtIsoDate(to)}. Refresh command copied — run it, then rebuild control center.`);
    }

    function checkIframeRenderHealth() {
      const frame = $('dashboardFrame');
      try {
        const doc = frame.contentDocument || frame.contentWindow?.document;
        const app = doc?.getElementById('app');
        const root = doc?.querySelector('[data-bento-dashboard], .bento-grid, main.shell');
        const htmlLen = (app?.innerHTML || root?.innerHTML || doc?.body?.innerHTML || '').trim().length;
        if (doc && htmlLen < 40) {
          showToast('Preview failed to render. Hard refresh (Ctrl+Shift+R) or use Open.');
        }
      } catch {
        // ignore cross-origin
      }
    }

    function expandFrameContent() {
      const frame = $('dashboardFrame');
      try {
        const doc = frame.contentDocument || frame.contentWindow.document;
        if (!doc || doc.getElementById('dla-full-frame-style')) return;
        const style = doc.createElement('style');
        style.id = 'dla-full-frame-style';
        style.textContent = `
          html, body { width: 100% !important; max-width: none !important; overflow-x: hidden !important; }
          body { margin-left: 0 !important; margin-right: 0 !important; }
          .wrap, .shell, .main, .container, .dashboard, .dashboard-shell, .page, main {
            width: 100% !important;
            max-width: none !important;
            margin-left: 0 !important;
            margin-right: 0 !important;
          }
          .card, .panel, .section, .project-section, .chart-panel {
            max-width: none !important;
          }
        `;
        doc.head.appendChild(style);
      } catch {
        // Cross-origin or protected frame. Local dashboards should allow this.
      }
    }

    async function copyText(text) {
      if (!text) {
        showToast('Nothing to copy.');
        return;
      }
      try {
        await navigator.clipboard.writeText(text);
        showToast('Copied to clipboard');
      } catch {
        showToast(text);
      }
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 4200);
    }

    function toggleTheme() {
      const root = document.documentElement;
      const dark = root.dataset.theme !== 'dark';
      root.dataset.theme = dark ? 'dark' : 'light';
      if (dark) {
        root.style.setProperty('--bg', '#0f172a');
        root.style.setProperty('--panel', '#111827');
        root.style.setProperty('--text', '#e5e7eb');
        root.style.setProperty('--muted', '#94a3b8');
        root.style.setProperty('--line', '#263447');
        root.style.setProperty('--line-strong', '#334155');
        root.style.setProperty('--sidebar', '#111827');
      } else {
        root.removeAttribute('style');
      }
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, char => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[char]));
    }
    function escapeAttr(value) { return escapeHtml(value); }
    function compactNumber(value) { return Number(value || 0).toLocaleString('en-US'); }
    init();
  </script>
</body>
</html>
